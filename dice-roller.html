<!-- ✅ MAIN CONTENT -->
<div class="container py-4">

  <h1 class="mb-4 text-center">🎲 Dice Roller</h1>

  <div id="dice-container"></div>

  <div class="mt-3 d-flex flex-wrap gap-2 justify-content-center">
    <button class="btn btn-success" onclick="addDiceRow()">Add Die</button>
    <button class="btn btn-primary" onclick="rollAll()">Roll Dice</button>
  </div>

  <div class="mt-4 text-center">
    <h3>Total: <span id="grandTotal">0</span></h3>
  </div>

</div>

<script>
let diceId = 0;

function addDiceRow() {
  const container = document.getElementById("dice-container");

  const row = document.createElement("div");
  row.className = "row g-2 align-items-center mb-3 border rounded p-2";

  row.innerHTML = `
    <div class="col-6 col-md-2">
      <input type="number" class="form-control dice-count" value="1" min="1">
    </div>

    <div class="col-6 col-md-2">
      <select class="form-select dice-type">
        <option value="4">d4</option>
        <option value="6">d6</option>
        <option value="8">d8</option>
        <option value="10">d10</option>
        <option value="12">d12</option>
        <option value="20">d20</option>
        <option value="100">d100</option>
      </select>
    </div>

    <div class="col-6 col-md-2">
      <input type="number" class="form-control dice-modifier" value="0">
    </div>

    <div class="col-12 col-md-4">
      <input type="text" class="form-control dice-result" readonly placeholder="Result">
    </div>

    <div class="col-12 col-md-2">
      <button class="btn btn-danger w-100" onclick="removeRow(this)">Remove</button>
    </div>
  `;

  container.appendChild(row);
  diceId::::::
}

function removeRow(button) {
  button.closest(".row").remove();
}

function rollDie(sides) {
  return Math.floor(Math.random() * sides) + 1;
}

function rollAll() {
  const rows = document.querySelectorAll("#dice-container .row");
  let grandTotal = 0;

  rows.forEach(row => {
    const type = parseInt(row.querySelector(".dice-type").value);
    const count = parseInt(row.querySelector(".dice-count").value);
    con.st modifier = parseInt(row.querySelector(".dice-modifier").value);

    let rolls = [];
    let sum = 0;

    for (let i = 0; i < count; i++) {
      const roll = rollDie(type);
      rolls.push(roll);
      sum += roll;
    }

    const final = sum + modifier;
    grandTotal += final;

    const resultText = `${rolls.join(" + ")} ${modifier !== 0 ? (modifier > 0 ? "+ " + modifier : "- " + Math.abs(modifier)) : ""} = ${final}`;
    row.querySelector(".dice-result").value = resultText;
  });

  document.getElementById("grandTotal").innerText = grandTotal;
}

// Initialize
addDiceRow();
</script>
