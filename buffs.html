<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Buff Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body { background-color: #121212; color: white; }
    .dice-row { background: #1e1e1e; padding: 10px; border-radius: 10px; margin-bottom: 8px; }
    .small-text { font-size: 12px; color: #aaa; }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom">
  <div class="container-fluid">
    <a class="navbar-brand" href="dice-roller.html">Pathfinder-friends</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarMain">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="dice-roller.html">Dice Roller</a></li>
        <li class="nav-item"><a class="nav-link" href="craft-calculator.html">Alchemical Crafting</a></li>
        <li class="nav-item"><a class="nav-link active" href="buffs.html">Buff tracker</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-3">
  <h3>Buff Tracker</h3>

  <div class="row mb-2">
    <div class="col-6">
      <input id="buffSearch" class="form-control form-control-sm" placeholder="Search buff...">
    </div>
    <div class="col-6">
      <select id="buffSelect" class="form-select form-select-sm"></select>
    </div>
  </div>

  <button class="btn btn-primary btn-sm mb-2" onclick="addBuff()">Add Buff</button>
  <button class="btn btn-warning btn-sm mb-3" onclick="nextRound()">Next Round</button>

  <h5>Active Buffs</h5>
  <div id="activeBuffs"></div>

  <h5 class="mt-4">Final Stats</h5>
  <div id="finalStats"></div>
</div>

<script>
let buffs = [];
let activeBuffs = [];

const STAT_GROUPS = {
  attributes: ["strength","dexterity","constitution","intelligence","wisdom","charisma"],
  combat: ["attack","damage"],
  armor: ["ac","natural armor","shield","size","deflection"],
  saves: ["fortitude","reflex","will"],
  cmd: ["cmb","cmd"],
  misc: ["initiative","spell resistance"]
};

fetch('buffs.json')
  .then(res => res.json())
  .then(data => {
    buffs = data;
    renderDropdown(buffs);
  });

function renderDropdown(list) {
  const select = document.getElementById("buffSelect");
  select.innerHTML = "";
  list.forEach((b,i)=>{
    const o=document.createElement("option");
    o.value=i;
    o.textContent=b.name;
    select.appendChild(o);
  });
}

document.getElementById("buffSearch").addEventListener("input", e=>{
  const v=e.target.value.toLowerCase();
  renderDropdown(buffs.filter(b=>b.name.toLowerCase().includes(v)));
});

function parseDuration(d){
  if(!d) return null;
  if(d.includes("round")) return 1;
  if(d.includes("minute")) return 10;
  if(d.includes("hour")) return 600;
  return null;
}

function addBuff(){
  const b=buffs[document.getElementById("buffSelect").value];
  if(!b) return;

  activeBuffs.push({...b, remaining: parseDuration(b.duration)});
  renderActiveBuffs();
}

function removeBuff(i){
  activeBuffs.splice(i,1);
  renderActiveBuffs();
}

function nextRound(){
  activeBuffs.forEach(b=>{
    if(b.remaining!==null) b.remaining--;
  });
  activeBuffs = activeBuffs.filter(b=>b.remaining===null || b.remaining>0);
  renderActiveBuffs();
}

function renderActiveBuffs(){
  const c=document.getElementById("activeBuffs");
  c.innerHTML="";

  activeBuffs.forEach((b,i)=>{
    const d=document.createElement("div");
    d.className="dice-row d-flex justify-content-between";

    d.innerHTML=`
      <div>
        <strong>${b.name}</strong>
        <div class="small-text">${b.duration} | Remaining: ${b.remaining ?? "∞"}</div>
      </div>
      <button class="btn btn-danger btn-sm" onclick="removeBuff(${i})">
        <i class="bi bi-trash"></i>
      </button>
    `;
    c.appendChild(d);
  });

  renderStats();
}

function calculateStatsDetailed(){
  const result={}, breakdown={};
  Object.values(STAT_GROUPS).flat().forEach(s=>{
    result[s]=0;
    breakdown[s]=[];
  });

  const map={};

  activeBuffs.forEach(buff=>{
    buff.bonuses.forEach(b=>{
      const stat=b.stat.toLowerCase();
      const type=b.type || "untyped";

      if(!map[stat]) map[stat]={};
      if(!map[stat][type]) map[stat][type]=[];

      map[stat][type].push({...b, source: buff.name});
    });
  });

  Object.keys(map).forEach(stat=>{
    Object.keys(map[stat]).forEach(type=>{
      const bonuses=map[stat][type];

      if(type==="untyped"){
        bonuses.forEach(b=>{
          result[stat]+=b.value;
          breakdown[stat].push(b);
        });
      } else {
        const stacking=bonuses.filter(b=>b.stacks);

        if(stacking.length){
          stacking.forEach(b=>{
            result[stat]+=b.value;
            breakdown[stat].push(b);
          });
        } else {
          const max=bonuses.reduce((a,b)=>a.value>b.value?a:b);
          result[stat]+=max.value;
          breakdown[stat].push(max);
        }
      }
    });
  });

  return {totals: result, breakdown};
}

function renderStats(){
  const {totals, breakdown}=calculateStatsDetailed();
  const c=document.getElementById("finalStats");
  c.innerHTML="";

  Object.entries(STAT_GROUPS).forEach(([group,stats])=>{
    const d=document.createElement("div");
    d.className="dice-row";

    let html=`<strong>${group.toUpperCase()}</strong><br>`;

    stats.forEach(s=>{
      html+=`<div><strong>${s}: ${totals[s]}</strong></div>`;
      breakdown[s].forEach(b=>{
        html+=`<div class="small-text">↳ ${b.source}: ${b.value} (${b.type})</div>`;
      });
    });

    d.innerHTML=html;
    c.appendChild(d);
  });
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
