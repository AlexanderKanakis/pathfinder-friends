<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">
<div id="appNavbar"></div>

<main class="container mt-4" style="max-width: 440px;">
  <h3>Login</h3>
  <div id="authStatus" class="alert d-none" role="alert"></div>

  <form id="loginForm" class="vstack gap-3">
    <div>
      <label class="form-label" for="email">Email</label>
      <input id="email" class="form-control" type="email" autocomplete="email" required>
    </div>

    <div>
      <label class="form-label" for="password">Password</label>
      <input id="password" class="form-control" type="password" autocomplete="current-password" required minlength="6">
    </div>

    <div class="d-flex gap-2">
      <button class="btn btn-primary" type="submit">Login</button>
    </div>
  </form>
</main>

<script src="navbar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="app-supabase.js"></script>
<script>
PFApp.setupAuthPage();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
