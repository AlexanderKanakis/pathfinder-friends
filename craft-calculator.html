                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Invisible ink (superior)"
                },
                {
                    "name": "Kaava musk",
                    "desc": ["This emerald-colored adhesive is made from animal glands, urine, and other powerful scents that are difficult to wash off. A target splashed with it smells like weak prey to predators. Creatures with the scent ability can detect a marked creature at five times the normal range, note its direction as a free action, pinpoint it when it is within 25 feet, and track it by scent with a +5 bonus on their Survival checks. Immersion in water within 1 round of exposure washes the musk off; otherwise the effect decreases by 1 range increment per day (four times normal range after 1 day, three times normal range after 2 days, and so on) until the creature is again at normal scent levels. One dose of Kaava musk costs 40 gp and weighs 1/2 lb.; the Craft (alchemy) DC to create Kaava musk is 20. For more information on Kaava musk, see page 31."],
                    "dc": 20,
                    "gp": 40,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Kaava musk"
                },
                {
                    "name": "Light detector",
                    "desc": ["This hand-sized metal plate is covered with a thin layer of light-sensitive transparent paste. If exposed to light, the paste darkens and becomes opaque, depending on the amount of light. Bright light causes it to fully darken in 1 round, normal light in 3 rounds, and dim light in 10 rounds. It is mainly used by creatures with darkvision to determine whether creatures carrying light have recently passed through an area. The plate is sold wrapped in a thick black cloth to prevent accidental light exposure from ruining the plate."],
                    "dc": 10,
                    "gp": 1,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Light detector"
                },
                {
                    "name": "Light fire ink",
                    "desc": ["This alchemically infused ink ensures secret messages destroy themselves after being read. If light strikes the ink after it has dried, chemicals cause it to spontaneously combust within about a minute. The combustion is small—not significant enough to ignite anything but paper. Ink used on other materials such as stone or wood simply vanishes, leaving no trace of the writing. A vial of this ink holds enough to write 10 brief messages of no more than 50 words each."],
                    "dc": 25,
                    "gp": 40,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Light fire ink"
                },
                {
                    "name": "Light of Axtarr",
                    "desc": ["Originally brewed from waters adjacent to one of the Plane of Water’s subaquatic suns, a vial of light of Axtarr glows like a candle until expended. A vial of light of Axtarr that is emptied underwater as a move action forms a small orb that sheds light like a sunrod for 1d6 hours, after which the item is expended. Such an underwater orb remains suspended in place, not sinking, floating, or drifting away unless moved by a creature. Above water, shaking a vial of light of Axtarr as a move action also makes it shed light like a sunrod for 1d6 hours, after which it is expended. Any area of normal light created by light of Axtarr protects creatures within it from cold temperatures as per endure elements . Alternatively, a spellcaster holding an unused vial of light of Axtarr can expend it as a free action to automatically succeed at a caster level check to cast a fire spell underwater. (Fire spells successfully cast underwater produce steam that still deals fire damage; for more details, see page 46 of Pathfinder Campaign Setting: Aquatic Adventures .) This alternative use does not cause the light of Axtarr to produce light. Crafting this item requires a successful DC 30 Craft (alchemy) check."],
                    "dc": 30,
                    "gp": 180,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Light of Axtarr"
                },
                {
                    "name": "Light-killer's grease",
                    "desc": ["Keenly aware of their vulnerability to light and to those who wield it as a weapon, the drow have pioneered many ways to defend themselves against light—magic or otherwise. Light-killer’s grease is a pungent, oily alchemical substance harvested from underground fungus and mixed with powdered minerals common in the deep earth.   When combined correctly, this black, tarry mass absorbs light. It must be applied around a creature’s eyes (a fullround action) to function. When worn, it negates the dazzled condition from exposure to bright light and grants a +1 alchemical bonus on saving throws against spells and effects with the light descriptor. The grease is considered an overpowering scent for the purpose of the scent special ability, and a creature with scent can pinpoint the wearer’s location at a range of 10 feet instead of 5 feet.   Once applied, the grease remains potent for 1 hour. Removing the grease is a full-round action that requires a gallon of water or another suitable washing liquid; otherwise, the visual marks can be removed, ending the effect, but the smell remains for the full duration.   Crafting light-killer’s grease requires a successful DC 15 Craft (alchemy) check."],
                    "dc": 15,
                    "gp": 25,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Light-killer's grease"
                },
                {
                    "name": "Liniment",
                    "desc": ["This lotion is made from soothing herbs and oils. When rubbed on your skin, liniment relieves pain, allowing you to ignore the effects of 2 points of ability damage caused by a single disease you have. The benefits of the liniment last for 30 minutes, and it does not cure, prevent, or otherwise protect you from the effects of diseases. You cannot benefit from the effects of liniment more than once in a 24-hour period."],
                    "dc": 1,
                    "gp": 15 ,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Liniment"
                },
                {
                    "name": "Liquid traction",
                    "desc": ["This glass bottle is filled with sticky goo prized by sailors for the additional traction it grants on ship decks. When applied to the soles of footwear and allowed to dry for 1 hour, liquid traction grants a +2 alchemical bonus on Acrobatics checks to keep your balance and a +2 bonus to CMD against bull rush. Liquid traction has no effect when it comes into contact with very slick or unnaturally slick surfaces such as ice or grease ."],
                    "dc": 20,
                    "gp": 25,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Liquid traction"
                },
                {
                    "name": "Litmus strip",
                    "desc": ["This white paper strip treated with dyes extracted from common lichen is used to quickly test the composition of any water-based solution. The user dips the end of the strip in the liquid and waits 1 round for the chemical reaction to change the color of the strip. If the strip turns purple, then the water contains poisonous toxins and must be purified before consumption. The darker purple the strip turns, the more toxic the substance. If the strip remains white, the solution is poison-free. Though it's not useful for testing oils, slimes, or gases, a strip can be invaluable in determining whether a water source or beverage is tainted."],
                    "dc": 20,
                    "gp": 15,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Litmus strip"
                },
                {
                    "name": "Lover's breath",
                    "desc": ["This alchemical perfume is distilled from a blend of humanoid pheromones and fey sweat. When applied as a full-round action, it grants the wearer a +2 circumstance bonus on all Charisma checks and Charisma-based skill checks for 1 hour. During this time, the wearer takes a –2 penalty on saving throws against charm and fascination effects originating from fey.   Long-term use of lover’s breath eventually results in physical changes, causing the user to vaguely resemble a fey creature such as a nymph or dryad, although these changes are only cosmetic."],
                    "dc": 1,
                    "gp": 200,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Lover's breath"
                },
                {
                    "name": "Lozenge of the songbird",
                    "desc": ["This honey-coated candy is made of soothing reagents. If eaten, it takes 1 round to begin working, then grants a +2 alchemical bonus on all Perform (sing) checks for 1 hour."],
                    "dc": 25,
                    "gp": 50,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Lozenge of the songbird"
                },
                {
                    "name": "Magnetized paper",
                    "desc": ["These specially charged pieces of parchment come in small packages containing seven sheets. Psychically attuned to the specific magnetic fluids a living creature needs to part the ethereal veil, these sheets add a 5% bonus to the chance of creating meaningful writing for the automatic writing occult skill unlock. This use consumes one sheet of the paper, and only one sheet can be used per attempt."],
                    "dc": 15,
                    "gp": 11,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Magnetized paper"
                },
                {
                    "name": "Marker dye",
                    "desc": ["This dye (available in several colors) creates an obvious stain wherever it is splashed. Washing has no effect for the first 72 hours (though magic can erase it), but it fades completely after 2 weeks. You can throw it as a splash weapon."],
                    "dc": 15,
                    "gp": 15,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Marker dye"
                },
                {
                    "name": "Masking scent (animal)",
                    "desc": ["This item comes in a variety of scents (matching any one animal, humanoid, or magical beast). One vial applied to a single Medium-sized creature changes its scent to that of the masking scent’s creature for 8 hours."],
                    "dc": 20,
                    "gp": 25,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Masking scent (animal)"
                },
                {
                    "name": "Masking scent (humanoid)",
                    "desc": ["This item comes in a variety of scents (matching any one animal, humanoid, or magical beast). One vial applied to a single Medium-sized creature changes its scent to that of the masking scent’s creature for 8 hours."],
                    "dc": 25,
                    "gp": 50,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Masking scent (humanoid)"
                },
                {
                    "name": "Masking scent (magical beast)",
                    "desc": ["This item comes in a variety of scents (matching any one animal, humanoid, or magical beast). One vial applied to a single Medium-sized creature changes its scent to that of the masking scent’s creature for 8 hours."],
                    "dc": 30,
                    "gp": 100,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Masking scent (magical beast)"
                },
                {
                    "name": "Mending paste",
                    "desc": ["You can use this smelly, silvery paste to temporarily repair metal objects. It is sold in a sealed flask and reacts with air, turning solid in 1d6+4 minutes. You must make an appropriate DC 20 Craft check to repair a metal item with the broken condition; success means the object loses the broken condition but gains the fragile condition (see page 22). Increase the DC by +5 if the broken object is a magic item or by +5 if it is a firearm (add both modifiers if the item is a magical firearm). If the check fails, the mending paste is consumed but you may try again with another flask or conventional repair methods."],
                    "dc": 25,
                    "gp": 25,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Mending paste"
                },
                {
                    "name": "Mimic fibers",
                    "desc": ["These alchemically prepared fungal spores are suspended in a thick green ichor. They grow in patterns that match any plant or fungal material they touch, even dead wood, causing any cuts or breaks in the matter to mend as if it had never been damaged. When applied as a full-round action, mimic fibers heal 1d10+10 points of damage to one object made of wood, paper, earth, or other living or onceliving material. Even a destroyed item can be repaired (treat as if at 0 hit points) as long as the item is in no more than two pieces and is held together at the break as the spores are applied."],
                    "dc": 20,
                    "gp": 30,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Mimic fibers"
                },
                {
                    "name": "Minkaian ceremonial tea",
                    "desc": ["This tea is extremely rare and expensive, requiring several years to grow and prepare. A geisha bard ( Pathfinder RPG Ultimate Magic 27) who uses this tea as part of her tea ceremony to inspire courage increases the bonuses granted by 1. A lotus geisha bard ( Pathfinder Player Companion: Dragon Empires Primer 22) who drinks this tea increases the bonus granted by her enrapturing performance ability by 1; this effect lasts for 24 hours."],
                    "dc": 35,
                    "gp": 900,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Minkaian ceremonial tea"
                },
                {
                    "name": "Mithralbane sap",
                    "desc": ["This black alchemical concoction reacts when it comes into contact with metal, rapidly expanding into a sticky, inflexible substance that temporarily renders armor more difficult to use. When the sap is smeared onto metal armor or thrown at a creature wearing metal armor (as a ranged touch attack with a range increment of 10 feet), that armor is considered one category heavier for the purposes of movement (heavy armor is still treated as heavy). This increase does not apply to proficiency in wearing the armor. Additionally, the arcane spell failure chance of armor affected by mithralbane sap increases by 10%, its maximum Dexterity bonus decreases by 2 (to a minimum of 0), and its armor check penalty increases by 3. These effects last for 1 minute, after which the grease hardens and crumbles away. Armor that’s not primarily made of metal and metal items such as weapons and shields are not meaningfully affected by mithralbane sap. Crafting this item requires a successful DC 25 Craft (alchemy) check."],
                    "dc": 25,
                    "gp": 50,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Mithralbane sap"
                },
                {
                    "name": "Monochrome Camouflage",
                    "desc": ["This slimy gray unguent distorts wavelengths of light beyond of the normal visual spectrum, causing you to appear blurry to creatures using darkvision. Applying the camouflage takes 1 minute and provides a +4 alchemical bonus on Stealth checks against creatures relying on darkvision to see. One dose of monochrome camouflage lasts for 1 hour."],
                    "dc": 1,
                    "gp": 40,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Monochrome Camouflage"
                },
                {
                    "name": "Moonrod",
                    "desc": ["This 1-foot-long, silver-tipped tin rod glows dimly when struck as a standard action. It sheds dim light in a 30-foot radius. However, the light given off by a moonrod is particularly easily to perceive for creatures with low-light vision. For such creatures, a moonrod increases the light level by one step (to a maximum of normal) for a 60-foot radius. It glows for 6 hours, after which the silver tip is burned out and worthless."],
                    "dc": 25,
                    "gp": 10,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Moonrod"
                },
                {
                    "name": "Necrobane formaldehyde",
                    "desc": ["This form of the common embalming agent comes in a glass beaker with a thick rubber stopper, and is employed in regions such as Ustalav, where alchemy is prized as a viable defense against the depredations of necromancers. When introduced into a dead body, necrobane formaldehyde slows the process of decay, keeping the corpse from stinking and rotting for 1d6 days after death. Treating a body with necrobane formaldehyde takes 1 hour and requires a successful DC 25 Heal check. A corpse injected with necrobane formaldehyde is more difficult to resurrect as an undead creature for 1d6 days after injection. Anyone attempting to seed unlife in a corpse treated in this substance must succeed at a DC 14 caster level check to complete the process or the spell fails and its components are wasted. This is also the case for creatures that ingest necrobane formaldehyde and subsequently die before the effect’s duration has expired.   If an undead creature ingests necrobane formaldehyde (perhaps by eating part of an embalmed corpse), the undead creature becomes fatigued for 2d6 rounds.   When ingested by a living creature, necrobane formaldehyde nauseates the imbiber for 1d6 rounds and deals 1d4 points of Constitution damage. A successful DC 14 Fortitude save reduces the nauseated effect to sickened and halves the Constitution damage (minimum 1). This is a poison effect, though the pungent aroma and unmistakably toxic taste of necrobane formaldehyde makes it difficult to use as a surreptitious weapon.   Crafting necrobane formaldehyde requires a successful DC 23 Craft (alchemy) check."],
                    "dc": 23,
                    "gp": 60,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Necrobane formaldehyde"
                },
                {
                    "name": "Necrosalt",
                    "desc": ["The powder in this minute glass vial is made of caustic soda treated with consecrated ashes, and is harmless to living flesh but dangerous to the deceased. Necrosalt can be thrown as a splash weapon with a range increment of 5 feet. On a successful ranged touch attack, 1 dose of necrosalt deals 1d4 points of damage to a struck corporeal undead creature. For 3 rounds afterward, it deals an additional 1d4 points of damage to its victim at the beginning of the victim’s turn. Intelligent undead creatures can brush necrosalt off their bodies and end its effect as a move action. Crafting this item requires a successful DC 30 Craft (alchemy) check."],
                    "dc": 30,
                    "gp": 150,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Necrosalt"
                },
                {
                    "name": "Night stalker's tonic",
                    "desc": ["Once you imbibe this metallic-tasting liquid, its effects last for 1 hour. During this time, you can accept alchemical burn to increase your sneak attack damage by 1d6 points or your hidden strike damage by 1d4 or 1d8 points (as appropriate) for 1 round. If you don’t possess the sneak attack or hidden strike abilities, imbibing this tonic has no effect."],
                    "dc": 20,
                    "gp": 200,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Night stalker's tonic"
                },
                {
                    "name": "Nushadir",
                    "desc": ["This reagent is often stored in the form of small, salty pellets in a dry container, though it can also be mixed with a flask of water and carried that way. Nushadir neutralizes acid; a vial of pellets or a flask of nushadir-water is enough to render a cubic foot of acid safe to touch in 1 minute, though this is usually too slow to prevent damage from a thrown vial of acid or the contents of a large monster’s gullet. Nushadir vapors are slightly irritating to the eyes, nose, and mouth, causing nausea for 1d4 rounds after close exposure (Fortitude DC 10 negates)."],
                    "dc": 20,
                    "gp": 10,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Nushadir"
                },
                {
                    "name": "Odor stalk",
                    "desc": ["These alchemically treated incense sticks contain pheromones that certain creatures find repellent. Each odor stalk is created to irritate a specific creature type. After burning for 1 round, an odor stalk fills a 10–foot square with a clear gas that causes any living creature of the prescribed type to become nauseated for 1 round, then sickened for as long as it remains in the area. On a successful DC 12 Fortitude save, the creature negates the nauseated condition but not the sickened condition. This is a poison effect. The cloud lasts for 10 minutes, but can be dispersed like obscuring mist . Additionally, odor stalks can be used as an additional spell component for the following spells to modify the spell’s effects.    Ghoul touch : The stench only affects creatures of the odor stalk’s associated creature type.    Repel vermin : The spell functions as written, but applies to the odor stalk’s associated creature type instead of to vermin. The Will save DC is always 12 when using this component.    Stinking cloud : The Fortitude save DC increases by 1 for creatures of the odor stalk’s prescribed type, but decreases by 1 for all other creature types."],
                    "dc": 1,
                    "gp": 70,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Odor stalk"
                },
                {
                    "name": "Oil of the masters",
                    "desc": ["This gold-tinted oil smells of wood shavings. When you apply it to the strings of a stringed instrument or the body of a woodwind, it improves the quality of the instrument’s sound. For 1 hour, anyone playing the instrument gains a +2 alchemical bonus on the appropriate Perform check."],
                    "dc": 25,
                    "gp": 50,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Oil of the masters"
                },
                {
                    "name": "Ooze attractant",
                    "desc": ["Drow alchemists of House Tracinoa developed this mixture to function as a lure for mindless oozes. You can throw a flask of ooze attractant as a splash weapon. On a direct hit, each mindless ooze within 60 feet must succeed at a DC 12 Will save or be compelled to approach the target for the next 1d4+1 rounds. On a miss, an ooze still attempts a Will save, but on a failure it instead approaches the square in which the flask landed. Once an ooze moves adjacent to the targeted creature or into the targeted square, it resumes its normal behavior. An ooze can be affected by ooze attractant only once in a 24-hour period."],
                    "dc": 1,
                    "gp": 100,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Ooze attractant"
                },
                {
                    "name": "Ooze grease",
                    "desc": ["This alchemical concoction can be spread over a Medium or Small creature’s body as a full-round action. It provides a +5 alchemical bonus on Escape Artist checks, grapple checks to avoid a grapple, and Reflex saves to avoid an ooze’s improved grab or engulf abilities, but gives a –5 penalty to disarm checks, grapple checks to start or maintain a grapple or pin, and other checks that may be hindered by a loose grip (such as Climb). One application lasts for up to 1 hour and can be removed with soap and water."],
                    "dc": 25,
                    "gp": 50,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Ooze grease"
                },
                {
                    "name": "Oozing vat (gargantuan)",

                {
                    "name": "Pallid suspension",
                    "desc": ["This small vial contains an alchemical suspension that preserves a sample of pallid gift. This functions like plague powder for pallid gift (DC 20), allowing the user to apply pallid gift to a weapon (a standard action, or whatever action the character normally takes to apply poison to a weapon if that is better) and deliver it as with an injury poison. Just as for plague powder, the creation of a pallid suspension exposes the crafter to the disease on each day of crafting."],
                    "dc": 1,
                    "gp": 324,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Pallid suspension"
                },
                {
                    "name": "Paper wall paste",
                    "desc": ["This jar of thick, gritty paste is made\r from coarsely ground plant matter, weak epoxy, and bat\r guano. When exposed to air, the moldable substance\r quickly creates a thin, paperlike surface, which is ideal for\r creating false earthen walls. Creating a 5-foot-by-5-foot\r section of paper wall requires a full-round action. Though\r this false wall is easy to punch through, it requires a\r successful DC 13 Perception check to identify the wall as a\r fake. If the creator of the paper wall spends an additional\r full-round action disguising the wall with dirt and\r pebbles, the DC increases by 2. Crafting this item requires\r a successful DC 15 Craft (alchemy) check."],
                    "dc": 15,
                    "gp": 10,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Paper wall paste"
                },
                {
                    "name": "Pathstones",
                    "desc": ["Similar to sunrods, these small white pebbles are alchemically treated so that they shed a soft light once activated by striking them together. The glow is faint—just barely enough to illuminate the stone. Though not bright enough to serve as an effective light source, they can be placed in patterns to create messages or laid out in a path, marking it for others to follow."],
                    "dc": 25,
                    "gp": 50,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Pathstones"
                },
                {
                    "name": "Petrified ooze",
                    "desc": ["This tiny blob of ooze looks like a small disc of green stone when inactive, and is stored in a circular dish with an airtight cover. When the cover is removed and the ooze is exposed to air, the user has 1 minute to handle the rapidly softening ooze before it regains its former viscosity (as well as toxicity) and springs back to life. Although much smaller than an actual ooze creature, this coin-sized blob still deals 1d6 points of acid damage to anything it comes in contact with. Due to its unpredictable nature, petrified ooze is typically only good for breaking or melting whatever object or device on which the user originally sets the ooze, after which the blob quickly scurries into the nearest corner or crevice so it can feed on particles of dust and diminutive prey. Once restored to its viscous form, a petrified ooze moves at a rate of 60 feet per round, and any creature that comes in contact with the ooze must succeed at a DC 12 Reflex save to avoid taking acid damage from it."],
                    "dc": 25,
                    "gp": 80,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Petrified ooze"
                },
                {
                    "name": "Phosphorescent gel",
                    "desc": ["This sealed vial contains 1 ounce of milky white gel. Once the vial’s seal is broken, the liquid reacts with the surrounding air and begins to rapidly heat up, glowing like a candle for 1 hour. After that hour, the oxidization of the chemical agent is complete, and the gel dissolves in a white-hot flash, dealing 3d6 points of fire damage to anything directly in contact with it. A single dose of phosphorescent gel can coat 6 square inches of a surface. Multiple doses of phosphorescent gel can be used to coat larger surfaces, but the amount of damage dealt does not stack. The conflagration occurs in an instant, and the fire generated doesn’t spread, though it can be used to ignite a larger explosive such as a fuse grenade or pot of oil."],
                    "dc": 20,
                    "gp": 45,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Phosphorescent gel"
                },
                {
                    "name": "Planar alchemical catalyst",
                    "desc": ["This vibrant, variegated gemstone is found naturally on the Elemental Plane of Earth but can also be artificially reproduced, albeit with a fair amount of difficulty. The catalyst is highly sought for its remarkable ability to enhance and alter alchemical tools and weapons.   As a move action, you can apply the catalyst to one of the following items to enhance or alter the alchemical item’s effects (items marked with an asterisk [“*”] are detailed in Pathfinder RPG Ultimate Equipment ). If the item is not used within 3 rounds, the benefit of the enhanced alchemical item is lost and the item reverts to normal. Once applied to an item, a planar alchemical catalyst is expended.    Alchemist’s Fire : The type of energy damage changes to acid, cold, or electricity (user’s choice).    Flash Powder *: The DC of the Fortitude save increases to 15, and targets are dazzled for 1d4+1 rounds whether or not they succeed at their saving throw.    Holy Water : The splash area becomes difficult terrain for undead and evil outsiders, and undead or evil outsiders that end their turn in the affected area take 2 points of damage. Both of these effects last 3 rounds.    Impact Foam *: The foam does not dissolve when exposed to acid or water, and instead becomes a pliable-yet-rigid platform that can be dragged onto water and used as a makeshift raft for up to 5 Medium creatures. The 10-minute duration still applies.    Liquid Blade *: The blade deals 2 points of bleed damage on a hit (this does not stack with bleed damage from other sources).    Liquid Ice *: In addition to its normal effects, the liquid ice acts as a smokestick, except it emits dense white fog rather than smoke.    Shard Gel *: The shard gel remains embedded in the target on a direct hit, continuing to deal 1d3 points of damage each round after until the gel dissolves (5 rounds) or the target takes a full round action to remove it.    Tanglefoot Bag : The DC of the Reflex saving throw increases to 17, the penalty on attack rolls is –3, and the tanglefoot bag can affect targets up to size category Huge.    Thunderstone : In addition to being deafened, targets that fail their Fortitude saves are staggered for 1 round. Affected targets are deafened for 1d4 rounds whether or not they succeed at their saving throw."],
                    "dc": 1,
                    "gp": 200,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Planar alchemical catalyst"
                },
                {
                    "name": "Poison diffuser",
                    "desc": ["This compound comes in a tiny eyedropper. When you combine a dose of poison diffuser with a dose of contact or ingested poison, the poison becomes a gas, slowly diffusing into the surrounding air. The poison is treated as an inhaled poison for 3 rounds, after which the poison and the poison diffuser are both expended and become inert. Any creature that passes within 5 feet of a diffused poison while it is active must save against the vaporous toxin.   If you are using spontaneous alchemy, adding urea to the alchemical recipe delays a poison diffuser’s activation time. For every 20 doses of urea (worth a total of 10 gp) incorporated into the alchemical creation process, the time from which the diffuser is added to the poison to the time the poison begins spreading into the air increases by 1 round."],
                    "dc": 25,
                    "gp": 200,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Poison diffuser"
                },
                {
                    "name": "Poison sealant",
                    "desc": ["Applied poison generally washes off weapons underwater in 1d10 rounds unless the poison is contained inside the weapon and injected, so undersea alchemists developed poison sealant to circumvent this limitation. Applying poison sealant to a poisoned weapon takes the same amount of effort as applying a poison. Once applied, the sealant protects the poison from the elements, keeping the weapon poisoned underwater. Poison sealant dissolves in blood, allowing the poison’s delivery (and also meaning that it doesn’t prevent accidental poisoning)."],
                    "dc": 1,
                    "gp": 20,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Poison sealant"
                },
                {
                    "name": "Poison tattoo",
                    "desc": ["This henna-like paste creates a dark brown tattoo on the hands or feet that fades over the next 2d6 days. The tattoo temporarily boosts the strength of a vishkanya's natural poison, increasing the DC of the next weapon envenomed with the vishkanya's blood or saliva by +2 (once used, the tattoo is merely decorative and does not affect the creature's poison). A typical tattoo consists of intricate whorls and spiritual symbols on the hands or feet."],
                    "dc": 20,
                    "gp": 50,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Poison tattoo"
                },
                {
                    "name": "Potion sponge",
                    "desc": ["This egg-sized sponge is covered in a layer of waterproof edible wax, designed to absorb 1 dose of a potion. Chewing a potion sponge and swallowing its liquid contents is a full-round action. A creature of at least Large size can swallow the sponge in its entirely; other creatures must spit out the sponge once it's depleted (a free action). Unlike a potion that is drunk from a vial, a potion sponge can be used underwater. A potion can be poured from a vial into a sponge potion (or squeezed from a sponge into a vial) as a full-round action. The potion sponge is immune to attacks that specifically target crystal, glass, ceramic, or porcelain, such as shatter . It otherwise works like a potion vial."],
                    "dc": 15,
                    "gp": 2,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Potion sponge"
                },
                {
                    "name": "Pressure pill",
                    "desc": ["When you swallow this marble-shaped alchemical pill as a full-round action, it instantly adjusts your body to the surrounding water pressure, though you take 3 points of nonlethal damage for every 100 feet of adjustment necessary (see Pressure on page 48)."],
                    "dc": 1,
                    "gp": 75,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Pressure pill"
                },
                {
                    "name": "Rake's friend",
                    "desc": ["You can accept alchemical burn when you imbibe this draught to gain 1 grit point or 1 panache point. The effects of rake’s friend last for 1 hour; if not spent within 1 hour, this point is lost. Rake’s friend has no effect if you don’t have the ability to use grit or panache."],
                    "dc": 15,
                    "gp": 120,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Rake's friend"
                },
                {
                    "name": "Reagent paper",
                    "desc": ["This slip of paper can aid in the identifying of liquids. Its color changes in accordance to basic traits such as acidity, salinity, or magic. This confers a +2 alchemical bonus on any Craft (alchemy) or Spellcraft check made to identify potions or other liquids."],
                    "dc": 15,
                    "gp": 1,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Reagent paper"
                },
                {
                    "name": "Reanimating fluid",
                    "desc": ["This viscous, translucent green fluid is typically stored in a large syringe. When injected into a mostly intact corpse of a Medium or smaller creature that has been dead for no more than 1 day (time spent under effects like gentle repose don’t count against this time), the fluid gives the corpse a rudimentary semblance of life, reactivating its nerves and muscle tissue. This causes the corpse to reanimate and shamble around erratically for 1 minute. The result is not an undead creature, nor is it a construct. The reanimated corpse remains utterly lifeless and is driven only by muscular spasms that cause it shuffle 20 feet in a random direction each round, gasping and blinking eerily as it goes. When the corpse hits a solid barrier or is attacked, it stops moving. On its next turn, roll 1d8 to determine where it goes next. On a 1, it continues forward in the same direction it had been previously moving (or runs up against the same barrier). On a 2, it turns 45º clockwise and heads in that direction; on a 3, it turns 90º clockwise and heads in that direction; and so on. The corpse can’t attack, doesn’t defend itself, and—as an object—has AC 10 and 12 hit points. Crafting a syringe of reanimating fluid requires a successful DC 25 Craft (alchemy) check."],
                    "dc": 25,
                    "gp": 100,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Reanimating fluid"
                },
                {
                    "name": "Red flame torch",
                    "desc": ["This otherwise normal-looking torch is encrusted with lithium salts and burns with a dark red flame. It sheds only dim light in a 10-foot radius, and the light it casts is undetectable outside this radius by normal vision, darkvision, or lowlight vision. This torch burns for 1 hour."],
                    "dc": 1,
                    "gp": 20,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Red flame torch"
                },
                {
                    "name": "Retort",
                    "desc": ["A retort is a pair of flasks attached to one another by a bent connector called an alembic. When one flask is heated, gaseous products pass through the alembic and condense in the other flask."],
                    "dc": 1,
                    "gp": 2,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Retort"
                },
                {
                    "name": "Rhinarium paste",
                    "desc": ["When applied to the nose as a standard action, this alchemical paste traps airborne particles and sharpens your olfactory receptors, heightening your sense of smell. You gain the scent ability, except you can detect creatures and odors at only half the distance. If you already have the scent ability, rhinarium paste increases the range at which you can detect creatures by 50%. Rhinarium paste’s effects lasts for 1 hour. Crafting this item requires a successful DC 20 Craft (alchemy) check."],
                    "dc": 20,
                    "gp": 75,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Rhinarium paste"
                },
                {
                    "name": "Rockshard canister",
                    "desc": ["Two separate compartments make up this black glass canister the size of a helmet. The large lower compartment contains hundreds of jagged shards of obsidian. The upper airtight chamber contains a sticky resin that hardens immediately upon contact with air. When you strike the canister with a bludgeoning melee weapon as a standard action, both compartments shatter, causing the obsidian shards to adhere to the weapon. The weapon deals piercing damage rather than bludgeoning damage for 10 minutes, at which point the resin dries and the shards fall off, or until you roll a natural 1 on an attack roll, which causes the shards to break off prematurely. If the weapon is made of a special material, the special properties of its material are suppressed while the obsidian shards adhere to the weapon.   If you use a rockshard canister to coat an unarmed strike or natural weapon, you take 2d6 points of piercing damage when shattering the canister to apply the shards. For unarmed attacks, this can be avoided by carefully applying thick leather or rope straps to your hands and feet, which requires 5 minutes of work, prior to smashing the canister."],
                    "dc": 1,
                    "gp": 50,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Rockshard canister"
                },
                {
                    "name": "Rusting powder",
                    "desc": ["This flaky brown powder derived from rust monster fluids causes iron and similar metals to corrode and fall apart. If you apply a dose of rusting powder to a metal lock or trap as part of using the Disable Device skill, you gain a +5 alchemical bonus to open the lock or disable the trap, but there is a 75% chance that the mechanism is destroyed and cannot be used afterward. If the check fails, the mechanism is destroyed. A destroyed lock cannot be unlocked (but still counts as locked for the purpose opening the locked object). A destroyed trap mechanism immediately triggers the trap. If you fail the DC by 5 or more, the powder also lands on an object in your square (including possibly your armor or weapon), dealing 5 hit points of damage to the object.   Rusting powder is sold in a paper tube; you apply it by tearing the ends off the tube and blowing the flakes into the target device. Rusting powder does not affect gold, silver, copper, bronze, brass, or mithral, but easily affects iron, steel, and adamantine."],
                    "dc": 30,
                    "gp": 60,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Rusting powder"
                },
                {
                    "name": "Scent blocker",
                    "desc": ["This alchemical oil takes 1 minute to apply and completely masks your odor for 6 hours. Creatures can’t use the scent ability to track you, detect your presence, or pinpoint your location. A single dose of scent blocker covers a Medium or smaller creature. For each size category larger than Medium a creature is, double the number of doses (and application time) required. Crafting scent blocker requires a successful DC 23 Craft (alchemy) check."],
                    "dc": 23,
                    "gp": 80,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Scent blocker"
                },
                {
                    "name": "Scent cloak",
                    "desc": ["This collection of coarsely ground spices, seeds, musk, and alchemical reagents are meant to be rubbed into your skin and clothes in order to override your scent, increasing the DC of tracking you by scent by +10 for 24 hours. Because you still have a smell, creatures with scent can still detect and pinpoint you if you are cloaked; they just can’t identify your smell as something unique. Washing for 1 full round removes the scent cloak."],
                    "dc": 20,
                    "gp": 20,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Scent cloak"
                },
                {
                    "name": "Scentbane incense",
                    "desc": ["Scentbane incense is a form of smokestick that also blocks most scents. As long as the smoke lasts, creatures with the scent special ability must make Perception checks, opposed by the Stealth checks of any creatures within the smoke, to use scent to locate creatures within the smoke. If a creature remains in scentbane incense for 5 rounds or more, the smoke clings to it for 1 round after it leaves, making it similarly difficult to find by scent during that time."],
                    "dc": 20,
                    "gp": 80,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Scentbane incense"
                },
                {
                    "name": "Serpent line",
                    "desc": ["This 30-foot length of rope is braided with musk-cured strips of snakeskin from a variety of desert serpents, and is typically laid out in a 5-foot-radius circle around the edge of a tent or around a sleeping creature. When it’s laid out in this way, common snakes crawling across the desert floor often mistake the serpent line for another snake and shy away from crossing it. Ordinary venomous snakes approaching a serpent line must succeed at a DC 10 Will save or turn away from it, though if they notice potential prey within the serpent line, they may continue to lurk nearby. At the GM’s discretion, an exceptionally aggressive or hungry snake may gain a +2 circumstance bonus on its saving throw. Snakes that are magically controlled ignore a serpent line."],
                    "dc": 20,
                    "gp": 12,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Serpent line"
                },
                {
                    "name": "Shaman's paint",
                    "desc": ["The ground carcasses of goldbelly stinkbugs—insects native to the Mindspin Mountains—give this paint its characteristic yellow hue. When applied as a full-round action, this fine paste makes your head glow as though with an unearthly halo. You gain a +2 alchemical bonus to your caster level for any spells you cast that target one or more of your allies. The quicksilver in shaman’s paint is harmful to living creatures. If you wear shaman’s paint for more than 1 minute per day, you take 1 point of Wisdom damage, plus 1 point of Wisdom damage for every minute you wear the paint that day after the first."],
                    "dc": 20,
                    "gp": 90,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Shaman's paint"
                },
                {
                    "name": "Shrieking paste",
                    "desc": ["Created by suspending the spores of a shrieker mushroom in a thick mixture of wheat paste and vermiculite, this thick sludge comes in a soundproof, stone container. Shrieking paste creates an obnoxious piercing noise when exposed to even minute amounts of movement or light. This makes applying the paste a very noisy endeavor at best. However, once the paste is applied and left alone for several rounds, it once again becomes silent. Thereafter, any light source or movement within 10 feet of the paste causes it to shriek for 1d3 rounds. A single container contains enough shrieking paste to coat 1 square foot of a surface. If left undisturbed for several weeks in a dank, lightless setting, shrieking paste might eventually grow into a colony of shrieker mushrooms ( Core Rulebook 416)."],
                    "dc": 25,
                    "gp": 35,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Shrieking paste"
                },
                {
                    "name": "Silence dust",
                    "desc": ["This ashen powder can be thrown as a splash weapon, muffling all sound within a 15-foot-radius sphere centered on the point of impact. Perception checks to notice sound emanating from or passing through the cloud take a –10 penalty. Alternatively, applying a dose of silence dust to your feet as a standard action grants you a +5 circumstance bonus on Stealth checks to avoid being heard while walking. The dust is effective for 1 minute before it disperses."],
                    "dc": 20,
                    "gp": 60,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Silence dust"
                },
                {
                    "name": "Silver drops",
                    "desc": ["A creature with DR/silver can swallow these bitter-tasting capsules of a concentrated alchemical silver to convert their damage reduction to DR/— for 2d4 rounds. When this effect ends, the creature is nauseated for 1 round. A creature can only benefit from silver drops once per 24 hours. Crafting this item requires a successful DC 30 Craft (alchemy) check."],
                    "dc": 30,
                    "gp": 180,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Silver drops"
                },
                {
                    "name": "Singer's solution",
                    "desc": ["When you imbibe this draught, you can accept alchemical burn to gain an additional 4 rounds of bardic performance or raging song for the day. The effects of singer’s solution last for 1 hour; if not spent within 1 hour, these additional rounds are lost. Singer’s solution has no effect if you don’t have the bardic performance or raging song class features."],
                    "dc": 15,
                    "gp": 120,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Singer's solution"
                },
                {
                    "name": "Smoke Bomb",
                    "desc": ["A smoke bomb appears as a polished ceramic sphere that can be held comfortably in one hand. Many crafters of these alchemical weapons take pride in painting or etching these bombs with complex scenes, or even making them look like small humanoid skulls, despite the fact that the bombs shatter when thrown. When thrown as a splash weapon, a smoke bomb bursts and fills the 5-foot square it detonates in with a cloud of thick, foul-smelling gray smoke (treat this area as if affected by a fog cloud spell, except that the cloud lasts only 1 round before dissipating). A creature that is struck by a smoke bomb or that passes through the cloud a bomb creates must succeed at a DC 12 Fortitude save or be nauseated for 1 round and sickened for 3 rounds after that. Creatures within 5 feet of where the flask hits are sickened for 1 round if they fail this saving throw. This is a poison effect. Crafting a smoke bomb requires a successful DC 22 Craft (alchemy) check."],
                    "dc": 22,
                    "gp": 100,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Smoke Bomb"
                },
                {
                    "name": "Smoke pellet",
                    "desc": ["This small clay sphere contains two alchemical substances separated by a thin barrier. When you break the sphere, the substances mingle and fill a 5-foot square with a cloud of foul but harmless yellow smoke. The smoke pellet acts as a smokestick, except the smoke only lasts for 1 round before dispersing. You may throw a smoke pellet as a ranged touch attack with a range increment of 10 feet."],
                    "dc": 20,
                    "gp": 25,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Smoke pellet"
                },
                {
                    "name": "Smoke signal",
                    "desc": ["This alchemically fused powder ball creates a plume of brightly colored smoke when lit. While the smoke is not thick enough to significantly impair vision, it is clearly visible up to 1d6 miles away under average conditions, and may be visible at greater distances in ideal conditions. Many desert clans use particular signature colors of smoke to indicate their allegiance, or use smoke signals with specific colors or in a pattern of sequential colors to convey coded messages."],
                    "dc": 15,
                    "gp": 5,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Smoke signal"
                },
                {
                    "name": "Smokestick",
                    "desc": ["This alchemically treated wooden stick instantly creates thick, opaque smoke when burned. The smoke fills a 10-foot cube (treat the effect as a fog cloud spell, except that a moderate or stronger wind dissipates the smoke in 1 round). The stick is consumed after 1 round, and the smoke dissipates naturally after 1 minute."],
                    "dc": 20,
                    "gp": 20,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Smokestick"
                },
                {
                    "name": "Snake oil",
                    "desc": ["This mildly toxic liniment numbs flesh and can soothe injuries. Though the tincture is actually poisonous, an imbiber who avoids becoming poisoned recovers from minor injuries. Snake Oil  Type poison (contact); Save Fortitude DC 12   Onset 1 round; Frequency 1/minute for 5 minutes   Effect On a failed save, snake oil deals 1 point of nonlethal damage. However, on a successful save, the toxin heals 1d6 points of nonlethal damage; Cure 1 save"],
                    "dc": 20,
                    "gp": 20,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Snake oil"
                },
                {
                    "name": "Sparkle smoke",
                    "desc": ["When inhaled, this incense causes creatures to see dazzling auras around light sources, drawing their attention to such illumination as the moon or stars and away from other nearby creatures. Any creature inhaling sparkle smoke that fails a DC 15 Fortitude saving throw takes a –4 penalty on Perception checks to notice creatures smaller than itself in areas of at least dim light for 1 hour. Crafting a dose of sparkle smoke requires a successful DC 15 Craft (alchemy) check."],
                    "dc": 15,
                    "gp": 25,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Sparkle smoke"
                },
                {
                    "name": "Speech resin",
                    "desc": ["Chewing this gummy substance grants you 1d4 uses of alchemical inspiration that can be used only on Charisma-based skill checks. This benefit lasts for 1 hour, during which you must roll all Wisdom-based skill checks twice and take the worse result."],
                    "dc": 25,
                    "gp": 410,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Speech resin"
                },
                {
                    "name": "Spider sac",
                    "desc": ["Despite their name, spider sacs have nothing to do with spiders but rather are alchemical devices with a unique delivery system. Used for climbing as well as combat, these grayish, gourdlike pouches are made of a specially grown fungus with a tough but rubbery exterior. The fungoid is carefully harvested, pierced at one end, hollowed out, and then injected with a strong alchemical adhesive that hardens to a fibrous material almost instantly when exposed to air. When squeezed, a spider sac's adhesive shoots out to a maximum range of 10 feet and sticks to whatever it strikes, whereupon the strand dries instantly into a durable fibrous rope. For the purposes of climbing, treat a spider sac as a grappling hook except that all surfaces are AC 5. A spider sac can also be used as a lasso except with AC 10, 4 hit points, and a DC 24 Strength check to burst. A spider sac is a single-use item."],
                    "dc": 20,
                    "gp": 30,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Spider sac"
                },
                {
                    "name": "Spiderdraw",
                    "desc": ["This alchemical fluid is viscous and clear, and it emits a strong chemical smell when exposed to air. Vermin are attracted to it and perceive anything marked with it as prey. Spiders, insects, and similar vermin gain a +5 bonus on Perception checks and attack rolls against a creature marked with spiderdraw; if these creatures have the scent ability, they can detect a marked creature at five times the normal range, note its direction as a free action, and pinpoint it when it is within 25 feet.   Drow sometimes use spiderdraw as a contact poison or splash weapon against opponents, allowing vermin to focus on the marked targets while the drow retreat, regroup, or move to a more advantageous position. Washing off the spiderdraw is a full-round action requiring at least a gallon of water or other suitable washing liquid; otherwise, the effects last for 1 hour.   Crafting spiderdraw requires a successful DC 20 Craft (alchemy) check."],
                    "dc": 20,
                    "gp": 40,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Spiderdraw"
                },
                {
                    "name": "Spirit of glass",
                    "desc": ["This fiber is composed of tiny strands of razor-sharp glass laced with alchemical elements. Anyone who touches it finds her skin irritated by countless tiny abrasions. Though it causes only minor discomfort, it opens the skin enough for poison to seep through, allowing injury poisons to be delivered to the affected creature as if they were contact poisons. The abrasions last for 1 hour or until cleaned and treated with a successful DC 10 Heal check (a full-round action). Poisoners sometimes place spirit of glass in a target’s wardrobe or amid her personal effects along with a rag soaked in poison. Spirit of glass is often mistaken for lint or loose cloth, though it and the abrasions it causes can be identified with a successful DC 15 Craft (alchemy) check or DC 17 Heal check. Spirit of glass can be used only once before it is expended."],
                    "dc": 25,
                    "gp": 35,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Spirit of glass"
                },
                {
                    "name": "Spiritbane spike",
                    "desc": ["When you slash this alchemically treated iron spike against your flesh—a move action that deals 1d6 points of damage— the spike extends and becomes a short sword with the ghost touch weapon special ability. The spike reverts to its old form after 10 minutes, corroded and useless. Should a spiritbane spike rematerialize within a corporeal body, it is shunted to the nearest empty space without effect. Crafting this item requires a successful DC 25 Craft (alchemy) check."],
                    "dc": 25,
                    "gp": 300,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Spiritbane spike"
                },
                {
                    "name": "Spirit-vision ink",
                    "desc": ["Originally developed by kami-revering priests to write prayer scrolls, this pale ink is now often used by ninjas to mark locations or leave messages. Once spirit-vision ink dries, it becomes completely invisible. To invisible creatures, however, writing in spirit-vision ink shimmers with a rich azure hue."],
                    "dc": 30,
                    "gp": 25,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Spirit-vision ink"
                },
                {
                    "name": "Stagnant fog sack",
                    "desc": ["Gathered within this tightly woven, alchemically treated canvas sack is a sample of the pervasive fetid fog that looms near the border of the Plane of Air and the Plane of Water. When opened, the fog billows out in a 30-foot-radius area. Sight is extremely limited in an area of stagnant fog. A creature within 15 feet has concealment (20% miss chance), while creatures farther away have total concealment (50% miss chance, and the attacker can’t use sight to locate the target). In addition, creatures that end their turn within the cloud must succeed at a DC 14 Fortitude save or become sickened for 1 round. Stagnant fog dissipates naturally after 1 minute. A moderate wind (11+ mph) disperses the stagnant fog in 1 round. This item can be crafted with a successful DC 20 Craft (alchemy) check."],
                    "dc": 20,
                    "gp": 80,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Stagnant fog sack"
                },
                {
                    "name": "Stalker's oil",
                    "desc": ["This is a clear, viscous liquid that is typically kept in a frosted glass vial with an unassuming label and cork. The oil is used to reduce the sound armor and weapons make while moving. Applying this oil to a single piece of equipment takes 1 minute and grants the wearer a +2 circumstance bonus on Stealth checks for 30 minutes. A vial of this oil is enough to coat one Medium piece of equipment, while a Large piece of equipment requires 4 vials. Two pieces of Small equipment can be covered with a single vial of oil. Exposure to or submersion in large amounts of water, such as swimming, immediately ends the effect of the oil."],
                    "dc": 1,
                    "gp": 50,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Stalker's oil"
                },
                {
                    "name": "Static wool",
                    "desc": ["Alchemical compounds in this square of jagged, metallic fibers store and transfer electricity into clothing when rubbed against the fabric for 1 minute. When you are grappled within the next 10 minutes while wearing this electrically charged clothing, as well as light armor or no armor, the electricity discharges. This deals 1 point of nonlethal electricity damage to the grappling creature, and if it takes damage from the effect, it must succeed at a DC 20 combat maneuver check to grapple or immediately release you. The DC increases to 22 against a creature with the grab ability. A single square of static wool can be used five times before expending its alchemical compounds."],

                {

                    "desc": ["This gritty, gray ointment weakens rocky materials. When applied to an object made of stone, it reduces the object's hardness by 3 for 10 minutes. As a standard action, a creature can apply the paste to affect one 5-foot-square or a Medium or smaller creature. The paste only affects hardness, not damage reduction or similar defenses."],

                {
                    "name": "Sun cinder",
                    "desc": ["Sun cinder is a fine powder that glows faintly when exposed to light. One bag of this alchemically created talc contains 5 uses. When opened, it shines like a candle. If sprinkled on a torch or similar flame, 1 dose of sun cinder increases the light level of the area that flame illuminates by one additional step, up to bright light. This increased illumination lasts for 1 minute. Multiple doses of sun cinder can be used to further increase the light shed by the same source. A single dose of sun cinder does not affect flames larger than a torch. Sun cinder doesn’t affect a light source’s ability to penetrate magical darkness. Crafting 5 doses of sun cinder requires a successful DC 20 Craft (alchemy) check."],

                {
                    "name": "Sunderblock",
                    "desc": ["This lumpy, lardlike, alchemical substance is designed to protect armor and weapons from dents and cracks that commonly develop in close-combat equipment. When liberally applied to armor or weapons, the material provides a greasy surface that blunts impacts, causes blades to slide aside, and strengthens the gear it is applied to. A single container holds enough sunderblock to coat a single weapon or suit of armor as a full-round action. The effects aren’t pronounced enough to increase the Armor Class bonus of a suit of armor, but the hardness of armors and weapons coated with sunderblock increases by 5. This bonus lasts for 12 hours, at which point the greasy substance dries and flakes away."],
                    "dc": 1,

                {
                    "name": "Sunrod",
                    "desc": ["This 1-foot-long, gold-tipped iron rod glows brightly when struck (a standard action). It sheds normal light in a 30-foot radius and increases the light level by one step for an additional 30 feet beyond that area (darkness becomes dim light and dim light becomes normal light). A sunrod does not increase the light level in normal light or bright light. It glows for 6 hours, after which the gold tip is burned out and worthless."],

                {

                {
                    "name": "Thunder kettle",

                    "dc": 25,

                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Thunder kettle"

                {
                    "name": "Tiller's gum",

                    "gp": 100,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Tiller's gum"

                {
                    "name": "Tracking powder",
                    "desc": ["When you scatter this very fine pale blue powder on the ground, it reveals the tracks of any creatures or individuals that have passed through the area within the last 48 hours. The powder also grants you a +10 alchemical bonus on Survival checks to follow tracks or, if you aren’t trained in Survival, instead allows you to track creatures whose prints are revealed by the powder for up to 1 mile using Perception instead of Survival. A single application can cover an area of up to 60 square feet. Tracking powder is sold in small leather pouches that hold 10 applications each."],

                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Tracking powder"
                },
                {
                    "name": "Trailscent kit",
                    "desc": ["This small box of specially prepared catfolk pheromones and alchemical reagents can be used to leave a small group of subtle but long-lasting scents that only catfolk can smell and decipher. Given a minute, a catfolk can create a scent mixture and apply it to a solid object, such as a tree, a wall, or even a smaller item such as a weapon or potion vial. When the catfolk does this, it leaves one of the following scent impressions: danger, food, shelter, or possession. The possession impression is always keyed to the specific catfolk using the kit, and signifies that she owns the territory or item. Other races can attempt to use this kit to create the danger, food, or shelter impression, but doing so requires a successful DC 20 Craft (alchemy) check. A catfolk can detect a particular scent applied with a trailscent kit from 30 feet away. If the scent is upwind, the range at which a catfolk can detect the scent increases to 60 feet; if it is downwind, the range drops to 15 feet. A catfolk with the scent racial quality doubles those distances. A scent impression lasts for 1 year or until it is washed away. Each kit has 10 uses."],

                {
                    "name": "Artokus's fire",
                    "desc": ["This congealed incendiary functions like alchemist’s fire, but its white-hot flames deal 2d6 points of fire damage on a direct hit and 1d6 points of splash damage to adjacent creatures.    Mythic : You can expend one use of mythic power while throwing a flask of Artokus’s fire to cause the substance to burn hotter and longer than normal. A creature struck by a direct hit of Artokus’s fire must succeed at a DC 15 Reflex save or continue to take 1d4 points of fire damage each round at the beginning of its turn. A burning creature can attempt a new save as a full-round action. This effect lasts for a number of rounds equal to the user’s mythic tier, and otherwise acts as the burn universal monster rule ( Pathfinder RPG Bestiary 298). Artokus’s fire used in this way burns even underwater, offering no relief to creatures that try to extinguish the fire by dousing or immersing themselves in water."],

                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Artokus's fire"
                },
                {
                    "name": "Blanch bomb (adamantine)",
                    "desc": ["The nearly invisible gas contained in this fragile glass sphere temporarily but drastically deteriorates the defenses—both manufactured and natural—of those affected. A blanch bomb is effective only against a target that is vulnerable to the type of blanch bomb employed against it. A blanch bomb is thrown as a splash weapon with a range increment of 10 feet. Upon contact with a hard surface, the blanch bomb releases a hazy cloud of gas within a 10-foot-radius burst centered on the point of impact. This cloud lasts for 1d4+1 rounds and can be dispersed as fog cloud. If a creature whose damage reduction is overcome by the specified substance begins its turn in the affected area, the subject’s DR/adamantine, DR/cold iron, or DR/silver (depending on the type of blanch bomb used) degrades at a rate of 1 point per round for as long as the creature remains in the area (to a minimum of DR 0). If the subject ends its turn outside the affected area, the creature’s damage reduction returns to its original amount at a rate of 1 point per round.    Mythic : You can expend one use of mythic power while throwing a blanch bomb to infuse the item with mythic power. When the blanch bomb activates, creatures in the area with the matching DR vulnerability must succeed at DC 16 Reflex saves or their DR is immediately reduced by an amount equal to 1/2 your mythic tier. The gas created by the blanch bomb lasts an additional number of rounds equal to your mythic tier, and it cannot be dispersed by wind. Non-mythic subjects who leave the affected area regain their DR at a rate of 1 point per minute."],

                },
                {
                    "name": "Elemental brine",
                    "desc": ["This alchemical substance is produced from saltwater from the Plane of Water. It has no effect on natives of that plane, but grants unusual properties when consumed by creatures from the Material Plane.   Any creature with the water affinity racial trait, including undines, that drinks elemental brine finds her innate magic bolstered. If the creature is a sorcerer with the elemental (water) bloodline, she casts her bloodline powers and spells at +1 caster level. If the creature is a cleric with the Water domain, she treats her Wisdom modifier as 2 points higher for Water domain powers and spells. This does not grant early access to level-based powers; it only affects powers that she could already use without this trait. This benefit lasts 24 hours.   Creatures with the aquatic subtype that imbibe elemental brine become immune to poison, although poisons active when the brine is imbibed still run their course. If the creature dwells in saltwater, it also becomes undetectable by scent for the same duration. Both of these effects last 24 hours.   Finally, elemental brine can be used as a splash weapon with a range increment of 10 feet. While it has little effect on most creatures (other than soaking them in salty water) when used in this way, a bottle of elemental brine is quite lethal if it’s flung at a creature with the fire subtype. On a direct hit, a creature with the fire subtype takes 2d6 points of damage, and creatures with the fire subtype in adjacent squares take 1d4 points of damage. In addition, a direct hit against a creature with the fire subtype creates a unique interplay between elemental brine’s salt and water and the creature’s flames, making the target more conductive and thus more susceptible to electrocution. Anytime the target would take electricity damage within the next minute, it must succeed at a DC 20 Reflex save or take 1-1/2 times as much electricity damage as normal."],

                {

                    "desc": ["A fiery boulder is a large, roughly boulder-shaped version of alchemist’s fire favored by giants. A direct hit from a fiery boulder deals 2d6 points of fire damage and 5 points of fire damage to every creature affected by its splash damage. All creatures affected by a fiery boulder’s direct damage take an additional 2d6 points of fire damage the following round; affected creatures can use a full-round action to attempt to extinguish the flames before taking this additional damage. Greater Splash Weapon This splash weapon works in some ways like a normal splash weapon ( Pathfinder RPG Core Rulebook 202), but its effects cover a larger area. Like a normal splash weapon, a greater splash weapon requires no weapon proficiency, and you throw it by making a ranged touch attack. A hit deals direct hit damage to the target and to creatures and objects in squares within 5 feet of that target. It then deals splash damage to all creatures within 10 feet of the target. If the target takes up more than a 5-foot square, you can chose one of its squares as the center of the effect. The direct damage affects the squares normally, so a Large or larger creature could take both the direct damage and the splash damage depending on the square you choose. The splash damage for a greater splash weapon is 5 points of the appropriate damage type for the weapon.   Like a normal splash weapon, you can also choose to target a specific grid intersection (treating it as a ranged attack against AC 5). If it hits, the greater splash weapon deals direct damage to creatures and objects in squares within 5 feet of the targeted intersection, and splash damage to creatures within 10 feet of the targeted intersection. As with a normal splash weapon, you cannot target a grid intersection occupied by a creature.   Greater splash weapons can be thrown as if they were a rock using the rock throwing universal monster rule ( Pathfinder RPG Bestiary 303), and caught with rock catching ( Bestiary 303), though the DC to catch a greater splash weapon is 10 higher than normal due to its fragile and volatile nature. If a creature fails its Reflex saving throw to catch a greater splash weapon, the weapon automatically breaks, treating the creature attempting to catch it as the splash weapon’s target.   A greater splash weapon can be used only by Large or larger creatures, though it can be used as ammunition in a catapult or trebuchet. When used as ammunition in one of these siege engines, use the range for the engine rather than the greater splash weapon’s range."],

                    "name": "Noxious pig",

eature fails its Reflex saving throw to catch a greater splash weapon, the weapon automatically breaks, treating the creature attempting to catch it as the splash weapon’s target.   A greater splash weapon can be used only by Large or larger creatures, though it can be used as ammunition in a catapult or trebuchet. When used as ammunition in one of these siege engines, use the range for the engine rather than the greater splash weapon’s range."],

                {
                    "name": "Perfect ice",
                    "desc": ["This vial contains a large snowflake that melts only at temperatures of 140 degrees Fahrenheit or above. Perfect ice is an alchemically engineered form of water that briefly converts any moisture it touches into a similar state. When a flask of perfect ice is opened or broken (such as by being thrown as a splash weapon), the snowflake within expands rapidly, forming a layer of ice and snow with a 60-foot radius along any nearby surface. Any living creature that touches an area of perfect ice or starts its turn in a space of perfect ice takes 4d6 points of damage from desiccation as some of the water in its body crystallizes (Fortitude DC 18 half). Creatures with the water subtype take half again as much damage (150%) and receive no saving throw. The ice crystals that form along flat surfaces are large and strong, and are treated as caltrops. The ice persists for 10 minutes, after which it vaporizes or reverts to a normal state for its temperature. To avoid the hazards of its large area of effect, many users propel the vial from a launching crossbow ( Pathfinder Player Companion: Adventurer’s Armory 4) or use similar means to extend their throwing range."],
