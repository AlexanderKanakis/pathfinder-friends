                {
                    "name": "Plague powder",
                    "desc": ["This ash-gray powder is refined from the crushed bones of creatures that died of virulent diseases, illegally produced by nefarious alchemists, and sold on the black market to those seeking to spread illness and death. The application of the powder depends on the disease from which it is refined. Someone using powder made from diseases contracted by ingestion must apply it to food (a full-round action) for the victim to consume. Those using powder made from diseases contracted by injury must apply the powder to weapons (a standard action, as per the poison application rules) and deal damage to victims to subject them to the contagion. Diseases contracted by inhalation require the user to disperse the powder by throwing it into the air. Throwing a handful of plague powder is a splash attack with a range increment of 5 feet. Anyone standing in the square of impact must succeed at a save with a DC equal to that of the disease from which the powder is made to avoid contracting the illness, while those in adjacent squares must attempt the same save with a +4 bonus. Diseases spread through contact can use any of the three manners of application.   The most common disease refined for these powders is filth fever, costing 144 gp, but refined plague powders of other diseases are available, with a price equal to the base save DC of the disease squared. Making a plague powder always requires access to a sample of the disease and exposes the creator to the disease in question each day of crafting. Crafting a dose of plague powder requires a successful DC 25 Craft (alchemy) check."],

                {

                {
                    "name": "Pox burster",
                    "desc": ["A pox burster is an alchemically preserved animal bladder or gourd that has been filled with toxic, rotting materials. You can throw a pox burster as a splash weapon. Treat this attack as a ranged touch attack with a range increment of 10 feet. A direct hit forces a target to immediately make a DC 13 Fortitude save or contract filth fever. Every space adjacent to the target square of the pox burster is covered in disease-causing filth. For the next minute, any creature that is injured while in one of these spaces must also make a DC 9 Fortitude save or contract filth fever."],

                {
                    "name": "Shadowcloy flask",
                    "desc": ["This thin black liquid is stored in airtight flasks because it evaporates quickly when exposed to air. Its cloying vapors cling to a target, obscuring vision for a short period of time. You can throw a shadowcloy flask as a splash weapon with a range increment of 10 feet. A direct hit means the target treats the ambient light as one category darker than normal , with a creature already in natural darkness treating it as supernatural darkness. This effect lasts for 1 round. A thrown shadowcloy flask has no effect on adjacent creatures or if it misses."],

                {
                    "name": "Tangleburn bag",
                    "desc": ["This sack contains tanglefoot bag materials and alchemical powders that burn at a high temperature. It functions like a tanglefoot bag, plus a direct hit on a creature deals 1d6 points of fire damage, and the creature must make a DC 20 Reflex save or catch on fire. If it catches on fire, for the next 2 rounds extinguishing the flames is a DC 25 Reflex save instead of a DC 15 save, and using water to extinguish the flames creates a burst of burning material equivalent to alchemist’s fire making a direct hit on the target (including splash damage). After the initial 2 rounds, the flames may be extinguished as normal. Crafting this item is a DC 30 Craft (alchemy) check."],

                {
                    "name": "Tanglefoot bag",
                    "desc": ["A tanglefoot bag is a small sack filled with tar, resin, and other sticky substances. When you throw a tanglefoot bag at a creature (as a ranged touch attack with a range increment of 10 feet), the bag comes apart and goo bursts out, entangling the target and then becoming tough and resilient upon exposure to air. An entangled creature takes a –2 penalty on attack rolls and a –4 penalty to Dexterity and must make a DC 15 Reflex save or be glued to the floor, unable to move. Even on a successful save, it can move only at half speed. Huge or larger creatures are unaffected by a tanglefoot bag. A flying creature is not stuck to the floor, but it must make a DC 15 Reflex save or be unable to fly (assuming it uses its wings to fly) and fall to the ground. A tanglefoot bag does not function underwater.   A creature that is glued to the floor (or unable to fly) can break free by making a DC 17 Strength check or by dealing 15 points of damage to the goo with a slashing weapon. A creature trying to scrape goo off itself, or another creature assisting, does not need to make an attack roll; hitting the goo is automatic, after which the creature that hit makes a damage roll to see how much of the goo was scraped off. Once free, the creature can move (including flying) at half speed. If the entangled creature attempts to cast a spell, it must make a concentration check with a DC of 15 + the spell’s level or be unable to cast the spell. The goo becomes brittle and fragile after 2d4 rounds, cracking apart and losing its effectiveness. An application of universal solvent to a stuck creature dissolves the alchemical goo immediately. Crafting this item is a DC 25 Craft (alchemy) check."],

                {
                    "name": "Tar bomb",
                    "desc": ["A tar bomb is an easy weapon to make, and devastating in use. A head-sized lump of tar is wrapped around a rope and set on fire. You use the rope to lob the burning tar onto an enemy’s deck, where it sticks and sets the ship alight. In many ways, a tar bomb functions as a less potent version of alchemist’s fire, as it deals less damage and lacks the splash damage of the more expensive substance. Treat this attack as a ranged touch attack with a range increment of 10 feet. Lighting a tar bomb is a move action.   A hit with a tar bomb deals 1d4 points of fire damage and has the potential to set the struck object or creature on fire, causing an additional 1d6 points of fire damage each round unless the target or an adjacent creature makes a DC 15 Reflex save to extinguish the flames as a full-round action. Knocking the tar bomb or the burning creature or object into a body of water or magically extinguishing the flames automatically smothers the fire."],

                {

                    "desc": ["Each pot of this slick black goo has sufficient contents to cover one Medium creature or two Small ones. If you coat yourself in alchemical grease, you gain a +5 alchemical bonus on Escape Artist checks, on combat maneuver checks made to escape a grapple, and to your CMD to avoid being grappled; this lasts 4 hours or until you wash it off."],
                    "dc": 15,
                    "gp": 5,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Alchemical grease"
                },
                {
                    "name": "Alchemical preserves",
                    "desc": ["Each small tin of this specially treated jam contains just enough of the gooey stuff to provide a halfling with a single serving of revitalizing nourishment. While any creature can eat these preserves as a standard action, it only affects halflings in a beneficial way. Halflings who eat the preserves recover from fatigue. Non-halflings who eat alchemical preserves become sickened for 1 round."],
                    "dc": 20,
                    "gp": 50,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Alchemical preserves"
                },
                {
                    "name": "Alchemist's kindness",
                    "desc": ["Favored by young rakes and other well-to-do inebriates, this crystalline powder resembles salt. Mixed with water, it makes a fizzing cocktail that eliminates the effects of a hangover within 10 minutes of drinking it."],
                    "dc": 20,
                    "gp": 1,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Alchemist's kindness"
                },
                {
                    "name": "Ambrosia (vial)",
                    "desc": ["Upon consumption, this heavenly elixir, brewed from holy water and blessed herbs, grants a +2 sacred bonus on saving throws against negative energy, energy drain, and death effects for 1 hour, including saves to remove negative levels. Ambrosia affects undead and evil outsiders as holy water."],
                    "dc": 25,
                    "gp": 100,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Ambrosia (vial)"
                },
                {
                    "name": "Anderos salve and mulibrous tincture",
                    "desc": ["Anderos salve and mulibrous tincture are two very different alchemical concoctions with contrary but similar goals: refining the mortal body and quieting mental stresses. Anderos salve is a gray paste applied to the arms or chest that helps restore youthful vigor, while mulibrous tincture is a bitter, minty tea that eases pain and softens skin. If a dose of anderos salve is applied at least twice per week over a period of months, the user’s feminine secondary sex characteristics are gradually reduced and masculine ones develop; imbibing mulibrous tincture in this way reduces the drinker’s masculine secondary sex characteristics and feminine ones develop. Taking a dose of each concoction every week instead softens all secondary sex characteristics, causing the user to take on an androgynous appearance. After a period of 6 months, the transformation is permanent, with no further doses required to maintain the new form.   While these alchemical solutions do not cause as swift or extensive a change as magical alternatives, they are far more affordable, especially among the Rivethun, who often teach the process of their creation to their disciples."],
                    "dc": 1,
                    "gp": 5,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Anderos salve and mulibrous tincture"
                },
                {
                    "name": "Anesthetic wine",
                    "desc": ["This alchemical anesthetic, developed from ancient recipes for Sarenite sacred wine, grants a powerful resistance to pain. For 1 hour after drinking anesthetic wine, you gain a +5 bonus on saving throws against pain effects, and when you would take nonlethal damage, reduce the amount of damage taken by 1."],
                    "dc": 20,
                    "gp": 50,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Anesthetic wine"
                },
                {
                    "name": "Antidote",
                    "desc": ["Generally stored in a glass vial, an antidote is formulated to counteract a specific poison chosen at the time of the antidote’s creation. Drinking the antidote grants a +10 alchemical bonus on saving throws against that poison for 4 hours. If the imbiber succeeds at a saving throw with this bonus, she is automatically cured even if she would not normally be cured by successful saving throws or the number required to cure her has not been met yet. However, the antidote has no effect against other poisons. An antidote’s price is half that of the poison it counteracts. An antidote has no effect against a magical poison. The Craft (alchemy) DC to create an antidote is equal to the save DC of the poison."],
                    "dc": 1,
                    "gp": 9999,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Antidote"
                },
                {
                    "name": "Antiemetic snuff",
                    "desc": ["This snuff can be used to shake off the effects of nausea. If you take it before being exposed to an effect that would give you the nauseated condition and allows a saving throw, you attempt two saving throws against the effect and take the higher result. A single dose provides this benefit for 1 hour."],
                    "dc": 25,
                    "gp": 50,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Antiemetic snuff"
                },
                {
                    "name": "Antiplague",
                    "desc": ["If you drink a vial of this foul-tasting, milky tonic, you gain a +5 alchemical bonus on Fortitude saving throws against disease for the next hour. If already infected, you may also make two saving throws (without the +5 bonus) that day and use the better result."],
                    "dc": 25,
                    "gp": 50,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Antiplague"
                },
                {
                    "name": "Antitoxin",
                    "desc": ["This substance counteracts a specific toxin. If you drink a vial of antitoxin, you gain a +5 alchemical bonus on Fortitude saving throws against poison for 1 hour."],
                    "dc": 25,
                    "gp": 50,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Antitoxin"
                },
                {
                    "name": "Antivenom",
                    "desc": ["While antitoxin, as presented in the Pathfinder RPG Core Rulebook , presents a generalized tool for protecting oneself from poison, more specialized antivenoms can provide even greater protection against specific poisons. Creating a dose of antivenom requires a dose of the specific poison that the antivenom is designed to protect against.    Antivenom Effects : A single dose of antivenom automatically neutralizes the first exposure of the specific poison it is made to combat and provides a +8 alchemical bonus on saving throws against additional exposure to that specific poison; this bonus decreases by 1 every hour, until the effect ends after 8 hours.    Crafting Antivenom : To create a dose of antivenom, a living creature must first be exposed to a half dose of the poison in question. The creature suffers the poison’s effects normally, except the saving throw DC to resist the poison is reduced by 2. In order to be able to produce antivenom, the creature must succeed at the necessary saving throws to be cured of the poison. If the poison’s duration expires without the creature being cured, no antivenom can be harvested. Once the creature has resisted the poison’s effects, a viable sample of the creature’s blood can be extracted with a successful DC 20 Craft (alchemy) or Heal check. This blood must then be refined to extract the natural antibodies that combat the poison in a process that takes 1 hour and requires a successful Craft (alchemy) check (DC = 5 + the poison’s saving throw DC). Success yields 1 dose of antivenom. Antivenom can also be harvested in the same fashion from a creature that has been afflicted by a full dose of poison, rather than a creature deliberately given a half dose for this purpose. Regardless of how much poison the creature is exposed to, the antibodies in its system can be harvested only for 24 hours after it has recovered from the poison.    Purchasing Antivenom : Antivenom is not particularly expensive, but because it is highly specialized, it can be difficult to find. A dose of antivenom has a market price equal to half the market price of a dose of the poison in question, but it is treated as though its price were five times the market price of the poison for the purposes of determining its availability in any given settlement. Alternatively, if 1 or more doses of the poison in question can be provided, most alchemists will supply as much antivenom as they can produce from the doses for a fee of 10% of the market price of the poison."],
                    "dc": 9999,
                    "gp": 9999,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Antivenom"
                },
                {
                    "name": "Applecheek",
                    "desc": ["This sticky-sweet syrup is distilled from ivy and rabbit musk, and causes a mild allergic reaction in halflings. The slight swelling— especially in the face—and mild redness it induces makes the face seem younger, granting a halfling who drinks a dose of applecheek a +2 alchemical bonus on Disguise checks to look like an elven, half-elven, or human child. The effects of a dose of applecheek persist for 24 hours. Crafting a dose of applecheek requires a successful DC 15 Craft (alchemy) check."],
                    "dc": 15,
                    "gp": 10,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Applecheek"
                },
                {
                    "name": "Aquemir",
                    "desc": ["A popular export from the Forest of Oils—a field of massive oil bubbles on the Elemental Plane of Water—aquemir is a transparent substance extracted from the skins of autonomous oil orbs and refined into a useful alchemical reagent. As a standard action, aquemir can be mixed with an alchemical remedy, extract, or potion to delay the start of its effects by 2 minutes when it is imbibed. Administering a potion or extract that’s properly infused with aquemir requires 1 dose of aquemir per spell level to function in this way, whereas an alchemical remedy only requires 1 dose. If not enough aquemir is mixed with a potion or extract, the potion or extract’s effects are not delayed at all. A creature can internally store only one substance that uses aquemir; further attempts waste all imbibed substances (and immediately render inert all potions, extracts, alchemical remedies, and so on) and cause the creature to become nauseated for 1d4 rounds. Crafting this item requires a successful DC 30 Craft (alchemy) check."],
                    "dc": 30,
                    "gp": 150,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Aquemir"
                },
                {
                    "name": "Bladeguard",

                    "gp": 40,

                {

                {

                {

                {

                {
                    "name": "Chameleon ointment",

                {

                {

                    "dc": 15,
                    "gp": 30,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Distilled terrap sap"
                },
                {
                    "name": "Essence of independence",
                    "desc": ["When ingested, this thin serum awakens your potential for independent action. If you are under the influence of a mindaffecting effect, you receive a new saving throw with a +4 alchemical bonus to break the effect (you can gain this benefit only once per day). If the serum is ingested by a bonded creature such as a familiar, animal companion, bonded mount, or homunculus, the creature ceases to be bound to its master’s will for 10 minutes. It gains a +2 morale bonus on attack rolls, saving throws, skill checks, and ability checks, and becomes interested in finding its own way of doing things. Its attitude toward its master might change drastically during this time, depending on how the master has treated it in the past. As soon as the duration of this effect ends, the creature becomes bound to its master’s will again."],
                    "dc": 25,
                    "gp": 80,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Essence of independence"
                },
                {
                    "name": "Eye drops of the unseen master",
                    "desc": ["This bright pink liquid can be added to the eyes of a willing homunculus as a standard action. If you are the homunculus’s master, you gain the ability to see through the homunculus’s eyes by closing yours and concentrating, and the homunculus can see through yours in the same fashion. The eye drops also extend the range of the homunculus’s telepathic link to 1 mile. The effects of the eye drops fade after 1 day."],
                    "dc": 25,
                    "gp": 150,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Eye drops of the unseen master"
                },
                {
                    "name": "Fire ward gel",
                    "desc": ["When you apply this thin gel to your skin, armor, or clothing, it creates a resistant barrier that protects you from fire or heat damage. You gain fire resistance 5. The gel burns away as it absorbs fire damage; when it absorbs a total of 20 points of fire damage, it is discharged. Fire ward gel counts as protection from energy for the purpose of stacking multiple fire protection effects. Applying fire ward gel takes 1 minute, and it lasts for 1 hour before losing its potency. Multiple applications of fire ward gel do not stack; applying more while a dose is active merely resets the potential amount of fire damage absorbed to 20 points."],
                    "dc": 25,

                {

                    "dc": 20,
                    "gp": 20,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Fortifying brew"

                {

                    "dc": 1,

                },
                {
                    "name": "Fury drops",
                    "desc": ["Anointing a creature’s eyes with a dose of fury drops causes it to immediately fly into a rage for 1d6 rounds, granting it a +2 alchemical bonus to Strength and Constitution, a +1 alchemical bonus on Will saves, and a -2 penalty to AC. The effect is otherwise identical to a barbarian’s rage, and creatures are fatigued at the end of the rage. Only creatures with an Intelligence score of 1 or 2 can be affected by fury drops."],
                    "dc": 25,
                    "gp": 50,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Fury drops"
                },
                {
                    "name": "Gildea myrrh",
                    "desc": ["Known colloquially as “healing myrrh,” gildea myrrh is the most famous invention of the scholars of Katheer’s Venicaan College of Medicaments and Chirurgery.   When you burn a dose of gildea myrrh, it fills a 15-foot-radius spread with faint smoke that persists for 24 hours (or until dispersed by a moderate or stronger wind). Any creatures resting or receiving long-term care in the area while the myrrh is active regain 1 additional hit point per level. Multiple uses of gildea myrrh in a 24-hour period do not stack."],
                    "dc": 1,
                    "gp": 50,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Gildea myrrh"
                },
                {
                    "name": "Icecap ale",
                    "desc": ["This rare and unusual brew is fortified by a process of repeated partial freezing, during which the ice is continually skimmed off, resulting in a draught with more than 10 times the alcohol content of ordinary ale. Icecap ale grants a +2 alchemical bonus to the drinker’s Strength and Constitution for 1 minute, as well as a +4 alchemical bonus on saving throws against compulsions and fear. However, after this initial surge of energy, the drinker becomes fatigued and takes a –4 penalty on Dexterity- and Strength-based skill checks for 1 hour. In addition, the drinker loses all memory of events that transpired during the 1d4 minutes directly following consumption of a draught of icecap ale; a successful DC 20 Fortitude save negates this memory loss. Additional doses of icecap ale imbibed during the hour following an initial dose cause the drinker to become sickened for 1 minute (instead of gaining a bonus to Strength and Constitution) and to suffer all the negative effects of icecap ale."],
                    "dc": 20,
                    "gp": 40,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Icecap ale"
                },
                {
                    "name": "Iniquitous panacea",

                    "dc": 1,
                    "gp": 200,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Iniquitous panacea"
                },
                {
                    "name": "Insight leaves",

                    "dc": 25,
                    "gp": 50,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Insight leaves"
                },
                {
                    "name": "Lantern honey",
                    "desc": ["This alchemically enhanced honey is typically transported in small, lantern-shaped containers capable of holding up to 3 doses of honey. A single dose of lantern honey functions as normal antitoxin, except that it also provides immunity to drow poison for 1 hour after consumption."],
                    "dc": 1,
                    "gp": 150,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Lantern honey"
                },
                {
                    "name": "Liquid breeze",
                    "desc": ["Developed in ancient times to ease travels across the harsh deserts of Kelesh, liquid breeze is a common ware in markets catering to travelers, adventurers, and explorers. This soothing liquid grants the benefits of endure elements for 8 hours, but only against hot environments. This effect is nonmagical and can’t be dispelled."],

                },
                {
                    "name": "Longbeard lambic",
                    "desc": ["One of the oldest known dwarven ales, longbeard lambic is fermented with wild airborne yeasts and cultures, especially those that proliferate in the dank caves where it has been brewed since long before the Quest for Sky began. Longbeard lambic has a bracing effect that shocks the system. If the drinker is fatigued, shaken, or staggered, she can ignore these conditions for 1d4 rounds after imbibing longbeard lambic. In addition, a dose of longbeard lambic can reduce the exhausted condition to fatigued or the frightened condition to shaken (drinker’s choice) for the same duration. If you consume a second longbeard lambic within 1 minute of the previous dose, you must succeed at a DC 15 Fortitude save or be nauseated for 1d4 rounds. The DC increases by 5 for each dose imbibed within the same time span. Dwarves gain a +5 racial bonus on this saving throw."],
                    "dc": 18,
                    "gp": 20,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Longbeard lambic"
                },
                {
                    "name": "Loping ointment",

                    "dc": 25,
                    "gp": 60,

                {

                    "dc": 20,
                    "gp": 30,

                },
                {
                    "name": "Mellowroot (vial)",
                    "desc": ["Sneaky goblin chieftains give this orange paste to the tribe's warriors before proposing a particularly bold raid. Consuming mellowroot causes a euphoric feeling that makes you feel invulnerable. For 1 hour after consuming mellowroot, you gain a +5 alchemical bonus versus fear effects. However, while under the effects of mellowroot, you must make a DC 15 Will saving throw when you try to leave the threatened area of an opponent. If you fail the saving throw, you cannot leave the threatened area with that action but do not lose the action."],
                    "dc": 20,
                    "gp": 25,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Mellowroot (vial)"
                },
                {
                    "name": "Memory incense",
                    "desc": ["This purple incense is a powerful aid to amnesiacs and those prone to nocturnal fits. A creature that sleeps for at least 1 hour within 10 feet of burning memory incense retains any memories accrued within the next 24 hours, even those that would normally be lost to effects such as lycanthropic transformation. In addition, the creature gains a +4 alchemical bonus on saving throws against effects that modify or erase memories for this duration. A single stick of memory incense can burn for 4 hours. Crafting this item requires a successful DC 20 Craft (alchemy) check."],
                    "dc": 20,
                    "gp": 50,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Memory incense"
                },
                {
                    "name": "Muscle grout",
                    "desc": ["A gritty salve with an earthy odor, muscle grout is frequently sold in areas where giant spiders or ropers haunt local trade routes. When massaged into the muscles as a full-round action, this ointment provides a +2 alchemical bonus on saving throws to resist nonmagical effects that cause Strength damage. Any Strength damage you take manifests gradually as the salve slows muscle decay; anytime you take Strength damage, you take only 1 point per round until the full amount of damage is dealt. Additional Strength damage adds to the total, but is dealt only at a maximum rate of 1 point per round, as long as the grout is active. A dose of muscle grout lasts for 10 minutes. One dose of muscle grout is sufficient for a Medium or smaller creature; Large creatures require 2 doses, Huge creatures require 4 doses, and so on."],
                    "dc": 1,
                    "gp": 100,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Muscle grout"
                },
                {
                    "name": "Nostalgia oil",
                    "desc": ["Pathfinders pride themselves on their camaraderie, and among the worst threats are those that can magically compel agents to fight among themselves. Nostalgia oil is a vial of concentrated aromatics that evoke positive memories of the Grand Lodge and common trials overcome during a Pathfinder’s training. By dabbing this oil on her face, neck, or arms as a standard action, a Pathfinder gains a +2 alchemical bonus on saving throws against effects with the emotion UM descriptor and on secondary saving throws made to resist dominate person and similar compulsion effects that would force her to harm her allies or betray her mission. Applied in this way, a vial of nostalgia oil remains potent for 8 hours or until washed off with soap and water. Nostalgia oil can also be thrown as a splash weapon, extending its benefits for 1 hour to any Pathfinder struck with a direct hit. Alternatively, a creature can mix it with a pint of lantern oil or piece of incense, which grants half the nostalgia oil’s benefits to all Pathfinders within 20 feet of the lantern or censor for 1 hour; any strong wind (21+ mph) dissipates the aroma for 1 minute.   Crafting a vial of nostalgia oil requires a successful DC 25 Craft (alchemy) check. Although most nostalgia oil is mixed to benefit only Pathfinder agents, other mixtures might be created to benefit only members of another clan, neighborhood, or organization."],
                    "dc": 1,
                    "gp": 80,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Nostalgia oil"
                },
                {
                    "name": "Padzahr",
                    "desc": ["Drinking this crystal-clear liquid accelerates the natural process of healing Constitution damage. Resting for 1 hour after drinking a vial heals you of 1 point of Constitution damage as if you had benefited from a full night’s rest. Taking multiple doses in an hour does not increase the rate of healing; you must take each individually, followed by an hour of rest, for it to have any effect. Using more than 4 doses of padzahr in 1 day has no effect."],
                    "dc": 25,
                    "gp": 80,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Padzahr"
                },
                {
                    "name": "Phantom ash",
                    "desc": ["Many Rivethun who study the old ways to better manage a traumatic injury use this concoction. Despite its evocative name, phantom ash has little to do with spectral spirits. Instead, when applied dry or moistened into a salve, this black dust causes a sensation of warmth when smeared on skin, and it removes any lingering pain or distracting sensations associated with a chronic injury, such as a lost or paralyzed limb. For 1 hour after each application, the user gains a +1 alchemical bonus on all saving throws against phantasm effects and effects that inflict pain."],
                    "dc": 1,
                    "gp": 10,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Phantom ash"
                },
                {
                    "name": "Poison ward salve",
                    "desc": ["This herbal salve can be applied directly to the skin to prevent the effects of contact poisons. If a creature touches a contact poison, but you apply the salve within 1 round of contact, the victim rolls the save twice and uses the higher result."],
                    "dc": 15,
                    "gp": 15,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Poison ward salve"
                },
                {
                    "name": "Purification pellet",
                    "desc": ["This tablet of compressed herbs and potent alchemical reagents can purify tainted, brackish, muddy, or alkaline water in order to make it drinkable. If used to purify water that is diseased or poisonous, each tablet reduces the save DC by 1 (to a maximum reduction of 5) for any disease or poison present in the water. A single purification pellet can affect up to 1 gallon of tainted water."],
                    "dc": 20,
                    "gp": 10,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Purification pellet"
                },
                {
                    "name": "Rager's aid",
                    "desc": ["This packet filled with spikey-edged leaves has a pungent scent almost strong enough to make your eyes water. While you chew the leaves, you ignore the effects of fatigue. The leaves last for 6 rounds, at which point only a wad of pulp remains. When the effect of rager’s aid wears off, you are exhausted instead."],
                    "dc": 25,
                    "gp": 25,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Rager's aid"
                },
                {
                    "name": "Salt tablets (10)",
                    "desc": ["These tablets of pressed salt help stave off dehydration. Taking a salt tablet once every 24 hours grants you a +2 circumstance bonus on saving throws to avoid heatstroke and on Constitution checks to avoid thirst."],
                    "dc": 10,
                    "gp": 1,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Salt tablets (10)"
                },
                {
                    "name": "Scarsalve",
                    "desc": ["This alchemical substance, originally developed by secretive worshipers of Zon-Kuthon to hide the marks of their devotion, has become popular among former Gray Maidens. When applied to scarred areas of the body, scarsalve causes those scars to fade from view for 1 day. A character who gains benefits from having visible scars loses those benefits while under the effects of scarsalve, but she also gains a +2 alchemical bonus on Disguise checks."],
                    "dc": 1,
                    "gp": 10,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Scarsalve"
                },
                {
                    "name": "Semblance transfusion",
                    "desc": ["When combined with a drop of a humanoid’s blood, this solution allows the homunculus that drinks it to grow to size Small and assume the likeness of the subject whose blood was used. If the homunculus can speak, its voice changes to resemble that of the subject. The homunculus’s space and reach become 5 feet and it loses its bite attack, but otherwise its statistics remain unchanged. This transformation lasts 24 hours. The homunculus gains a +10 circumstance bonus on Disguise checks to appear as the subject, but unless the subject is a halfling, a gnome, a child, or another Small humanoid, the homunculus is likely shorter than the subject."],
                    "dc": 25,
                    "gp": 300,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Semblance transfusion"
                },
                {
                    "name": "Smelling salts",
                    "desc": ["These sharply scented gray crystals cause people inhaling them to regain consciousness. Smelling salts grant you a new saving throw to resist any spell or effect that has already rendered you unconscious or staggered. If exposed to smelling salts while dying, you immediately become conscious and staggered, but must still make stabilization checks each round; if you perform any standard action (or any other strenuous action), you take 1 point of damage after completing the act and fall unconscious again. A container of smelling salts has dozens of uses if stoppered after each use, but depletes in a matter of hours if left open."],
                    "dc": 25,
                    "gp": 25,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Smelling salts"
                },
                {
                    "name": "Soothe syrup",
                    "desc": ["This sweet and wholesome-tasting blue liquid creates a sense of warmth and comfort. Soothe syrup coats your stomach and makes it much more difficult for you to succumb to queasiness. For 1 hour after drinking soothe syrup, you gain a +5 alchemical bonus on saving throws made to resist effects that would make you nauseated or sickened."],
                    "dc": 15,
                    "gp": 25,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Soothe syrup"
                },
                {
                    "name": "Soul stimulant",
                    "desc": ["This soothing elixir was created to counter the energy-draining effects of vampires, wights, and similar horrible creatures. If you have a negative level (whether temporary or permanent), you can drink a dose of soul stimulant, negating the negative level’s penalty for 12 hours. You can only benefit from 1 dose of soul stimulant at a time, though you can continue to take a dose every 12 hours to stave off the negative level’s effects."],
                    "dc": 30,
                    "gp": 300,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Soul stimulant"
                },
                {
                    "name": "Stillgut (vial)",
                    "desc": ["Drinking a vial of this bland, bluish liquid grants you a +5 alchemical bonus on Fortitude saves to avoid nausea or sickness for 1 hour. If you are already nauseated, you can drink stillgut as a move action. Drinking it in this fashion grants you a second saving throw (without the +5 bonus). Goblins often use stillgut so they can choke down meat or other foods in advanced stages of rot or decay."],
                    "dc": 25,
                    "gp": 50,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Stillgut (vial)"
                },
                {
                    "name": "Stink ink (arcane)",
                    "desc": ["Most common among ratfolk alchemists, arcane stink ink is used to inscribe formulae or spells into formula books and spellbooks. Like normal stink ink, the arcane version can only be read by creatures with the scent ability (although read magic works normally on spells and arcane formulae inscribed with stink ink). Using arcane stink ink to inscribe a spell or formula into a book costs +10% of the normal amount ."],
                    "dc": 1,
                    "gp": 9999,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Stink ink (arcane)"
                },
                {
                    "name": "Stink ink (common)",
                    "desc": ["Stink ink is a special, pungent, musk-based ink that allows its user to encode information with smell rather than visually. Stink ink dries clear but its sharp, extremely localized smell can be picked out by those with sensitive enough noses to make it possible to read by sense of smell. Only creatures with the keen senses trait or scent ability can read stink ink without aid of some form of magic. Reading or writing something with stink ink takes twice as long as going through the same amount of information written in normal ink."],
                    "dc": 15,
                    "gp": 5,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Stink ink (common)"
                },
                {
                    "name": "Sun cream",
                    "desc": ["Each application of this alchemical solution, typically compounded from substances found in desert flowers, fruits, and roots, heals 1d4 points of nonlethal damage that the target has taken from heat exposure. If you succeed at a DC 20 Heal check while applying sun cream, you may add your Wisdom modifier to the nonlethal damage healed. A creature cannot benefit from more than one application of sun cream in a 24-hour period."],
                    "dc": 20,
                    "gp": 10,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Sun cream"
                },
                {
                    "name": "Surge syrup",
                    "desc": ["Mythic : Consuming a vial of surge syrup grants you a +1d4 alchemical bonus on your next mythic surge roll. Every round after you consume surge syrup that you don’t use your surge ability, the bonus provided by this item decreases by 1 (minimum 0)."],
                    "dc": 25,
                    "gp": 80,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Surge syrup"
                },
                {
                    "name": "Surgical jelly",
                    "desc": ["When ingested, this thick red gelatinous substance seeks out and surgically eliminates invasive threats to the body. Consuming surgical jelly immediately ends any infestations (such as rot grubs; Pathfinder RPG GameMastery Guide 245), implanted eggs (such as those implanted by xills), or other non-disease effects that can be cured by remove disease , so long as such a cure does not require a caster level check. Consuming a pot of surgical jelly is a full-round action."],
                    "dc": 25,
                    "gp": 300,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Surgical jelly"
                },
                {
                    "name": "Sweet Rest",
                    "desc": ["When imbibed, this effervescent solution causes a heavy warmth to spread from your stomach outward to your limbs, resulting in feelings of security and well-being. If you sleep for at least 1 hour after consuming the solution, the next time within the next 24 hours that you attempt a saving throw to remove a temporary negative level, you can roll the save twice and use the better result. Crafting this item requires a successful DC 20 Craft (alchemy) check."],
                    "dc": 20,
                    "gp": 75,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Sweet Rest"
                },
                {
                    "name": "Synthetic mumia",
                    "desc": ["A laboratory-created version of the expensive and infamous Osirian drug mumia ( Pathfinder Campaign Setting: Lost Kingdoms 21), synthetic mumia is a mixture of honey, embalming fluids, and various animal organs. The murky liquid comes enclosed in small packets made of intestine. Mumia and synthetic mumia may be taken interchangeably to stave off the effects of addiction to either substance, and is thus used by some mumia junkies hoping to quit their addiction. Crafting synthetic mumia requires a successful DC 14 Craft (Alchemy) check. Synthetic Mumia  Type ingested or injury; Addiction moderate, Fortitude DC 14   Price 150 gp   Effects 1 hour; +2 alchemical bonus on saving throws against spells and effects with the curse or disease descriptor, fatigue   Damage 1d2 Wis damage"],
                    "dc": 14,
                    "gp": 150,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Synthetic mumia"
                },
                {
                    "name": "Tea of transference",
                    "desc": ["This foul-tasting green tea allows monks to focus their ki on improving abilities they’ve gained through other training. By drinking a cup of tea of transference, you can expend 1 point from your ki pool to regain 1 point from your arcane pool, 2 rounds of barbarian rage, 2 rounds of bardic performance, one use of channel energy, 1 grit point, one use of smite evil, one expended extract slot at least 1 level lower than the highest-level extract you can create, or one expended spell slot at least 2 levels lower than the highest-level spell you can cast. You must have the ki pool class feature and the class feature you want to regain uses of in order to benefit from tea of transference."],
                    "dc": 20,
                    "gp": 40,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Tea of transference"
                },
                {
                    "name": "Troll oil",
                    "desc": ["This crimson liquid is viscous and tastes foul. If you drink it, for the next hour you automatically stabilize when reduced to negative hit points (unless the damage is sufficient to instantly kill you) and have a 50% chance each round to end any bleed effect on you. If you take fire or acid damage, the benefits of troll oil are suspended for 1 round."],
                    "dc": 30,
                    "gp": 50,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Troll oil"
                },
                {
                    "name": "Troll styptic",
                    "desc": ["Troll styptic is used as a field treatment for wounds and bleeding, particularly where magical healing is not available. When applied directly to wounds, this jar of paste grants a living creature fast healing 2 for 2d4 rounds. While active, the styptic also closes any open wounds the subject receives, negating any bleed effects that would affect the target. This is a painful cure, and the target must succeed at a DC 15 Fortitude save or be sickened for the styptic’s duration."],
                    "dc": 25,
                    "gp": 100,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Troll styptic"
                },
                {
                    "name": "Twitch tonic",
                    "desc": ["This thick syrup is extracted from bitter herbs and enhanced by alchemy to ward against sleep, paralysis, and the staggered condition. If you drink twitch tonic, you gain a +2 alchemical bonus on saving throws made against these effects for the next hour. If you drink twitch tonic while suffering from any of these effects, you may immediately roll another saving throw against the effect (with the +2 bonus); you may gain this particular benefit only once per day. You can administer twitch tonic to an unconscious or paralyzed creature as a full-round action, similar to administering a potion."],
                    "dc": 25,
                    "gp": 45,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Twitch tonic"
                },
                {
                    "name": "Vapors of easy breath",
                    "desc": ["This waxy ball of resin and herbs is stored in a large glass jar or other airtight container. When the jar is opened, it instantly evaporates into a soothing vapor that renders the lungs of any adjacent creatures resistant to inhaled poisons, diseases, and irritants such as choking smoke. Each creature within 5 feet of the jar when it is opened gains a +5 alchemical bonus on saving throws against such effects for the next 10 minutes. If already affected by an airborne affliction, an affected creature can immediately attempt another saving throw against the effect (with the +5 bonus); a creature can attempt only one such additional saving throw in a 24-hour period."],
                    "dc": 25,
                    "gp": 75,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Vapors of easy breath"
                },
                {
                    "name": "Venombane lozenges",
                    "desc": ["These faintly glowing lozenges often come in a discrete brown pouch. A single venombane lozenge lasts for 5 minutes after being placed in a creature’s mouth. During this time, the user gains a cumulative +1 alchemical bonus on saving throws against poisons every minute for 5 minutes. At the end of the 5 minutes, the lozenge dissolves and its effects end. If at any time the user becomes poisoned while under the effects of a lozenge that has not dissolved, she can crush the lozenge to immediately gain the benefits for 1 round as if it had lasted its full duration. Using a lozenge in this way immediately ends the effect."],
                    "dc": 1,
                    "gp": 35,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Venombane lozenges"
                },
                {
                    "name": "Vermin repellent",
                    "desc": ["This vile-smelling white paste keeps vermin at bay if spread on your skin. Normal-sized (Fine) vermin avoid you. Swarms of vermin must make a successful DC 15 Fortitude saving throw in order to enter your square. Vermin repellent has no adverse effect on vermin of Small size or larger, though if an attacking vermin has a choice of targets that are respectively covered and not covered in repellent, it usually chooses the creatures without repellent. Once applied, vermin repellent remains effective for 4 hours or until you spend 1 round washing it off.   Vermin repellent counts as a strong scent, allowing creatures with the scent ability to detect it at a greater range (see the Universal Monster Rules in the Bestiary )."],
                    "dc": 20,
                    "gp": 5,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Vermin repellent"
                },
                {
                    "name": "Vivifying moxibustion needles",
                    "desc": ["These needles of dried and augmented mugwort ignite at one end when removed from the alcohol in which they are stored. A set of vivifying moxibustion needles can be used to perform a healing procedure on a willing or helpless creature with a successful DC 15 Heal check and 1 hour of effort. Failing the check by 4 or less indicates that nothing happens, while failure by 5 or more deals 1d4 points of damage to the subject. If the procedure is performed successfully, the subject gains a +2 alchemical bonus on Fortitude saves against diseases, cold effects, and effects that deal Dexterity or Strength damage for the next 24 hours. If the patient is affected by an ongoing effect that can be resisted with a successful Fortitude save, he can attempt an immediate saving throw to end the effect (using the +2 alchemical bonus if applicable); this final benefit can be gained only once per day."],
                    "dc": 25,
                    "gp": 85,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Vivifying moxibustion needles"
                },
                {
                    "name": "War spirit pouch",
                    "desc": ["This tiny bundle of sacred herbs and bones supposedly attracts the attention of helpful battle-spirits. By crushing the pouch as a standard action, an orc (or a creature from a suitably warlike culture) gains 1d4+1 temporary hit points. These temporary hit points go away after 10 minutes. A creature can only benefit from 1 spirit pouch at a time. Once used, the spirit pouch is destroyed."],
                    "dc": 20,
                    "gp": 50,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=War spirit pouch"
                },
                {
                    "name": "Wing oil",
                    "desc": ["Tengus mix special salves to protect their feathers from the elements. This one-ounce vial of wing oil gives a feathered creature a +1 bonus on all saving throws to resist the effects of cold weather. Its effects last 24 hours."],
                    "dc": 20,
                    "gp": 1,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Wing oil"
                },
                {
                    "name": "Wismuth salix",
                    "desc": ["This pink liquid has a horrible chalky taste, but is quite effective at counteracting nausea, indigestion, and diarrhea. A vial of wismuth salix, taken in small doses during the day, alleviates these symptoms. If you drink an entire vial of wismuth salix, for 1 hour you get a +2 alchemical bonus on Fortitude saving throws against effects that inflict the nauseated or sickened condition. If you drink a vial of it while suffering from the nauseated or sickened condition, you may immediately roll another saving throw (with the +2 bonus) against the effect; you may gain this particular benefit only once per day. Drinking a vial of wismuth salix (whether over the course of a day or all at once) usually turns your tongue black for about a day, though this is a harmless side effect."],
                    "dc": 20,
                    "gp": 30,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Wismuth salix"
                },
                {
                    "name": "Wyrm's breath bitter",
                    "desc": ["This green-tinged brew has a pungent, bitter bite. It’s flavored with a variety of foulsmelling herbs and is intensely carbonated through a unique fermentation process. Sometimes given to visitors as a prank, wyrm’s breath bitter causes the drinker to become sickened for 1d6 minutes (Fortitude DC 12 negates); dwarves gain a +5 racial bonus on this saving throw. After drinking a dose of wyrm’s breath bitter, the drinker can, as a move action, unleash a thunderous and noxious belch in either a 5-foot-radius spread or a 10-foot cone. Creatures in the area are deafened and sickened for 1 round (Fortitude DC 12 negates). The drinker must wait 1d4 rounds before belching again, but can belch as often as desired for up to 10 minutes after drinking a wyrm’s breath bitter."],
                    "dc": 21,
                    "gp": 30,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Wyrm's breath bitter"
                }
