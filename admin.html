<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">
<div id="appNavbar"></div>

<main class="container mt-4" style="max-width: 680px;">
  <h3>Admin</h3>
  <div id="adminStatus" class="alert d-none" role="alert"></div>

  <section class="card bg-black border-secondary text-white mb-3">
    <div class="card-body">
      <h5 class="card-title">Create User</h5>
      <form id="adminCreateUserForm" class="vstack gap-3">
        <div>
          <label class="form-label" for="adminUserEmail">Email</label>
          <input id="adminUserEmail" class="form-control" type="email" autocomplete="off" required>
        </div>
        <div>
          <label class="form-label" for="adminUserPassword">Temporary Password</label>
          <input id="adminUserPassword" class="form-control" type="password" autocomplete="new-password" required minlength="6">
        </div>
        <div>
          <button id="adminCreateUserBtn" class="btn btn-primary" type="submit">Create User</button>
        </div>
      </form>
    </div>
  </section>

  <section class="card bg-black border-secondary text-white">
    <div class="card-body">
      <h5 class="card-title">Reset User Password</h5>
      <form id="adminResetPasswordForm" class="vstack gap-3">
        <div>
          <label class="form-label" for="adminResetEmail">Email</label>
          <input id="adminResetEmail" class="form-control" type="email" autocomplete="off" required>
        </div>
        <div>
          <label class="form-label" for="adminResetPassword">New Password</label>
          <input id="adminResetPassword" class="form-control" type="password" autocomplete="new-password" required minlength="6">
        </div>
        <div>
          <button id="adminResetPasswordBtn" class="btn btn-outline-info" type="submit">Reset Password</button>
        </div>
      </form>
    </div>
  </section>
</main>

<script src="navbar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="app-supabase.js"></script>
<script>
PFApp.setupAdminPage();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
