<!DOCTYPE html>
<html><head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="description" content="A free online calculator for using the Craft skill in Pathfinder RPG.">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <title>Pathfinder Crafting Calculator</title>
    <style>
        body {
            background-color: rgb(59, 59, 59);
            color: white;
        }
        .row {
            margin-top: 10px;
        }
        .row label {
            white-space: nowrap;
            vertical-align: bottom;
        }

        .costrow input {
            width: 50px;
        }
        .resultsrow {
            margin-top: 10px;
        }
        .resultsrow input {
            border: none;
            color: black;
        }
        .itemdesc {
            background-color: #636363;
            margin-top: 20px;
            padding: 30px;
            border-radius: 15px;
        }
        .itemname a {
            font-weight: bold;
            text-decoration: none;
            color: white;
        }
        .description p {
            margin-top: 6px;
            text-indent: 10px;
        }
        .howto li {
            margin-top: 5px;
        }
        #footer {
            border-top: 2px solid black;
            box-shadow: 0px -10px 20px black;
        }
        .result-wrapper {
            background-color: rgb(140, 140, 168);
            border-radius: 15px;
        }
        .checkbox-input input {
            width: 25px;
        }
    </style>
</head>
<body>
    <div class="d-flex row gap-1 m-4 justify-content-center">
        <label class="text-wrap col-3" for="Search_Item" title="Search Item to craft">Search Item:</label>
        <input class="col-5"class="col-3"id="Search_Item" title="Search Item to craft"></select>
        
        <button class="col-3" onclick="searchItem()">Search</button>

    </div>
    <div id="search_wrapper" class="d-flex row justify-content-center"></div>

    <hr class="my-3">

    <div class="d-flex row gap-2 justify-content-between m-3">
        <div class="flex-column col-md-6 col-12">
            <div class="flex-column p-3">
                <div class="d-flex row">
                    <label class="col-5" for="Item" title="Item to craft">Item:</label>
                    <select class="col-7"  onchange="loadItem()" id="Item" title="Item to craft" style="width: 250px;"></select>
                </div>
                <div class="costrow d-flex row gap-1 mt-3">
                    <span class="col-5" title="Market cost of the item being crafted">Item Cost:</span>
                    <div class="flex-column row col-7" style="padding-left: 0;">
                        <div class="d-flex gap-2">
                            <input class="col-5" id="GP" title="Market cost of the item being crafted, GP part" value="120" type="text">
                            <label class="col-7" for="GP" title="Market cost of the item being crafted, GP part">GP</label>
                        </div>
                        <div class="d-flex gap-2">
                            <input class="col-5" id="SP" title="Market cost of the item being crafted, SP part" value="0" type="text">
                            <label class="col-7" for="SP" title="Market cost of the item being crafted, SP part">SP</label>
                        </div>
                        <div class="d-flex gap-2">
                            <input class="col-5" id="CP" title="Market cost of the item being crafted, CP part" value="0" type="text">
                            <label class="col-7" for="CP" title="Market cost of the item being crafted, CP part">CP</label>
                        </div>       
                    </div>
                </div>
                <div class="d-flex row gap-1 mt-4">
                    <label class="col-5" for="DC" title="Craft DC of the item being created">Item DC:</label>
                    <input class="col-3" id="DC" value="13" title="Craft DC of the item being created" type="text">
                </div>
                <div class="d-flex row gap-1 mt-4">
                    <label class="col-5" for="PriorWork" title="Work already done toward item creation">Prior Work:</label>
                    <input class="col-3" id="PriorWork" value="0" title="Work already done toward item creation" type="text">
                </div>
                <div class="d-flex row gap-1 mt-4">
                    <label class="col-5" for="Check" title="Craft (alchemy) skill check result">Check Result:</label>
                    <input class="col-3" id="Check" value="15" title="Craft (alchemy) skill check result" type="text">
                </div>
                <div class="d-flex row gap-1 mt-4">
                    <label class="col-5" for="IsByDay" title="Calculate progress by day (instead of by week)">Calculation:</label>
                    <div class="d-flex col-3" id="CraftCalc">
                    </div>
                    <label class="col-5" for="IsByDay" title="Calculate progress by day (instead of by week)" hidden>Show By Day:</label>
                    <div class="d-flex col-3 checkbox-input" hidden>
                        <input id="IsByDay" title="Calculate progress by day (instead of by week)" type="checkbox" hidden>
                    </div>
                </div>
                <div class="d-flex row gap-1 mt-4">
                    <label class="text-wrap col-5 d-flex" for="IsSwift" title="Character is Alchemist with Swift Alchemy (3rd level)">Swift Alchemy (2x speed):</label>
                    <div class="d-flex col-3 checkbox-input">
                        <input id="IsSwift" title="Character is Alchemist with Swift Alchemy (3rd level)" type="checkbox">
                    </div>
                </div>
                <div class="d-flex row gap-1 mt-4">
                    <label class="text-wrap col-5 d-flex" for="IsMaster" title="Character has the Master Alchemist feat">Master Alchemist (10x speed):</label>
                    <div class="d-flex col-3 checkbox-input">
                        <input id="IsMaster" onchange="setItemCountState()" title="Character has the Master Alchemist feat" type="checkbox">
                    </div>
                </div>
                <div class="d-flex row gap-1 mt-4">
                    <label class="col-5" for="ItemMultiple" title="Number of items to create in parallel (requires Master Alchemist)">Item Count:</label>
                    <input class="col-3" id="ItemMultiple" title="Number of items to create in parallel (requires Master Alchemist)" disabled="true" value="1" type="text">
                </div>
                <div class="d-flex row gap-1 mt-4">
                    <div class="col-5"></div>
                    <input class="col-4" value="Recompute" onclick="recompute()" type="button">
                </div>
            </div>
            <div class="result-wrapper p-3 mt-3">
                <div class="resultsrow d-flex row gap-3">
                    <label class="col-4 text-wrap" for="Progress" title="Progress made toward item completion on this check">Progress:</label>
                    <input class="col-7" value="" title="Progress made toward item completion on this check" id="Progress" disabled="true" type="text">
                </div>
                <div class="resultsrow d-flex row gap-3 mt-4">
                    <label class="col-4 text-wrap" for="TotalProgress" title="Total progress made toward item completion">Overall Progress:</label>
                    <input class="col-7" value="" title="Total progress made toward item completion" id="TotalProgress" disabled="true" type="text">
                </div>
                <div class="resultsrow d-flex row gap-3 mt-4">
                    <label class="col-4 text-wrap" for="TimeTaken" title="Total amount of time taken to make this progress">Time Taken:</label>
                    <input class="col-7" value="" title="Total amount of time taken to make this progress" id="TimeTaken" disabled="true" type="text">
                </div>
                <div class="resultsrow d-flex row gap-3 mt-4">
                    <label class="col-4 text-wrap" for="AmountToPay" title="Amount to pay for this check (base materials only paid on first check)">Amount To Pay:</label>
                    <input class="col-7 col-md-8" title="Amount to pay for this check (base materials only paid on first check)" id="AmountToPay" disabled="true" type="text">
                </div>
            </div>
            
        </div>

        <div class="itemdesc col-md-5">
            <div class="itemname" id="ItemName"><a href="http://www.d20pfsrd.com/gamemastering/afflictions/poison/arsenic" target="_blank"></a></div>
            <div class="description" id="Description">dsdsd</div>
        </div>
    </div>
  
    <div class='justify-content-center w-100 p-2' id="footer" style="display: none; position: fixed; bottom: 0px; height: 50px; background-color: white;" onclick="resetSearch()">
        <button>Reset</button>
    </div>

    <script type="text/javascript">

        window.onload=loadSelect;

        
        function elem(name) {
        return document.getElementById(name);
        }

        function val(name) {
        return elem(name).value;
        }

        var errorColor = "#FA5858";
        var baseColor = "white";
        var boxes = ["DC", "GP", "SP", "CP", "PriorWork", "Check", "ItemMultiple"];
        var bools = ["IsMaster", "IsSwift", "IsByDay"];

        function loadSelect() {
            var sel = elem("Item");
            for (var i = 0; i < items.length; ++i) {
                sel.options[sel.options.length] = new Option(items[i]["name"], i);
            }
            sel.options[1].selected = true;
            loadItem();
        }

        function loadItem() {
            var sel = elem("Item");
            var selectedOption = sel.options[sel.selectedIndex];
            var item = items[selectedOption.value];
            if (!item["dc"]) {
                // Placeholder item
                return;
            }
            var itemNameElem = elem("ItemName");
            itemNameElem.innerHTML = "<a href=\"" + item["link"] + "\" target=\"_blank\">" +
                item["name"] + " (DC " + item["dc"] + ")</a>";
            var itemDesc = elem("Description");
            var description = "";
            if (item["desc"]) {
                // Normal item
                for (var i = 0; i < item["desc"].length; ++i) {
                description += "<p>" + item["desc"][i] + "</p>";
                }
            } else if (item["addiction"]) {
                // Drug
                description = drugDesc(item);
            } else {
                // Poison
                description = poisonDesc(item);
            }
            itemDesc.innerHTML = description;
            elem("DC").value = item["dc"];
            elem("GP").value = item["gp"] || 0;
            elem("SP").value = item["sp"] || 0;
            elem("CP").value = item["cp"] || 0;
        }

        function drugDesc(item) {
            var desc = "";
            if (item["flavor"]) {
                for (var i = 0; i < item["flavor"].length; ++i) {
                desc += "<p>" + item["flavor"][i] + "</p>";
                }
            } else {
                desc += "<br/>";
            }
            desc += "<b>Type</b> drug (" + item["type"] + "); ";
            desc += "<b>Addiction</b> " + item["addiction"] + ", Foritude DC " + item["dc"] + "<br/>";
            for (var i = 0; i < item["effect"].length; ++i) {
                desc += (i > 0 ? "; " : "") + "<b>Effect</b> " + item["effect"][i];  
            }
            desc += (item["damage"] ? "<br/><b>Damage</b> " + item["damage"] : "");
            return desc;
        }

        function poisonDesc(item) {
            var desc = "<br/><b>Type</b> poison (" + item["type"] + "); <b>Save</b> ";
            desc += "Fortitude DC " + item["dc"] + "<br/>";
            desc += (item["onset"] ? "<b>Onset</b> " + item["onset"] + (item["freq"] ? "; " : "") : "");
            desc += (item["freq"] ? "<b>Frequency</b> " + item["freq"] : "") + "<br/>"
            desc += "<b>" + (item["secondary"] ? "Initial " : "") + "Effect</b> " + item["effect"];
            desc += (item["secondary"] ? "; <b>Secondary Effect</b> " + item["secondary"] : "");
            desc += (item["cure"] ? "; <b>Cure</b> " + item["cure"] : "");
            return desc;
        }

        function isInt(formValue) {
            return !isNaN(formValue) && parseInt(formValue) == formValue;
        }

        function resetState() {
            for (var i = 0; i < boxes.length; ++i) {
                elem(boxes[i]).style.backgroundColor = baseColor;
            }
            elem("Progress").value = "";
            elem("TotalProgress").value = "";
            elem("TimeTaken").value = "";
            elem("AmountToPay").value = "";
            }

            function setItemCountState() {
            var itemMultElem = elem("ItemMultiple");
            var isMaster = elem("IsMaster");
            if (isMaster.checked) {
                itemMultElem.disabled = false;
            } else {
                itemMultElem.disabled = true;
                itemMultElem.value = "1";
            }
        }

        function getValues() {
            var values = {};
            var hasError = false;
            for (var i = 0; i < boxes.length; ++i) {
                var value = val(boxes[i]);
                if (!isInt(value) || parseInt(value) < 0) {
                elem(boxes[i]).style.backgroundColor = errorColor;
                hasError = true;
                continue;
                }
                value = parseInt(value);
                values[boxes[i]] = value;
            }

            if (hasError) {
                return;
            }
            for (var i = 0; i < bools.length; ++i) {
                values[bools[i]] = elem(bools[i]).checked;
            }
            if (values["GP"] == 0 && values["SP"] == 0 && values["CP"] == 0) {
                elem("GP").style.backgroundColor = errorColor;
                elem("SP").style.backgroundColor = errorColor;
                elem("CP").style.backgroundColor = errorColor;
                return;
            }
            return values;
        }

        function computeWorkNeeded(values) {
            if (values["IsMaster"]) {
                values["WorkNeeded"] = values["GP"];
            } else {
                values["WorkNeeded"] = values["GP"] * 10 + values["SP"];
            }
            if (values["IsSwift"]) {
                values["WorkNeeded"] = parseInt(values["WorkNeeded"] / 2);
            }
            if (values["WorkNeeded"] < 1) {
                values["WorkNeeded"] = 1;
            }
            }

            function multiplyCost(cost, multiple) {
            var cpCost = parseInt((cost["GP"] || 0) * 100 +
                                    (cost["SP"] || 0) * 10 +
                                    (cost["CP"] || 0));
            cost["CP"] = parseInt(cpCost * multiple);
            cost["SP"] = 0;
            cost["GP"] = 0;
            normalizeCost(cost);
        }

        function addCosts(cost, newCost) {
            cost["GP"] = cost["GP"] + newCost["GP"];
            cost["SP"] = cost["SP"] + newCost["SP"];
            cost["CP"] = cost["CP"] + newCost["CP"];
            normalizeCost(cost);
            }

            function normalizeCost(cost) {
            if (cost["CP"] > 10) {
                cost["SP"] += parseInt(cost["CP"] / 10);
                cost["CP"] = parseInt(cost["CP"] % 10);
            }
            if (cost["SP"] > 10) {
                cost["GP"] += parseInt(cost["SP"] / 10);
                cost["SP"] = parseInt(cost["SP"] % 10);
            } 
        }

        function setStatus(values) {
            // Set progress
            if (values["TotalWorkDone"] >= values["WorkNeeded"]) {
                var extraWork = values["TotalWorkDone"] - values["WorkNeeded"];
                var workDone = values["WorkDone"] - extraWork;
                var percentWorkDone = parseInt(100 * workDone / values["WorkNeeded"]);
                elem("Progress").value = percentWorkDone + "% Progress (" + workDone + ")";
                elem("TotalProgress").value = "100% Complete (" + values["WorkNeeded"]
                    + "/" + values["WorkNeeded"] + ")";
            } else {
                var percentWorkDone = parseInt(100 * values["WorkDone"] / values["WorkNeeded"]);
                elem("Progress").value = percentWorkDone + "% Progress (" + values["WorkDone"] + ")";
                var percentComplete = parseInt(100 * values["TotalWorkDone"] / values["WorkNeeded"]);
                elem("TotalProgress").value = percentComplete + "% Complete (" + values["TotalWorkDone"]
                    + "/" + values["WorkNeeded"] + ")";
            }
            var timeTaken = values["TimeTaken"];
            var weeks = timeTaken["Weeks"];
            var weeksStr = (weeks > 0) ? (weeks + " week" + (weeks > 1 ? "s" : "")) : "";
            var days = timeTaken["Days"];
            var daysStr = ((days == 0 && weeks > 0) || (days == 0 && weeks === 0)) ? "" : (days + " day" + (days == 1 ? "" : "s"));
            var minutes = timeTaken["Minutes"];
            var minStr = (minutes > 0) ? (" Minute" + (minutes > 1 ? "s: " : ": ") + minutes) : "";
            elem("TimeTaken").value = weeksStr + (weeksStr == "" || daysStr == "" ? "" : ", ") + daysStr + (days > 0 ? " | ": "") + (days > 0 ? "Hours: " + parseInt(days * 24): "") + (minutes > 0 ? ` | ${minStr}` : "");
            var cost = values["Cost"];
            var costStr = "";
            if (cost["GP"] == 0 && cost["SP"] == 0 && cost["CP"] == 0) {
                costStr = "0 GP";
            } else {
                if (cost["GP"] > 0) {
                costStr = cost["GP"] + " GP";
                }
                if (cost["SP"] > 0) {
                var spStr = cost["SP"] + " SP";
                costStr += costStr == "" ? spStr : ", " + spStr;
                }
                if (cost["CP"] > 0) {
                var cpStr = cost["CP"] + " CP";
                costStr += costStr == "" ? cpStr : ", " + cpStr;
                }
            }
            elem("AmountToPay").value = costStr;

            const highSuccesTimeDivider =  Math.floor((values["Check"] * values["DC"]) / values["WorkNeeded"]);
            var craftCalc = elem("CraftCalc");
            craftCalc.innerHTML = `
                <ul class="list-group">
                    <li class="list-group-item">
                        <b>WorkNeeded:</b> ${values["WorkNeeded"]}
                    </li>
                    <li class="list-group-item">
                        <b>Check*DC:</b> ${values["Check"] * values["DC"]}
                    </li>
                    <li class="list-group-item">
                        ${highSuccesTimeDivider > 1 ? `<b>TimeMult:</b> ${highSuccesTimeDivider}` : ''}
                    </li>
                </ul/
                `
        }

        function computeTimeTaken(values) {
            if (values["PriorWork"] >= values["WorkNeeded"]) {
                // We were already done
                values["TimeTaken"] = { "Weeks": 0, "Days": 0 };
                return;
            }
            var baseTime = {
                "Weeks": (values["IsByDay"] ? 0 : 1),
                "Days": (values["IsByDay"] ? 1 : 0),
            };
            values["TimeTaken"] = baseTime;
            if (values["TotalWorkDone"] <= values["WorkNeeded"]) {
                // We're not done, or we used exactly all our effort
                return;
            }
            // It didn't take us the full amount of time to finish
            var remainingWork = values["WorkNeeded"] - values["PriorWork"];
            const highSuccesTimeDivider =  Math.floor((values["Check"] * values["DC"]) / values["WorkNeeded"]);

            var fractionEffortUsed = remainingWork / (values["WorkDone"] * highSuccesTimeDivider);
            var daysUsed = fractionEffortUsed * (baseTime["Weeks"] * 7 + baseTime["Days"]);
            if (daysUsed > 7) {
                // This pretty much can't happen, but for completeness...
                baseTime["Weeks"] = parseInt(daysUsed / 7);
                baseTime["Days"] = (daysUsed % 7).toFixed(1);
            } else {
                baseTime["Weeks"] = 0;
                baseTime["Days"] = parseFloat(daysUsed.toFixed(1));
                if (baseTime["Days"] === 0) {
                    baseTime["Minutes"] = Math.floor(daysUsed * 1440);
                }
            }
        }

        function recompute() {
            resetState();
            var values = getValues();
            if (!values) {
                return;
            }
            // Normalize user inputs
            normalizeCost(values);
            elem("GP").value = values["GP"];
            elem("SP").value = values["SP"];
            elem("CP").value = values["CP"];
            computeWorkNeeded(values);
            if (values["PriorWork"] >= values["WorkNeeded"]) {
                // We're already done...
                values["WorkDone"] = 0;
                values["TotalWorkDone"] = values["WorkNeeded"];
                values["Cost"] = { "GP": 0, "SP": 0, "CP": 0 };
            } else {
                if (values["PriorWork"] > 0) {
                values["Cost"] = { "GP": 0, "SP": 0, "CP": 0 };
                } else {
                values["Cost"] = { "GP": values["GP"], "SP": values["SP"], "CP": values["CP"] };
                multiplyCost(values["Cost"], values["ItemMultiple"] / 3);
                }
                if (values["Check"] < values["DC"]) {
                // Check if failed check by 5 or more
                if (values["DC"] - values["Check"] >= 5) {
                    // Repay half base material cost
                    var addedCost = { "GP": values["GP"], "SP": values["SP"], "CP": values["CP"] };
                    if (values["IsByDay"]) {
                    // Half cost (1/6th base cost) divided by 7 for 1 day fraction
                    multiplyCost(addedCost, values["ItemMultiple"] / 42);
                    } else {
                    // Half cost (1/6th base cost)
                    multiplyCost(addedCost, values["ItemMultiple"] / 6);
                    }
                    console.log(addedCost);
                    addCosts(values["Cost"], addedCost);
                }
                // No work done
                values["WorkDone"] = 0;
                } else {
                values["WorkDone"] = values["Check"] * values["DC"];
                if (values["IsByDay"]) {
                    values["WorkDone"] = parseInt(values["WorkDone"] / 7);
                }
                }
                values["TotalWorkDone"] = values["PriorWork"] + values["WorkDone"];
            }
            computeTimeTaken(values);
            console.log(values);
            setStatus(values);
        }

        function searchItem() {
            elem('search_wrapper').innerHTML = ''
            elem('footer').style.display='flex'
            const term = val('Search_Item')
            const filteredItems = items.filter((item) => findInName(item, term) || findInDesc(item, term))
            for (const filteredItem of filteredItems) {
                const itemUnit = document.createElement('div')
                itemUnit.setAttribute('class', 'm-2 bg-secondary text-light p-4 col-md-5 col-11 ')
                itemUnit.setAttribute('style', 'border-radius: 15px ')
                itemUnit.setAttribute('onClick', `elem("Item").selectedIndex=${items.findIndex((item) => item.name === filteredItem.name)};
                loadItem();
                elem('search_wrapper').innerHTML = '';
                elem('footer').style.display='none'
                `)
                itemUnit.innerHTML = `<b>${highlight(filteredItem.name, term)} (DC ${filteredItem.dc})</b>
                <br><br>
                Cost ${filteredItem.gp} gp
                <br><br>
                ${highlight(filteredItem.desc.join(' '), term)}`
                elem('search_wrapper').appendChild(itemUnit)
            }
        }

        function highlight(text, term) {
            const regex = new RegExp(`(${term})`, "gi");
            return text.replace(regex, `<span class='text-danger'>$1</span>`)
        }


        function findInName(item, term) {
            return item.name.toLowerCase().includes(term.toLowerCase())
        }

        function findInDesc(item, term) {
            if (item.desc) {
                for (const desc of item.desc) {
                    return desc.toLowerCase().includes(term.toLowerCase())
                }
            }
            
            return false
        }

        function resetSearch() {
            elem('Search_Item').value = ''
            elem('search_wrapper').innerHTML = ''
            elem('footer').style.display='none'
        }

        var items = [
            {
            "name": "-- ALCHEMICAL TOOLS --",
            },

            {
                    "name": "Aboleth Mucus Extract",
                    "desc": ["This jar contains 6 ounces of alchemically preserved aboleth mucus. When 1 ounce of the extract is applied to a living creature’s mouth, nose, and throat (a full-round action), the target loses its ability to breathe air but gains the ability to breathe water for 1 hour. An unwilling target can attempt a DC 14 Fortitude save to negate the effect. If additional doses are applied to the same creature, the duration of the effect extends by 1 hour for each ounce used, to a maximum of 3 hours."],
                    "dc": 1,
                    "gp": 100,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Aboleth Mucus Extract"
                },
                {
                    "name": "Accuracy lozenge",
                    "desc": ["The effects of this gray-green pill last for 5 minutes after consumption. During this time, when making a full attack, you can accept alchemical burn to make your second attack at your full base attack bonus instead of the attack bonus for your second attack. An accuracy lozenge gives no benefit on attacks beyond the second, nor does it provide a second attack if you don’t already have one."],
                    "dc": 25,
                    "gp": 330,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Accuracy lozenge"
                },
                {
                    "name": "Adhesive strip",
                    "desc": ["This 3-foot-long strip of extremely thin hide can be cut into different lengths. When moistened and applied across surfaces or between objects, it creates a bond requiring a DC 15 Strength check to pull apart. Once applied, an adhesive strip takes 1 minute to set. If applied to an item with the broken condition, it suppresses the effects of that broken condition for as long as the item remains repaired by the strip—though the item does not regain hit points and is still broken. The uses for an adhesive strip are many; it can be used to bind prisoners, mend clothing, patch holes, and so on."],
                    "dc": 1,
                    "gp": 5,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Adhesive strip"
                },
                {
                    "name": "Age ointment",
                    "desc": ["This white, waxy ointment allows you to appear older or younger, and is useful for both people who need disguises and the vain. When mixed with an equal amount of sealing wax, it forms a gray paste that discolors and relaxes your skin, reducing the penalty on Disguise checks to appear older than you are by 2. When mixed with an equal amount of soap, it forms a rosy paste that clarifies and tightens your skin, reducing the penalty on Disguise checks to appear younger than you are by 2. An application of age ointment lasts for 1d4+1 days. Age ointment can be used once, and the price includes the required amounts of sealing wax and soap."],
                    "dc": 15,
                    "gp": 80,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Age ointment"
                },
                {
                    "name": "Alchemical candle wax",
                    "desc": ["As malleable as ordinary wax, alchemical candle wax produces an aromatic scent when burned. A candle made from alchemical candle wax normally possesses a sweet, honeylike smell, but a character who is trained in Craft (alchemy) can infuse the wax with nearly any scent available to her. A character trained in both Craft (alchemy) and Craft (poison) can infuse one candle’s worth of wax with any alchemical substance that requires inhalation, such as a vial of alchemical pheromones (see below) or a dose of inhaled poison. When infusing the wax with poison, the normal rules for exposing oneself to poison apply. Only one kind of alchemical substance can be infused into a single candle at a time, though a single candle can hold up to 3 doses of a substance. A single lump of alchemical candle wax is enough to create one candle.   After burning for 1 minute, the alchemical candle releases the chosen alchemical substance as a colorless haze that lingers in a 5-foot radius centered on the candle for up to 1 hour, plus 30 minutes for each dose or vial of a substance infused into the candle wax beyond the first. A moderate wind (11+ mph) disperses the haze in 2 rounds; a strong or stronger wind (21+ mph) disperses the haze immediately. Alchemical candle wax can be created with a successful DC 20 Craft (alchemy) check."],
                    "dc": 20,
                    "gp": 150,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Alchemical candle wax"
                },
                {
                    "name": "Alchemical cement",
                    "desc": ["You mix this fine gray powder with water and a cubic foot of sand or gravel to form a durable stone-like material. Until it cures, it has the consistency of thick mud, and you must hold it in place (typically with a frame of earth or wood) if you want it to harden in a specific shape. It takes 1d10+10 minutes for the cement to partially cure, gaining hardness 2 and 5 hit points per inch of thickness. After 1d6 hours the cement is fully cured and as hard as true stone."],
                    "dc": 15,
                    "gp": 5,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Alchemical cement"
                },
                {
                    "name": "Alchemical cleaner",
                    "desc": ["This caustic alchemical solution dissolves blood, hair, and small pieces of flesh. Distributing it over a 5-foot square takes one full-round action and increases the DC of Perception checks to find such materials by 20. (A creature that fails the Perception check to find such materials by 5 or less realizes the area has been unnaturally cleared of them.) This applies only to the original Perception DC, not a substituted skill check like those from the cleaner ACG or traceless UI archetypes. One pot of alchemical cleaner contains enough liquid to cover nine 5-foot squares. A pot of alchemical cleaner can be thrown as a splash weapon and functions as an alkali flask ( Advanced Player’s Guide 184) when thrown. Crafting alchemical cleaner requires a successful DC 25 Craft (alchemy) check."],
                    "dc": 25,
                    "gp": 300,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Alchemical cleaner"
                },
                {
                    "name": "Alchemical dye kit",
                    "desc": ["This kit provides a variety of creamy liquids in glass jars, and allows you to temporarily change the color of your hair or skin to match that of a creature of any humanoid race. This includes exotic and unusual hues, such as gnome hair colors. If used as part of a Disguise check, this kit reduces the time required to create the disguise by 1d6 minutes (to a minimum of a full-round action), and halves the penalty to disguise yourself as a different race whenever such recoloration is necessary. Each use of the kit changes either hair or skin color. If you need to change both your hair color and your skin color, you must spend two uses of the kit to gain the benefit. Each dye takes 1 minute to apply (thus requiring 2 minutes to change both hair and skin color). Once applied, the colors are waterproof, and can’t be rubbed or burned away. An application of dye fades after 1d4+1 days unless removed earlier by magical means. Applying a new application of alchemical dye immediately covers and replaces a previous application. An alchemical dye kit is exhausted after 10 uses."],
                    "dc": 20,
                    "gp": 160,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Alchemical dye kit"
                },
                {
                    "name": "Alchemical glue",
                    "desc": ["This glue is stored as two flasks of syrupy liquid. When mixed together and allowed to cure, they form a strong bond. The glue is sufficient to coat 1 square foot of surface, or (because of waste, spills, and inaccurate mixing) up to 20 smaller applications of approximately 2 square inches each. The glue is tacky after 1 minute and fully cured after 1 hour. Pulling apart a large glued surface (at least 1 square foot) requires a DC 20 Strength check for tacky glue or DC 25 for cured glue. Pulling apart a small glued surface (anything less than 1 square foot) is a DC 15 Strength check for tacky glue or DC 20 for cured glue."],
                    "dc": 20,
                    "gp": 20,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Alchemical glue"
                },
                {
                    "name": "Alchemical glue accelerant",
                    "desc": ["This tiny dropper contains a liquid that speeds up the cure time of alchemical glue. Applying the accelerant is a standard action. Accelerated glue is tacky after 1 round and fully cured in 1 minute. The dropper contains 20 doses; each dose is sufficient to cure one small application of alchemical glue. The entire dropper must be used to cure a full square foot of glue."],
                    "dc": 25,
                    "gp": 25,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Alchemical glue accelerant"
                },
                {
                    "name": "Alchemical pheromones (aggression)",
                    "desc": ["Alchemical pheromones are variously colored liquids typically stored in glass vials. These pheromones combine the natural scent of an animal (such as a wolf), humanoid (such as a human), magical beast (such as a unicorn), or vermin (such as a centipede) with alchemical reagents that enhance and refine that scent, making the concoction potent enough to modify the behavior of a creature. A dose of alchemical pheromones must be created for the animal, magical beast, or vermin type or for a single subtype of humanoid; it typically affects only creatures of that type or subtype. The effects of the alchemical pheromone depend on the type.   When it is smeared onto a surface or it is thrown as a splash weapon, the alchemical pheromone fills a 5-foot-radius area with its scent. The scent then remains active for 1 minute. A creature of the targeted type or subtype that enters that area must succeed at a DC 14 Will save or be subject to the effects of the pheromone for 1 round. If the creature remains in the affected area, it must attempt a new saving throw each round as long as the pheromone remains active. All alchemical pheromones are mind-affecting effects, but swarms (as well as any other collection of creatures that acts as a single creature) are not immune to them. Creatures that don’t need to breathe are immune to alchemical pheromones, while creatures with the scent ability take a –4 penalty on saving throws against them.    Aggression : Affected creatures are driven into a mindless frenzy, as if affected by simultaneous confusion and rage spells.    Arousal : Affected creatures are aroused and distracted, causing them to lose their Dexterity bonus to AC.    Simple : An affected creature is staggered for 1 round. Whether the target succeeds at or fails the saving throw, it becomes immune to simple alchemical pheromones for 24 hours.    Susceptibility : Affected creatures are forced to obey one specific, simple command, as if affected by a command spell. The command is chosen when the pheromone is created, and must be a something simple, such as approach, drop, fall, flee, or halt (as defined by the command spell)."],

                    "gp": 150,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Alchemical pheromones (aggression)"

                {
                    "name": "Alchemical resin",
                    "desc": ["When applied to your hands, this clear, sticky substance made from alchemically prepared pine sap provides a +2 alchemical bonus to your CMD against disarm attempts, on combat maneuver checks to grapple, and on Climb checks; it also functions underwater. Applying the resin is a standard action, and it wears off 1 hour after being applied."],
