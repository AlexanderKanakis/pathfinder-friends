                    "gp": 100,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Alchemical resin"
                },
                {
                    "name": "Alchemical solvent",
                    "desc": ["This bubbling purple gel eats through adhesives. Each vial can cover a single 5-foot square. It destroys most normal adhesives (such as tar, tree sap, or glue) in a single round but takes 1d4+1 rounds to deal with more powerful adhesives (alchemical glue, tanglefoot bags, spider webbing, and so on). It has no affect on fully magical adhesives, such as sovereign glue ."],
                    "dc": 20,
                    "gp": 20,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Alchemical solvent"
                },
                {
                    "name": "Alkali salt",
                    "desc": ["These tiny granules can be dissolved in water, creating a slimy material used to coat metallic items such as weapons or armor. Such a coating neutralizes the metaleating acid of black puddings and gray oozes, protecting the item from 1d3 contacts with an ooze’s acidic touch."],
                    "dc": 20,
                    "gp": 30,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Alkali salt"
                },
                {
                    "name": "Amp",
                    "desc": ["This liquid intensifier can be added to a drug as a move action no more than 1 round before the drug is taken. Amp increases all numeric effects of a drug by 50%, including any bonuses, penalties, and ability damage inflicted by the drug. Using amp with a drug increases the save DC to avoid becoming addicted to that drug by 2 for 1d4 days; this increase stacks. If a drug combined with amp is not consumed within 1 round, the amp spoils and the drug becomes tainted, as if cut with bunk."],
                    "dc": 20,
                    "gp": 30,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Amp"
                },
                {
                    "name": "Angel quill arrowhead",
                    "desc": ["This barbed, cold iron arrowhead is alchemically treated to inflict additional harm while embedded in creatures that are vulnerable to cold iron. For every angel quill arrowhead that damages a target with DR/cold iron, the target’s damage reduction decreases by 1. Up to five angel quill arrowheads can affect a single target at any one time, reducing the target’s DR/cold iron by up to 5 (additional arrowheads have no effect aside from dealing damage as normal). An affected target can pull out a number of arrowheads equal to her Dexterity modifier (minimum 1) as a full-round action with a successful DC 15 Heal check. Alternatively, the application of any magical healing causes all angel quill arrowheads embedded in the creature to instantly fall out.   Angel quill arrowheads of silver and adamantine are also available for the same price, and affect creatures with DR/silver or DR/adamantine, respectively. Crafting any type of angel quill arrowhead requires a successful DC 25 Craft (alchemy) check."],
                    "dc": 25,
                    "gp": 10,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Angel quill arrowhead"
                },
                {
                    "name": "Anointing oil",
                    "desc": ["This sacred oil, infused with aromatic spices and distilled holy water, may be applied to a creature while casting a harmless divine spell with a range of touch, increasing the casting time to a full-round action but also increasing the caster's effective caster level by +1 for that spell."],
                    "dc": 20,
                    "gp": 25,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Anointing oil"
                },
                {
                    "name": "Armor ointment",
                    "desc": ["This thick lubricant makes the joints of armor move more freely. Applying the ointment takes 1 minute and reduces your armor’s armor check penalty by 1 (to a minimum of –1) for 8 hours."],
                    "dc": 15,
                    "gp": 30,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Armor ointment"
                },
                {
                    "name": "Barbarian chew",
                    "desc": ["The Shoanti of the Cinderlands combine lime, crimson galtroot leaves, and some say horse blood to create this invigorating chew. Aside from staining the teeth a bloody shade, barbarian chew causes the user to feel stronger, but also angrier. One use of barbarian chew grants a barbarian +1 additional round of rage. This additional round is used first when a barbarian begins raging. If a barbarian does not rage within 1 hour of using the chew, this additional round of rage is lost. This benefit can be gained only once per day; consuming multiple doses in a 24-hour period has no additional effects. Barbarian chew can be created with a successful DC 20 Craft (alchemy) check."],
                    "dc": 20,
                    "gp": 25,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Barbarian chew"
                },
                {
                    "name": "Beast lure",
                    "desc": ["This light brown oil works similar to Kaava musk (see below) but attracts one specific kind of creature (dogs, giant bees, and so on)."],
                    "dc": 20,
                    "gp": 30,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Beast lure"
                },
                {
                    "name": "Beast-scent",
                    "desc": ["This mixture of scent-gland extracts and aromatic herbs serves as both attractor and olfactory camouflage. It masks the natural scent of a creature with a pungent musk that is alluring to animals. Beast-scent provides a +2 circumstance bonus on Handle Animal and wild empathy checks and a –5 penalty on attempts to track the wearer by his original scent. If the tracking creature is following the smell of beast-scent itself, Survival checks to track gain a +10 circumstance bonus instead.   A single vial of beast-scent masks the scent of one Medium creature or two smaller creatures; larger creatures require proportionally more to gain the benefits. Beast-scent becomes inert after 1 hour of exposure to air. Applying a vial is a full-round action that provokes attacks of opportunity."],
                    "dc": 25,
                    "gp": 75,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Beast-scent"
                },
                {
                    "name": "Black fester (vial)",
                    "desc": ["This black paste is often applied on orc weapons before going on raids to stymie an enemy's healing magic. Like a poison, black fester stays on a weapon until the first time it strikes an opponent. It remains in the target's body for 1 hour. A creature exposed to black fester resists magical healing; a creature trying to magically heal the target must make a DC 10 caster level check to restore any hit points to the target."],
                    "dc": 25,
                    "gp": 30,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Black fester (vial)"
                },
                {
                    "name": "Blackfingers paste",
                    "desc": ["Developed by followers of Norgorber, this inky paste aids unskilled poison-users. When smeared on the fingers, a dose of blackfingers paste prevents accidental poisoning while applying poison to a weapon, as if the user possessed the poison use ability. A single dose of blackfingers paste lasts for 1d6 hours, but the black stains the stuff creates on the user’s fingers lasts for days. A single dose of this alchemical item costs 50 gp."],
                    "dc": 1,
                    "gp": 50,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Blackfingers paste"
                },
                {
                    "name": "Blackfire clay",
                    "desc": ["This pliant black clay is always pleasantly warm to the touch. Working blackfire clay in your hands for a full round causes the clay to grow much warmer, granting you a +4 alchemical bonus on saving throws made to resist cold weather. You can combine five blocks of clay over the course of a minute to produce a source of warmth equivalent to a small campfire, allowing you to heat a campsite and cook food.   Blackfire clay only produces heat, never light, smoke, or odor. The clay emits warmth for 1 hour before hardening into an unusable lump. A newly created brick of blackfire clay is composed of 10 blocks."],
                    "dc": 20,
                    "gp": 20,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Blackfire clay"
                },
                {
                    "name": "Blasting jelly",
                    "desc": ["This volatile gray paste sticks to solid surfaces and creates a concentrated blast when exposed to fire, making it a valuable excavation tool. You can apply 1 dose of blasting jelly to a 5-foot square as a standard action. The paste can be ignited with another standard action by striking it from an adjacent square with a metal weapon or object. When thus ignited or otherwise exposed to fire, the jelly explodes, dealing 2d6 points of fire damage to creatures and unattended objects within the treated square. If the ignited square is adjacent to another square containing blasting jelly, that square ignites as well. Blasting jelly deals full damage to objects made of stone or softer material. Blasting jelly decays relatively quickly when exposed to air, becoming inert after 4 hours if not ignited."],
                    "dc": 1,
                    "gp": 45,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Blasting jelly"
                },
                {
                    "name": "Blight tonic",
                    "desc": ["Blight tonic increases the potency of a creature's disease attack transmitted by physical contact, such as a dire rat's filth fever. The next time a creature must save against the drinker's disease save DC, the DC for the initial infection increases by +2. The tonic lasts for 10 minutes or until the next time a creature must save against the drinker's disease DC, whichever comes first."],
                    "dc": 20,
                    "gp": 150,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Blight tonic"
                },
                {
                    "name": "Blightburn paste",
                    "desc": ["This heavy stone box measures 2 feet\r to a side, and the tiny compartment inside is lined with\r lead. Inside the compartment is a half-ounce of deep green\r paste. This paste is made of animal fat mixed with groundup\r blightburn. Once the box is opened, blightburn paste\r limits teleportation within 60 feet and irradiates anyone\r within 60 feet, afflicting them with blightburn sickness\r (see sidebar for details on both effects). Any creature that\r touches the paste is afflicted with blightburn sickness (no\r save), and takes 2d6 points of fire damage per round until\r the paste is cleaned away with a successful DC 15 Heal\r check. Crafting this item requires a successful DC 30 Craft\r (alchemy) check.   Blightburn The mineral blightburn is the deadliest radioactive substance\r in the Darklands. The green-glowing crystal burns anyone\r who touches it, dealing 2d6 points of fire damage per round\r of contact, and its radiation causes blightburn sickness.\r The substance also limits teleportation. Anyone casting a\r teleportation spell in or teleporting to a cavern with blightburn\r in its walls must succeed at a DC 30 caster level check.   Blightburn Sickness  Type disease, contact (see text); Save Fortitude DC 22   Frequency 1/day   Effect 1d6 Con damage and 1d6 Cha damage; contact is automatic when a creature comes within a 60-foot radius, and can be blocked only by lead sheeting, 1 foot of stone, or a force effect; Cure 2 consecutive save"],
                    "dc": 30,
                    "gp": 5000,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Blightburn paste"
                },
                {
                    "name": "Blood neutrailizer",
                    "desc": ["When you release this vial of alchemical particles into the water as a standard action, the particles immediately neutralize the scent of exposed blood within 20 feet, rendering the blood undetectable by scent (to a hunting shark, for example). Blood neutralizer has no effect on any blood that enters the area after the particles have been used. Blood neutralizer can be crafted with a successful DC 25 Craft (alchemy) skill check."],
                    "dc": 25,
                    "gp": 25,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Blood neutrailizer"
                },
                {
                    "name": "Bloodblock",
                    "desc": ["This gooey, pinkish substance helps treat wounds. Using a dose gives you a +5 alchemical bonus on Heal checks for providing first aid, treating wounds made by caltrops or similar objects, or treating deadly wounds. A dose of bloodblock ends a bleed effect as if you had made a DC 15 Heal check. When treating deadly wounds, using a dose of bloodblock counts as one use of a healer’s kit (and grants the +5 bonus stated above)."],
                    "dc": 25,
                    "gp": 25,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Bloodblock"
                },
                {
                    "name": "Bloodvine rope",
                    "desc": ["This 50-foot length of tough, lightweight rope is made from alchemically treated bloodvine, a rare scarlet-colored vine that grows only in warm jungle environments. Though prized by climbers for its durability, bloodvine can also be used to bind creatures. Bloodvine rope has a hardness of 5 and 10 hit points, and can be broken with a DC 30 Strength check. A creature bound by bloodvine rope can escape with a DC 35 Escape Artist check or a DC 30 Strength check."],
                    "dc": 30,
                    "gp": 200,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Bloodvine rope"
                },
                {
                    "name": "Boar's bellow",
                    "desc": ["When imbibed, this bitter, rust-colored concoction grants you 1d4 uses of alchemical inspiration that can be used only on Intimidate checks. The benefits of boar’s bellow last for 1 hour; during this time, you must roll all Diplomacy checks twice and take the worse result."],
                    "dc": 15,
                    "gp": 190,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Boar's bellow"
                },
                {
                    "name": "Bodybalm",
                    "desc": ["When this pungent yellow powder is boiled in water and given to a creature to drink, it provides the attending healer a +5 alchemical bonus on Heal checks for providing long-term care, treating poison, and treating disease."],
                    "dc": 25,
                    "gp": 25,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Bodybalm"
                },
                {
                    "name": "Bomb launcher",
                    "desc": ["These odd looking, egg-shaped contraptions have cleverly placed fins that improve bombs' accuracy. Goblin alchemists use these special containers to make their bombs more accurate when thrown long distances. Using a bomb launcher when throwing a bomb increases the bomb's range increment to 30 feet (or increases the range increment of a bomb with the rocket bomb discovery to 70 feet). Bomb launchers are destroyed when used."],
                    "dc": 25,
                    "gp": 10,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Bomb launcher"
                },
                {
                    "name": "Bone paste",
                    "desc": ["Typically stored in an airtight leather wineskin cured with rare preservative unguents, bone paste is a powerful alchemical sealant with special deteriorative properties. When squeezed out of its container and exposed to air, bone paste quickly hardens, so in order to apply it to a surface or object one must typically squeeze the paste directly onto the material to be affected. Once applied, bone paste cements itself to the object in just seconds, and hardens into a flaky cast. If applied to any unattended organic material or surface (such as wood, paper, hide, or rope), after 1 hour, bone paste undergoes another alchemical reaction and begins to eat away at the material, dealing 1d4 points of damage each round for 1d6+1 rounds, eating away first at the part of the object to which it was applied and spreading briefly to other parts of the object before dissipating and leaving a small amount of residual dust. Bone paste ignores an organic object’s hardness, and does not deal damage to inorganic objects or surfaces (such as metal, stone, or ceramic). One pouch of bone paste is enough to cover 1 square foot of surface, or (because of waste and spills) up to 20 smaller applications of approximately 2 square inches each."],
                    "dc": 20,
                    "gp": 75,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Bone paste"
                },
                {
                    "name": "Boniface paint",
                    "desc": ["This thick whitewash is laced with exotic oils, and it dries to a lovely finish run through with subtle swirls. Difficult to notice, these patterns help obscure seams and details in whatever the paint coats; the Perception DC to find a secret door or hidden compartment on a surface covered in boniface paint increases by 5. One bucket of boniface paint covers up to a 10-foot-by-10-foot area, and its concealing effects last for 1 year. Crafting a bucket of boniface paint requires a successful DC 20 Craft (alchemy) check."],
                    "dc": 20,
                    "gp": 15,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Boniface paint"
                },
                {
                    "name": "Bore brush",
                    "desc": ["This spiraled metal rod has alchemically treated bristles that can be used in the barrel of an early or advanced firearm to liquefy grime and bullet fouling while leaving a thin protective film in the bore. Using this brush is a standard action, and the protective film grants a 5-foot alchemical bonus to the firearm’s first range increment and a +1 alchemical bonus on attack rolls. These effects last for 1 hour or until the firearm is fired. A newly crafted bore brush contains 5 applications. Crafting a bore brush requires a successful DC 15 Craft (alchemy) check."],
                    "dc": 15,
                    "gp": 75,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Bore brush"
                },
                {
                    "name": "Bottled musk",
                    "desc": ["This glass vial contains alchemically preserved musk from a single variety of creature. Sniffing bottled musk provides a +4 circumstance bonus on Survival checks to track creatures of the same variety by scent. Additionally, bottled musk can be used as an additional spell component for the following spells to modify the spell’s effects.   Detect undead : Functions as written, but detects creatures of the musk’s associated creature type.    Locate creature : Detects the same variety of creature as the musk (for example, using bison musk detects only bison, not all herd animals or animals), and provides a +2 bonus on caster level checks to overcome nondetection ."],
                    "dc": 1,
                    "gp": 25,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Bottled musk"
                },
                {
                    "name": "Bottled sunlight",
                    "desc": ["As a standard action, this ornate rectangular jar can be vigorously shaken to cause its contents to mix and activate. Once shaken, the contents of the jar shed light as a sunrod for 6 hours. A jar of activated bottled sunlight can be thrown as a splash weapon with a range increment of 10 feet. Upon striking a solid object, the bottled sunlight creates a 30-foot-radius burst of natural sunlight that persists for 1 round, after which all light from the jar fades. Throwing an inactive jar of bottled sunlight destroys the item, leaving only a smoldering pile of ashes where it struck. Crafting this item requires a successful DC 30 Craft (alchemy) check."],
                    "dc": 30,
                    "gp": 200,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Bottled sunlight"
                },
                {
                    "name": "Brewer's kit",
                    "desc": ["A brewer’s kit includes a mash tun, as well as copper kettles and piping for boiling and cooling before casking it and allowing it to ferment. It also includes a variety of dried hops and spices for flavoring."],
                    "dc": 1,
                    "gp": 25,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Brewer's kit"
                },
                {
                    "name": "Brewer's kit, masterwork",
                    "desc": ["This exceptionally crafted kit provides extra spices, a wider variety of herbs, and higher quality tools than a normal brewer’s kit. A masterwork brewer’s kit grants a +2 circumstance bonus on Craft (alchemy) checks to produce alcoholic beverages."],
                    "dc": 1,
                    "gp": 75,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Brewer's kit, masterwork"
                },
                {
                    "name": "Bunk",
                    "desc": ["Bunk is a slang term for fillers used to dilute drugs that are proffered as pure-grade narcotics. A drug mixed with bunk is less potent; its effects last 1d6 × 10 minutes for each hour they would normally last. The presence of bunk can be detected with a successful Craft (alchemy) check (DC equal to the drug manufacturer’s Craft [alchemy] check – 10).   The duration and intensity of the drug’s harmful aftereffects and ability damage are not reduced, as the additives in bunk are often toxic or dangerous in their own right. When a creature takes a dose of a drug containing bunk, the creature must attempt a Fortitude save (DC 10 + 1d10). Failure causes the creature to become sickened for 1d4 hours and take 1d2 points of ability damage to a random ability score."],
                    "dc": 15,
                    "gp": 5,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Bunk"
                },
                {
                    "name": "Buoyant balloon",
                    "desc": ["This fist-sized alchemically treated animal bladder is tightly sealed around a small wooden grip. By giving the handle a sharp twist you break a tiny glass ampoule just inside the bladder, filling the bag with buoyant gas and causing it to swell into a 3-foot-diameter sphere. Inflating the balloon is a move action. Once filled, the balloon floats upward at a speed of 60 feet per round. The balloon can lift up to 20 pounds of weight as it rises, though carrying more than 10 pounds reduces its speed to 30 feet per round. Multiple balloons attached to a single object add their carrying capacities together when determining how much weight they can lift. If a balloon is not held or bound in place in some manner, it continues to rise until it reaches a height of 600 feet, or until 10 minutes have passed, after which it pops or deflates and is destroyed."],
                    "dc": 15,
                    "gp": 10,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Buoyant balloon"
                },
                {
                    "name": "Burner",
                    "desc": ["A burner is a metal or ceramic cylinder, open at the top and perforated with air holes along the sides, often with sliding vents to open or close these apertures as the fire inside requires. A burner is used to burn fuel pellets at night without giving off light that would reveal the user’s position to unfriendly eyes in the wide, empty desert lands. In places where charcoal is a popular fuel, burners are made of heavier-gauge metal. Lit coals can be banked with ashes and kept hot, either for later ignition or simply so the burner can serve as an improvised radiant heater."],
                    "dc": 1,
                    "gp": 3,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Burner"
                },
                {
                    "name": "Camouflage lichen",
                    "desc": ["Though oreads with obviously stony features are rare, almost all oreads have an essentially earthen quality to their skin that makes it perfect for cultivating plant life. Where other races would be appalled at the thought of plants taking root in their flesh, oreads see it as a natural and healthy extension of their elemental nature. For this reason, oread herbalists developed several strains of moss and lichen specifically adapted to grow on their bodies. Camouflage lichen is the most common variety of these oread plants. It takes 1 minute to apply a paste of camouflage lichen spores to the skin, and an additional 24 hours for the fungus to sprout. After this time, the oread is covered in a thin green layer of living plant matter, granting her a +4 bonus on Stealth checks made in green forest and jungle environments. Red-orange and white varieties exist, providing bonuses in appropriately colored environments (red-orange among autumn leaves or in red deserts, white in snow, and so on). Camouflage lichen has a short lifespan; it withers and dies 3 days after being applied, crumbling away into harmless powder. This item only works on oreads and other creatures with rocklike bodies."],
                    "dc": 1,
                    "gp": 100,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Camouflage lichen"
                },
                {
                    "name": "Candlerod",
                    "desc": ["Similar to but weaker than a sunrod, this stick glows like a candle when struck and lasts for 12 hours."],
                    "dc": 20,
                    "gp": 1,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Candlerod"
                },
                {
                    "name": "Caphorite dust",
                    "desc": ["This small leather pouch is filled with\r a faintly radioactive ore called caphorite, with a small\r percentage of reactants that activate the dust. When\r used, caphorite dust must be sprinkled in a 5-foot square,\r which then becomes the center of the dust’s\r effect. All bright or normal light within 30 feet\r of the activated dust is reduced to dim light,\r and any creature attempting to cast a spell with the light\r descriptor in this area must succeed at a DC 15 caster level\r check or have spell’s effect be negated. If caphorite is\r exposed to sunlight, it immediately becomes\r permanently inert. Each pouch contains\r enough dust for two applications. Crafting\r this item requires a successful DC 25 Craft\r (alchemy) check."],
                    "dc": 25,
                    "gp": 25,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Caphorite dust"
                },
                {
                    "name": "Cardice oil",
                    "desc": ["This bottle of viscous blue oil sublimates slightly when exposed to air. When poured over water, the oil pools on the surface and takes 1 round to spread out from the point of origin in a 20-foot radius. At the end of this round, the cardice oil flash-freezes the surface of the water, creating an ice sheet over the affected area ( Pathfinder RPG Core Rulebook 430). Any 5-foot square of this ice can support up to 200 pounds of weight. Weight in excess of this amount causes the entire sheet to crack and quickly break up. This ice sheet becomes unstable and breaks up on its own after 1 hour, or 20 minutes in a hot climate. Any creature whose bare skin comes in contact with cardice oil takes 1d6 points of nonlethal damage each round because of the chemical’s volatile nature, but the oil is ineffective as a splash weapon."],
                    "dc": 25,
                    "gp": 50,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Cardice oil"
                },
                {
                    "name": "Carrion bait",
                    "desc": ["This large glass jar is vacuum-sealed with an airtight wax plug. Inside, festering chunks of monkey meat are covered in fungal mycelium and seeded with fly eggs, though the mixture’s potency is not evident until it’s exposed to air. Once the jar is opened (a standard action), the stench quickly becomes overpowering as the jar’s contents swell and rot at an accelerated rate. Any living creature within 15 feet of the jar when it is opened must succeed at a DC 12 Fortitude save or be sickened for 1d4 rounds.   Vermin and undead have a hard time distinguishing carrion bait from rotten human flesh, but intelligent undead that succeed at a DC 15 Perception check realize the difference. Regardless, any creature that spends more than 1 round eating the carrion bait quickly realizes its error, since the bait continues to swell and grow even as it’s digested. One round after eating carrion bait, an affected undead or vermin becomes staggered for 1d4 rounds as its belly bulges to incredible proportions (other creature types cannot stomach carrion bait and instead are nauseated for 2d4 rounds). If the affected creature is already staggered, its movement speed instead decreases by 10 feet for the duration of the carrion bait’s effect. Crafting carrion bait requires a successful DC 19 Craft (alchemy) check."],
                    "dc": 19,
                    "gp": 25,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Carrion bait"
                },
                {
                    "name": "Casting plaster",
                    "desc": ["This white, dry powder mixes with water to form a paste, which hardens over the course of an hour to create a solid material. It can be used to make casts of footprints or carvings, fill in gaps or cracks in walls, or (if applied over a cloth wrapping) create a cast for a broken bone. Hardened plaster has hardness 1 and 5 hit points per inch of thickness. A 5-pound clay pot of plaster can cover about 5 square feet of flat space to a depth of 1 inch, five Medium forearm or lower-leg casts, two Medium full-arm or full-leg casts, or twice as many casts for a Small creature."],
                    "dc": 25,
                    "gp": 0.05,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Casting plaster"
                },
                {
                    "name": "Chameleon pill",
                    "desc": ["This pill causes the imbiber’s skin to shift colors and patterns to match whatever is behind her. As long as a significant portion of her skin is exposed (her head and forearms, for example), the imbiber gains a +4 circumstance bonus on Stealth checks for 4 hours. This bonus doesn’t stack with that granted by invisibility , vanishAPG , or similar magical effects. Crafting a chameleon pill requires a successful DC 15 Craft (alchemy) check."],
                    "dc": 15,
                    "gp": 100,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Chameleon pill"
                },
                {
                    "name": "Chemical ward",
                    "desc": ["This gray paste congeals when spread onto a surface, gradually changing color to match its surroundings. When applied, its reagents bond with chemicals in the environment, exuding a magnified aura that can fool blindsight and blindsense. This affects only blindsight or blindsense based on smell, taste, vibration, and similar senses; it does not affect extraordinary sight, hearing, or tremorsense. Applying a flask of chemical ward to the edge of a 5-foot square takes a full-round action, creating an opaque barrier against blindsense and blindsight that lasts for 1 hour. A creature can sense through the barrier with a successful Perception check (DC 15 for blindsight, 20 for blindsense), although individuals on the opposite side of the barrier can attempt Stealth checks against the creature’s blindsight or blindsense as though they had concealment. The barrier does not inhibit movement."],
                    "dc": 1,
                    "gp": 25,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Chemical ward"
                },
                {
                    "name": "Chill cream",
                    "desc": ["This sticky light blue paste grows pleasantly cool to the touch whenever it is exposed to light. Spreading a dose on your face and hands takes a full-round action and grants you a +2 alchemical bonus on saves to resist hot weather. In areas of bright light this bonus increases to +4, while in areas of dim light or darkness it is negated. A dose of chill cream lasts for 1 hour after being applied. A newly crafted bottle of chill cream holds 5 doses."],
                    "dc": 15,
                    "gp": 15,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Chill cream"
                },
                {
                    "name": "Clatterstone",
                    "desc": ["Comprising several chunks of magnetized ore connected by twine, a clatterstone creates an intense racket when it strikes a solid surface. The combination of magnetic disturbances, noise, and vibrations interferes with blindsight. A creature using blindsight perceives a detonated clatterstone as a Medium target until it attempts to interact with the perceived “creature” or identifies it with some other sense, such as darkvision. You can throw a clatterstone as a ranged attack with a range increment of 20 feet, and it remains active for 1d4+1 rounds before becoming inert."],
                    "dc": 1,
                    "gp": 30,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Clatterstone"
                },
                {
                    "name": "Clockwork prowler",
                    "desc": ["This 2-foot-tall wooden clockwork automaton is shaped roughly like a short-backed, wheeled chair. When wound up with the folding handle at its side, the clockwork prowler trundles forward at a speed of 15 feet per round for up to 2 minutes. A clockwork prowler cannot move through difficult terrain. Each round of vigorous winding powers 2 rounds of movement. If its brake is not released immediately after winding, the prowler loses 1 round of movement for every 2 rounds it sits idle. The clockwork prowler can carry up to 20 pounds of weight at full speed, or up to 50 pounds at a speed of 10 feet. Higher weights prevent the prowler from moving. A clockwork prowler has hardness 5 and 90 hit points, and when in motion has AC 12 (a motionless clockwork prowler has AC 5)."],
                    "dc": 1,
                    "gp": 500,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Clockwork prowler"
                },
                {
                    "name": "Clockwork prowler (advanced)",
                    "desc": ["A more advanced version of the clockwork prowler, this device is more metal than wood. It moves at a speed of 20 feet and can be programmed with up to four right-angle turns. Each turn requires 1 round to program along with a DC 15 Disable Device check. If this check is failed, roll d% each time the prowler attempts to turn. On a result of 1–10, it fails to turn. On a result of 11–20, it instead turns on the next round. An advanced clockwork prowler can carry up to 60 pounds of weight at full speed, or up to 120 pounds at a speed of 10 feet. It has hardness 10, 150 hit points, and when in motion has AC 15 (a motionless advanced clockwork prowler has AC 8)."],
                    "dc": 1,
                    "gp": 1500,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Clockwork prowler (advanced)"
                },
                {
                    "name": "Cooking powder",
                    "desc": ["By boiling certain seeds with handfuls of rust, halfling alchemists create these red flakes, which smolder slowly when touched by a spark or flame. If sprinkled over food and lit, a handful of cooking powder can cook meat or vegetables in 20 minutes without light or significant heat, though it lends a metallic flavor to any foods. If held to a living creature’s flesh, smoldering cooking powder deals 1 point of fire damage per minute for 20 minutes. One jar of cooking powder is enough to cook up to 5 pounds of food in 1-pound increments. Crafting a jar of cooking powder requires a successful DC 15 Craft (alchemy) check."],
                    "dc": 15,
                    "gp": 2,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Cooking powder"
                },
                {
                    "name": "Coral boulder",
                    "desc": ["This sponge-sized brick is actually a desiccated chunk of living coral. When exposed to at least 1 gallon of water, it expands into a full-sized boulder within 1 minute. A fully expanded coral boulder is an irregular sphere 3 feet in diameter. An expanded boulder has a hardness of 7, has 55 hit points, and weighs 8 pounds. The water in a coral boulder slowly evaporates if it's left in a dry environment, and the boulder shrinks back to its original size in about a week. If dropped in water, a coral boulder sinks straight down, and is not moved by tides or flowing water."],
                    "dc": 20,
                    "gp": 50,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Coral boulder"
                },
                {
                    "name": "Crucible",
                    "desc": ["A crucible is a type of vessel that can be heated to extreme temperatures for the purpose of inducing special alchemical reactions. A portable crucible is a cylinder 12 inches tall and 18 inches in diameter that weighs 3 pounds; it has the same price as a full-sized crucible. Use of a crucible requires a heat source."],
                    "dc": 1,
                    "gp": 20,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Crucible"
                },
                {
                    "name": "Dampening Ointment",
                    "desc": ["This pale salve is always cool to the touch, regardless of the surrounding temperature. When spread on your skin, it subtly alters your aura, making you more difficult for some creatures to detect. For 1 hour after applying the ointment to your skin, you can attempt a Stealth check to hide from any creature attempting to perceive you using lifesense or spiritsense (see the psychopomp subtype), even if you are clearly in that creature’s perceptual field. Crafting this item requires a successful DC 25 Craft (alchemy) check."],
                    "dc": 25,
                    "gp": 250,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Dampening Ointment"
                },
                {
                    "name": "Darklight lantern",
                    "desc": ["This lantern does not burn oil, but instead burns shadowcloy (see below). When shadowcloy is used as its fuel, this lantern creates a strange, hazy darkness that decreases the light level for 30 feet around it by one step . Unlike when shadowcloy is thrown at a single target, this haze does not decrease natural darkness to supernatural darkness. One flask of shadowcloy fuels a darklight lantern for 1 minute."],
                    "dc": 1,
                    "gp": 20,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Darklight lantern"
                },
                {
                    "name": "Dead air vial",
                    "desc": ["Within this corked vial is a tiny sample of what is known as “dead air.” Heavy, still, and of unknown origin, pockets of dead air becalm airships and smother crews in remote parts of the Plane of Air. When you open a dead air vial, invisible dead air fills a 20-foot-radius area centered on you. The affected area becomes devoid of breathable air. Creatures that breathe air must hold their breath or suffocate in an area of dead air, though sound, fire, and other effects that rely on a stable atmosphere are unaffected. Undisturbed, the dead air dissipates in 1 minute. A moderate wind (11+ mph) disperses the dead air in 4 rounds; a strong wind (21+ mph) disperses the dead air in 1 round. This item can be crafted with a successful DC 25 Craft (alchemy) check."],
                    "dc": 25,
                    "gp": 200,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Dead air vial"
                },
                {
                    "name": "Deep breath",
                    "desc": ["Darklands explorers who frequently run afoul of troglodytes, pockets of natural gas, and toxic fumes from magma flows use this dense flask to ease their breathing. You can open the flask as a standard action or throw it as a splash weapon. When opened or broken, the flask releases a burst of cleansing, breathable air in a 10-foot-radius burst, providing a +4 alchemical bonus on saving throws against gases, inhaled poisons, or other breathable hazards. The cloud of fresh air lasts for 1d4 rounds. If you hit a creature that has the stench ability with a thrown flask of deep breath, the DC of its stench is reduced by 4 for the duration of the cloud."],
                    "dc": 1,
                    "gp": 100,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Deep breath"
                },
                {
                    "name": "Defoliant",
                    "desc": ["This milky fluid can be mixed with water to quickly kill light and medium vegetation. One flask of defoliant kills light brush and small trees in 50 5-foot squares. Light vegetation (anything but trees) dies within 1 hour and can be cleared at a rate of 10 minutes per 5-foot square (representing uprooting dead plants and breaking stumps into gravel-sized pieces), leaving barren ground. Medium vegetation (anything but massive trees) dies in 2 hours and can be cleared at a rate of 1 hour per 5-foot square. Massive trees can usually survive a single dose of defoliant, and using defoliant doesn’t make clearing them any easier. Defoliant can be used as a splash weapon against plant creatures. A direct hit with the undiluted fluid deals 1d6 hit points of damage, 1 point of Strength damage, and 1 point of Constitution damage (Fortitude DC 20 negates the Strength and Constitution damage); plant creatures within 5 feet of the target take 1 hit point of damage."],
                    "dc": 25,
                    "gp": 30,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Defoliant"
                },
                {
                    "name": "Deodorizing agent (vial)",
                    "desc": ["Coating a creature in a vial of this milky, odorless substance takes 1 minute and renders it scentless for 1d3 hours. Creatures that rely on scent for locating creatures do not gain the benefit of this ability against a creature affected by a dose of deodorizing agent."],
                    "dc": 25,
                    "gp": 30,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Deodorizing agent (vial)"
                },
                {
                    "name": "Drought powder",
                    "desc": ["This unique, salty alchemical powder is crafted in Darklands communities where fresh water is either scarce or guarded by dangerous predators. Consuming 1 dose allows you to go without water for 3 days instead of 1, in growing discomfort but without any negative effects. After this time, you must attempt a Constitution check once every 6 hours instead of once per hour to avoid taking nonlethal damage. One dose of drought powder functions for 1 week, after which penalties for thirst accrue at their normal pace ( Pathfinder RPG Core Rulebook 444 )."],
                    "dc": 1,
                    "gp": 5,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Drought powder"
                },
                {
                    "name": "Duskeye",
                    "desc": ["This liquid makes the eyes more receptive to light for 4 hours. The user gains low-light vision, but also suffers from light sensitivity for the duration. Crafting duskeye requires a successful DC 16 Craft (alchemy) check."],
                    "dc": 16,
                    "gp": 50,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Duskeye"
                },
                {
                    "name": "Ectoplasmic tracer",
                    "desc": ["This small canister has a hand pump, allowing it to forcefully eject the semi-ethereal green concoction held within. Spraying a creature with ectoplasmic tracer is a ranged touch attack with a range increment of 10 feet. A single canister holds enough ectoplasmic tracer to coat one Medium or smaller incorporeal creature. When coated with ectoplasmic tracer, an incorporeal creature leaves behind a trail of vibrant mucus that allows it to be tracked by mundane means. Calculate the Survival DC to track an incorporeal creature covered in ectoplasmic tracer as though you were following tracks left on soft ground. Once discharged, ectoplasmic tracer dissolves after 1d4 days. Ectoplasmic tracer has no effect when sprayed on a corporeal creature. Crafting this item requires a successful DC 20 Craft (alchemy) check."],
                    "dc": 20,
                    "gp": 100,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Ectoplasmic tracer"
                },
                {
                    "name": "Efreeti cord",
                    "desc": ["Originally discovered by dwarven alchemists working with adamantine dust, efreeti cord is a viscid length of string approximately 18 inches long and blue-gray in color. It can be purchased in greater lengths by multiplying the price for every 18 inches or fraction thereof. Flexible and sticky, a length of efreeti cord can be carefully shaped into almost any pattern, draped upon an object, or wrapped around a fixture, and will stay in place until activated. Once activated (using an efreeti switch; see below), efreeti cord rapidly heats up, and after 1 round becomes a white-hot cord of fire. In the first round, the cord deals 3d6 points of fire damage to an object. This damage ignores any hardness less than 10, and is not halved for an object. The cord continues to burn for 2 additional rounds, dealing 2d6 points of fire damage the first additional round and 1d6 points the second."],
                    "dc": 10,
                    "gp": 50,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Efreeti cord"
                },
                {
                    "name": "Efreeti switch",
                    "desc": ["An efreeti switch is the activation device for efreeti cord; it measures approximately 6 inches in length and is made of a supple, red-brown alchemical compound. It is not consumed when activating a length of cord, and it can be used with any length of efreeti cord. It’s possible to key lengths of efreeti cord to a specific switch; however, this doubles the price of both the efreeti cord and the switch."],
                    "dc": 10,
                    "gp": 25,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Efreeti switch"
                },
                {
                    "name": "Elemental breath",
                    "desc": ["This vial at first seems to be empty, but when it's opened, a rush of wind issues forth from within. When elemental breath is inhaled (as drinking a potion) by an air-breathing creature, that creature does not need to breath air for 10 rounds. A vial of elemental breath must be inhaled on the round it was opened to gain this effect. If it is not, the item is wasted."],
                    "dc": 20,
                    "gp": 80,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Elemental breath"
                },
                {
                    "name": "Elemental proofing",
                    "desc": ["This alchemical gel comes in a large\r vial with a brush built into the stopper.\r It’s used to coat the surface of objects,\r protecting them from a specific type\r of energy damage. Though elemental\r proofing is not harmful to the objects it coats, it acts as a\r contact poison to living creatures. Touching elemental proofing\r directly causes 1d4 points of damage and 1d4 rounds of\r sickness (a DC 14 Fortitude save negates the latter effect).\r Creatures immune to poison are likewise immune to the\r effects of contacting elemental proofing but gain no benefits\r from its application. When applied to weapons or armor,\r elemental proofing confers resistances to the coated object,\r but none to the wearer.   Each vial of elemental proofing contains enough gel to coat\r one Large object, or two Medium or smaller objects. Once\r the applied gel dries, it absorbs 10 points of the specified\r type of elemental damage each round. Elemental proofing\r wears off after 24 hours, and multiple applications of the\r gel do not stack. There are four different types of elemental\r proofing: acid proofing provides acid resistance 10, flame\r proofing provides fire resistance 10, frost proofing provides\r cold resistance 10, and lightning proofing provides electricity\r resistance 10."],
                    "dc": 1,
                    "gp": 100,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Elemental proofing"
                },
                {
                    "name": "Embalming fluid",
                    "desc": ["This fluid is used to preserve corpses, whether for later dissection, taxidermy, necromancy, or magic such as raise dead. Embalming fluid is technically a poison, and using it makes a corpse unpalatable to most animals and vermin, though corpse-eating undead don’t mind the taste. Treating a corpse with embalming fluid takes 1 hour and a successful DC 25 Heal check. The embalmed corpse decays at half the normal rate (each day dead counts as half a day for the purpose of raise dead )."],
                    "dc": 25,
                    "gp": 50,

                {
                    "name": "Exemplar weapon salve",
                    "desc": ["This alchemical salve strengthens the material of a weapon, improves its balance, gives it greater flexibility without sacrificing resilience, and enhances its ability to hold an edge or point and survive an impact. An application turns a typical nonmagical melee weapon into a masterwork weapon. A double weapon requires 2 doses of exemplar weapon salve, and 50 arrows, bolts, or similar ammunition can be enhanced by a single application."],
                    "dc": 1,
                    "gp": 350,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Exemplar weapon salve"
                },
                {
                    "name": "Falsehood fizz",
                    "desc": ["When imbibed, this cloudy, pink liquid grants you 1d4 uses of alchemical inspiration that can be used only on Bluff checks to lie or to deliver secret messages. Additionally, you can spend two uses of alchemical inspiration to gain inspiration on a saving throw against truth-detecting or truth-forcing magic (such as discern lies or zone of truth ).   The benefits of falsehood fizz last for 1 hour. During this time, you must roll Sense Motive checks twice and take the worse result."],

                },
                {
                    "name": "Fellowship film",
                    "desc": ["By eating this thin sheet of glossy gelatin, you gain 1d4 uses of alchemical inspiration that can be used only on Diplomacy checks. The benefits of fellowship film last for 1 hour, during which you must roll all Intimidate checks twice and take the worse result."],
                    "dc": 15,

                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Fellowship film"
                },
                {
                    "name": "Fervor juice",
                    "desc": ["This foul-tasting alchemical concoction grants those that imbibe it ferocity for a short period of time. This functions as the universal monster rule of the same name, and lasts for 1 hour from the time you ingest the solution. Crafting this item requires a successful DC 20 Craft (alchemy) check."],
                    "dc": 20,
                    "gp": 50,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Fervor juice"
                },
                {
                    "name": "Fiendgore unguent",
                    "desc": ["When this unguent—prepared with vile alchemical reagents and the gore of fiends—is applied to a wounded tiefling or evil outsider (not currently at maximum hit points), it momentarily transforms the essence of the target into something even more fearsome and demonic. While under the effects of a fiendgore unguent, a tiefling or an evil outsider gains a +2 circumstance bonus on Intimidate checks and a +1 circumstance bonus to the DC of all spells with the fear descriptor that they cast. Applying the unguent is a delicate process, requiring a full-round action, and can only be properly applied to a willing or helpless creature. If applied to a creature other than a tiefling or an evil outsider, it sickens the creature instead. The unguent's effects (either beneficial or harmful) last for 1 minute."],
                    "dc": 20,
                    "gp": 75,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Fiendgore unguent"
                },
                {
                    "name": "Filter",
                    "desc": ["A specialized paper filter is used in alchemy because it can be adjusted to capture different substances according to the type of reagents used to prime it. Alchemical filters are single-use only."],
                    "dc": 1,
                    "gp": 0.05,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Filter"
                },
                {
                    "name": "Fire ink",
                    "desc": ["This rich yellow ink reacts with a creature's body heat to create a flickering, flamelike glow. It takes 10 minutes to apply fire ink, and 1 dose covers an approximately hand-sized area. Once applied, the ink glows as a candle for 24 hours. Four or more doses applied to the same part of the body glow as a torch for 24 hours. The alchemical reaction of the ink to the target's skin and body heat is painful and irritating, giving the target the sickened condition while the glow lasts. A DC 15 Heal check can temporarily soothe these sensations, negating the sickened condition for 1 hour. Creatures immune or resistant to fire are immune to this sickening effect. Ifrits are especially known for their fondness for fire ink, and ifrit fire-dancers often decorate their skin with flaming designs before performing. A concentrated version of the ink costs 10 times as much and can be used to make permanently glowing tattoos."],
                    "dc": 15,
                    "gp": 1,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Fire ink"
                },
                {
                    "name": "Firearm oil",
                    "desc": ["This clear, viscous oil comes in a squat bottle with a dropper that dispenses one drop of oil at a time. When applied to an early or advanced firearm, it seeps into the weapon’s inner workings and protects the gun from powder residue and everyday wear and tear. Applying firearm oil takes 1 minute; once applied, it reduces the misfire value of the firearm by 1 for 1 hour or until the firearm is discharged. Firearm oil can’t reduce a firearm’s misfire value to lower than 1. A single bottle contains enough oil for 20 applications on one-handed firearms (or 10 applications on two-handed firearms). Crafting firearm oil requires a successful DC 15 Craft (alchemy) check."],
                    "dc": 15,
                    "gp": 260,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Firearm oil"
                },
                {
                    "name": "Fireskin elixir",
                    "desc": ["This elixir turns its imbiber fiery red, making it easier to pass as an efreeti. Unscrupulous efreet can sell fireskin elixir to guests who have been barred from citizen-only districts and must rely on disguises. Fireskin is highly addictive. Many once-savvy merchants have fallen into destitution as they scrambled to maintain efreet favor and secure a steady supply of the drug. This item can be crafted with a successful DC 20 Craft (alchemy) check. Fireskin Type ingested; Addiction major, Fortitude DC 20   Price 100 gp   Effect 1 day; +10 alchemical bonus on Disguise checks to appear as an efreeti, –1 penalty on all saves   Damage 1d2 Wis damage"],
                    "dc": 20,
                    "gp": 100,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Fireskin elixir"
                },
                {
                    "name": "Flash seeds",
                    "desc": ["These alchemical beads function as sentry seeds, but are also filled with an alchemical gas that explodes on contact with the air. This explosion is louder and flashier than the pop of normal sentry seeds (Perception DC 0). Creatures within 5 feet of the beads when they break must succeed at a DC 11 Fortitude save or be blinded for 1 round."],
                    "dc": 15,
                    "gp": 35,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Flash seeds"
                },
                {
                    "name": "Foaming powder",
                    "desc": ["When you add this 1-pound bag of green powder to a gallon of water, the two combine to form 50 cubic feet of thick green foam. Unless contained, in 1 round the foam fills a 5-foot-square to a depth of 2 feet. When multiple pounds of powder are used, the foam expands at a rate of one 5-foot square per round. Ground covered with the foam is treated as difficult terrain, but is otherwise harmless. After 1 hour, the foam hardens to form a buoyant material roughly the density of honeycomb. The cured foam is easy to cut, with hardness 0 and 5 hit points per foot of thickness. The cured foam breaks down over a few days, and even faster if exposed to water. Casting transmute mud to rock on uncured foam converts it into a soft, pumice-like stone (hardness 2, 5 hit points per inch of thickness)."],
                    "dc": 20,
                    "gp": 10,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Foaming powder"
                },
                {
                    "name": "Focus chew",
                    "desc": ["When chewed, this spongy gum releases mild stimulants that heighten your focus. Derros use focus chew in an effort to improve their experiments, though spellcasters from other Darklands cultures have adopted their recipe for use in research. For up to 1 hour while chewing focus chew, you gain a +2 alchemical bonus on concentration checks and a +1 alchemical bonus on Intelligence-based skill checks."],
                    "dc": 1,
                    "gp": 40,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Focus chew"
                },
                {
                    "name": "Fool's glow",
                    "desc": ["A greasy paste of beeswax, pyrite, and various monster fluids, fool’s glow reacts with light to confuse magical senses. For 12 hours after being smeared over an object or creature (a process requiring 1 minute), the fool’s glow detects as faintly magical if examined with a detect magic or arcane sight spell, though no school or specific spell can be identified. With a successful DC 21 Craft (alchemy) or Spellcraft check, a character identifies the coating for what it is. A single jar of fool’s glow can coat one Medium, two Small, or four Tiny or smaller objects. Crafting a jar of fool’s glow requires a successful DC 20 Craft (alchemy) check."],
                    "dc": 20,
                    "gp": 45,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Fool's glow"
                },
                {
                    "name": "Frightful war paint",
                    "desc": ["This bone-white paste makes your face appear skeletal and emotionless, like a visage of death itself. When you apply frightful war paint to yourself (or to a willing adjacent creature) as a full-round action, attempt a Disguise or Charisma check. Living creatures within 30 feet of the wearer must succeed at a Will save (DC equal to the result of your Disguise or Charisma check, maximum DC 20) or become shaken for 1d4 rounds. Blind creatures and creatures out of line of sight are unaffected. A creature that succeeds at its check becomes immune to this frightful war paint for 24 hours. Frightful war paint can be worn indefinitely, but it contains quicksilver and realgar, which have deleterious mental effects. If you wear frightful war paint for more than 1 minute per day (whether as a single use of it or as multiple uses over several periods of time), you take 1 point of Constitution damage, plus 1 point of Wisdom damage for every minute you wear the paint that day after the first."],
                    "dc": 30,
                    "gp": 300,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Frightful war paint"
                },
                {
                    "name": "Fuel pellet (10)",
                    "desc": ["Small nuggets of compressed fibers, resins, and dung, fuel\r\npellets give off very little smoke when burned. Each pellet\r\nburns for 10 minutes, providing enough heat to boil water, and\r\ncan be lit as a move action."],
                    "dc": 15,
                    "gp": 0.03,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Fuel pellet (10)"
                },
                {
                    "name": "Garlic tablets",
                    "desc": ["These small gray-white tablets are made of dehydrated and condensed garlic bulbs. One hour after you eat a garlic tablet, you begin to stink as the essence of the tablet seeps out of your pores. This state lasts for 4 hours. Subsequent doses of garlic tablets reset this duration. During this time, you can keep a vampire at bay ( Pathfinder RPG Bestiary 270) as a free action without need of a holy symbol or mirror. The vampire must succeed at a DC 25 Will save to overcome its natural revulsion to garlic; failure means it must stay at least 5 feet away from you and cannot touch you or make melee attacks against you. However, unlike while keeping a vampire at bay with a mirror or holy symbol, once the vampire succeeds at its save against the garlic tablets, it’s no longer affected by that creature’s odor and may act normally without need of further saving throws.   Garlic tablets are valuable aids to vampire hunters, but while benefiting from the tablets’ strong odor, you take a –2 penalty on all Charisma checks and Charisma-based skill checks for the duration of the effect. The listed price is for three tablets.Crafting garlic tablets requires a successful DC 20 Craft (alchemy) check."],
                    "dc": 20,
                    "gp": 20,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Garlic tablets"
                },
                {
                    "name": "Ghost ink",
                    "desc": ["Pale blue when wet, ghost ink dries to near-transparency 1 minute after application. Ghost ink is used to subtly mark trails and locations. The pigment glows red under the light shed by fire beetle glands and sunrods; otherwise, a successful DC 25 Perception check is required to notice a mark in ghost ink. One vial of ghost ink is sufficient for writing a page’s worth of characters."],
                    "dc": 25,
                    "gp": 25,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Ghost ink"
                },
                {
                    "name": "Gloom sight goggles",
                    "desc": ["These nonmagical goggles are set with a piece of alchemically treated, black, obsidianlike stone found in the mountainous regions of the Shadow Plane. Gloom sight goggles interact with the unique eyes of fetchlings in such a way that when the goggles are worn over both eyes, they expand the range of a fetchling's darkvision to 90 feet, but the fetchling also gains the light sensitivity weakness. Other races cannot see through the lenses of these goggles, and they have no affect on fetchlings whose eyes have been modified by the Gloom Sight feat. Though they are alchemical rather than magical in nature, these goggles take up the magic item eye slot."],
                    "dc": 25,
                    "gp": 200,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Gloom sight goggles"
                },
                {
                    "name": "Gloomstick",
                    "desc": ["This variant sunrod was developed by fetchling alchemists. When twisted as a standard action, a gloomstick begins drawing in light from the surrounding area, reducing the light level by one step (to a minimum of dim light) in a 20-foot radius. A gloomstick remains active for 1 minute before crumbling to dust."],
                    "dc": 25,
                    "gp": 25,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Gloomstick"
                },
                {
                    "name": "Glowing ink",
                    "desc": ["Often extracted from phosphorescent insects, tiny marine plants, or subterranean fungi, glowing ink emits a faint but steady light (typically red or green) that allows you to read it in normal darkness—this includes darkness created by spells like darkness , but not the supernatural darkness created by deeper darkness . If there is glowing ink on an object, you have a +2 bonus on Perception checks to locate it. Mixing glowing ink with marker dye makes the dye glow in the dark until it fades."],
                    "dc": 15,
                    "gp": 5,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Glowing ink"
                },
                {
                    "name": "Golden maple leaves",
                    "desc": ["These potent additives can only be culled from a rare maple tree known to grow exclusively in urban areas. These small, elaborately twisting trees are extremely slow to grow and mature—the leaves reach maturity only once every 3 years—and they are almost always grown and cultivated by half-elves. Additionally, half-elves are keenly aware of the effort put into the leaves' growth and normally only sell the products of their labors to others of their kind. When the golden maple's delicate, five-pointed leaves finally take on their namesake's color, they can be cut, dried, and then ground into a fine powder, a process that requires a DC 15 Knowledge (nature) or Profession (herbalist) check. When used in conjunction with the Craft (alchemy) skill to create special substances and items like alchemical grease or tanglefoot bags, golden maple leaves reduce the Craft DC by 5 and add +1 to the DC of any save required by the alchemical item. A single dose of golden maple leaf powder is sufficient to augment the crafting of three alchemical items."],
                    "dc": 1,
                    "gp": 50,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Golden maple leaves"
                },
                {
                    "name": "Gravelly tonic",

                    "dc": 25,
                    "gp": 50,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Gravelly tonic"
                },
                {
                    "name": "Gum rope",
                    "desc": ["This small tacky blue pellet is deceptively dense. When the pellet is broken, an alchemical reaction causes it to grow suddenly into a 30-foot-long spongy rope as strong as a normal hemp rope. It dissolves 8 hours thereafter."],
                    "dc": 20,
                    "gp": 30,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Gum rope"
                },
                {
                    "name": "Harpy musk",
                    "desc": ["For all their cowardice and cruelty, goblins have a keen sense of what can kill them, and harpies number among goblins’ most feared predators. Using this knowledge to their advantage, Varisian alchemists have devised ways to recreate or distill the musk of harpies into a potent concoction. If smeared on a surface or used as a thrown weapon, harpy musk fills a 30-foot area for 10 minutes before dispersing. Any goblin who enters the area must succeed at a DC 14 Will save or be shaken for 1 minute. Harpy musk affect only goblins—bugbears and hobgoblins are unaffected. Harpy musk can be created with a successful DC 20 Craft (alchemy) check."],
                    "dc": 20,
                    "gp": 20,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Harpy musk"
                },
                {
                    "name": "Hobgoblin war draught",
                    "desc": ["Craft DC 15 for hobgoblins.   This drink is a foul-smelling alchemical blend of raw alcohol, mashed grubs, and medicinal mushrooms. A hobgoblin under the effects of hobgoblin war draught ignores all penalties resulting from the fatigued and shaken conditions for 10 minutes, after which he must succeed at a DC 15 Fortitude save or be sickened for 1 hour. Anyone lacking the goblinoid subtype who drinks hobgoblin war draught must immediately make a DC 15 Fortitude save or be sickened for 1 hour; success means the drinker ignores all penalties resulting from the fatigued and shaken conditions for 1 minute, after which he is sickened for 10 minutes. Hobgoblin war draught has no effect on creatures that are immune to poison."],
                    "dc": 20,
                    "gp": 10,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Hobgoblin war draught"
                },
                {
                    "name": "Homunculus clay",
                    "desc": ["This thick clay mixture comes in a jar stamped with a silhouette of whatever creature can be created using its contents. By adding a drop of blood to a scoop of homunculus clay, you can create a temporary homunculus that hardens and becomes fully animate in just 1 round. The character whose blood is used is treated as the homunculus’s master. After 1 hour, a clay homunculus withers and dies, rapidly decaying into a viscous slime. The listed price is for a jar containing 3 doses of homunculus clay."],

                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Ifrit's blood"

                    "gp": 200,
                    "link": "https://aonprd.com/EquipmentMiscDisplay.aspx?ItemName=Incense of divinity"
