<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PathFriends Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #121212; color: #fff; }
    .map-shell { display: grid; grid-template-columns: minmax(0, 1fr) 320px; gap: 12px; height: calc(100vh - 78px); padding: 12px; }
    .map-main, .map-side { background: #1e1e1e; border: 1px solid #333; border-radius: 8px; min-width: 0; }
    .map-main { display: grid; grid-template-rows: auto minmax(0, 1fr); overflow: hidden; }
    .map-toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: end; padding: 10px; border-bottom: 1px solid #333; }
    .map-toolbar .form-control, .map-toolbar .form-select { width: auto; min-width: 96px; }
    .map-settings-button { margin-left: auto; }
    .map-settings-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
    .map-docs-modal-content { max-height: calc(100vh - 32px); overflow: hidden; }
    .map-docs-modal-body { min-height: 0; overflow: hidden; }
    .map-docs-layout { display: grid; grid-template-columns: minmax(190px, 240px) minmax(0, 1fr); height: min(68vh, 620px); min-height: 0; overflow: hidden; }
    .map-docs-list { min-height: 0; border-right: 1px solid #444; padding: 12px; overflow-y: auto; }
    .map-docs-list-button { width: 100%; display: flex; align-items: center; gap: 9px; padding: 9px 10px; border: 0; border-radius: 6px; background: transparent; color: #ddd; text-align: left; }
    .map-docs-list-button:hover, .map-docs-list-button.active { background: #303030; color: #fff; }
    .map-docs-list-button.active { box-shadow: inset 3px 0 #8fd19e; }
    .map-docs-list-button .bi { width: 18px; color: #8fd19e; text-align: center; }
    .map-docs-group { margin: 14px 10px 5px; color: #888; font-size: 10px; font-weight: 700; text-transform: uppercase; }
    .map-docs-group:first-child { margin-top: 2px; }
    .map-docs-detail { min-width: 0; min-height: 0; padding: 20px 22px; overflow-y: auto; }
    .map-docs-detail h3 { font-size: 21px; margin-bottom: 12px; }
    .map-docs-detail h4 { margin-top: 20px; color: #aaa; font-size: 12px; text-transform: uppercase; }
    .map-docs-detail p, .map-docs-detail li { color: #ddd; line-height: 1.55; }
    .map-docs-back { display: none; }
    .map-stage-wrap { position: relative; overflow: auto; padding: 12px; }
    .map-stage { position: relative; width: calc(var(--cols) * var(--cell)); height: calc(var(--rows) * var(--cell)); min-width: calc(var(--cols) * var(--cell)); min-height: calc(var(--rows) * var(--cell)); background-color: #202020; background-image: linear-gradient(to right, rgba(255,255,255,.18) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,.18) 1px, transparent 1px), var(--map-bg); background-size: var(--cell) var(--cell), var(--cell) var(--cell), var(--bg-size); background-position: 0 0, 0 0, center; background-repeat: repeat, repeat, no-repeat; border: 1px solid #555; }
    .map-token, .map-shape { position: absolute; left: calc(var(--x) * var(--cell)); top: calc(var(--y) * var(--cell)); width: calc(var(--w) * var(--cell)); height: calc(var(--h) * var(--cell)); display: grid; place-items: center; user-select: none; touch-action: none; cursor: grab; z-index: var(--z, 2); }
    .map-aura { position: absolute; left: calc(var(--aura-x) * var(--cell)); top: calc(var(--aura-y) * var(--cell)); width: calc(var(--aura-size) * var(--cell)); height: calc(var(--aura-size) * var(--cell)); border: 2px solid var(--aura-color); border-radius: 50%; background: color-mix(in srgb, var(--aura-color) 18%, transparent); pointer-events: none; z-index: 1; box-shadow: 0 0 10px color-mix(in srgb, var(--aura-color) 30%, transparent); }
    .map-token { border-radius: 50%; background-color: var(--color); background-image: var(--token-image, none); background-size: cover; background-position: center; background-repeat: no-repeat; border: 2px solid #f8f9fa; color: #111; font-weight: 800; box-shadow: 0 2px 8px rgba(0,0,0,.45); }
    .map-token.has-image .token-label { display: none; }
    .map-token.enemy { border-color: #ffb3b3; color: #fff; }
    .map-token.generic-token { border-color: #9ec5fe; color: #fff; }
    .map-token.enemy.enemy-hidden { opacity: .45; border-style: dashed; }
    .map-token.token-hidden { opacity: .42; border-style: dashed; filter: saturate(.75); }
    .map-token.selected, .map-shape.selected { outline: 3px solid #8fd19e; outline-offset: 2px; }
    .map-token.turn-active { outline: 4px solid #f0d58c; outline-offset: 3px; box-shadow: 0 0 0 3px rgba(240, 213, 140, .28), 0 2px 8px rgba(0,0,0,.45); }
    .token-label { max-width: 100%; padding: 0 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; text-shadow: 0 1px 2px rgba(255,255,255,.5); }
    .token-hover-card { display: none; position: absolute; bottom: calc(100% + 7px); left: 50%; transform: translateX(-50%); min-width: 150px; max-width: 220px; padding: 6px 8px; border: 1px solid #555; border-radius: 6px; background: #1e1e1e; color: #f8f9fa; box-shadow: 0 4px 12px rgba(0,0,0,.45); font-size: 12px; line-height: 1.25; z-index: 80; pointer-events: none; }
    .token-hover-card::after { content: ""; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 6px solid transparent; border-top-color: #555; }
    .token-hover-layer { position: absolute; inset: 0; z-index: 2147483000; pointer-events: none; }
    .token-hover-layer .token-hover-card { display: block; bottom: auto; }
    .token-hover-name { font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .token-hover-hp { color: #8fd19e; }
    .aura-effect-toasts { position: fixed; top: var(--aura-toast-top, 86px); right: var(--aura-toast-right, 20px); z-index: 1090; display: grid; gap: 8px; width: min(300px, var(--aura-toast-width, calc(100vw - 40px))); max-height: var(--aura-toast-max-height, calc(100vh - 110px)); overflow: auto; pointer-events: none; }
    .aura-effect-toast { pointer-events: auto; background: rgba(36, 36, 36, .82); backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,.22); border-left: 4px solid #f0d58c; border-radius: 8px; padding: 9px; box-shadow: 0 8px 24px rgba(0,0,0,.45); }
    .map-shape { border: 2px solid var(--color); background: color-mix(in srgb, var(--color) 28%, transparent); }
    .map-shape.shape-grid { display: grid; grid-template-columns: repeat(var(--shape-cols), var(--cell)); grid-template-rows: repeat(var(--shape-rows), var(--cell)); place-items: stretch; border: 0; background: transparent; }
    .shape-cell { background: color-mix(in srgb, var(--color) 28%, transparent); border: 1px solid var(--color); }
    .shape-cell.texture-cell { border: 0; background-color: transparent; background-image: var(--texture-url); background-repeat: no-repeat; background-size: 600% 400%; background-position: var(--tile-x) var(--tile-y); }
    .shape-texture-picker { display: grid; grid-template-columns: repeat(auto-fill, minmax(52px, 1fr)); gap: 6px; }
    .shape-texture-option { min-height: 46px; border: 1px solid #555; border-radius: 6px; background: #242424; color: #ddd; display: grid; place-items: center; padding: 4px; }
    .shape-texture-option.active { border-color: #8fd19e; box-shadow: 0 0 0 1px #8fd19e inset; }
    .shape-texture-icon { width: 34px; height: 34px; background-repeat: no-repeat; background-size: 600% 400%; background-position: 0 0; }
    .movement-ruler { position: absolute; inset: 0; pointer-events: none; z-index: 20; overflow: visible; }
    .movement-ruler-line { stroke: #f0d58c; stroke-width: 2; vector-effect: non-scaling-stroke; filter: drop-shadow(0 1px 2px rgba(0,0,0,.65)); }
    .movement-ruler-dot { fill: #f0d58c; stroke: #1e1e1e; stroke-width: 2; }
    .movement-ruler-label { position: absolute; transform: translate(-50%, calc(-100% - 8px)); padding: 3px 7px; border: 1px solid #665b35; border-radius: 999px; background: #1e1e1e; color: #f0d58c; font-size: 12px; font-weight: 700; white-space: nowrap; pointer-events: none; box-shadow: 0 4px 10px rgba(0,0,0,.45); }
    .map-side { display: grid; grid-template-rows: auto minmax(0, 1fr); overflow: hidden; }
    .side-tabs { padding: 10px; border-bottom: 1px solid #333; }
    .side-scroll { overflow-y: auto; overflow-x: hidden; padding: 10px; min-width: 0; }
    .map-side-nav { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 6px; margin-top: 10px; }
    .map-side-nav .nav-link { border: 1px solid #444; color: #ddd; padding: 6px 4px; font-size: 12px; min-width: 0; white-space: normal; overflow-wrap: anywhere; }
    .map-side-nav .nav-link.active { background: #8fd19e; border-color: #8fd19e; color: #111; font-weight: 700; }
    .side-section { margin-bottom: 14px; min-height: 0; }
    .side-title { color: #aaa; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
    .initiative-row, .timeline-row { background: #242424; border: 1px solid #444; border-radius: 8px; padding: 7px; margin-bottom: 6px; }
    .timeline-row { font-size: .7rem; }
    .initiative-row.active { border-color: #8fd19e; background: rgba(143, 209, 158, .1); }
    .initiative-row.disabled { opacity: .48; filter: grayscale(.7); }
    .initiative-name { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 700; }
    .initiative-row-grid { display: grid; grid-template-columns: minmax(0, 1fr) minmax(58px, 66px) minmax(0, auto); gap: 5px; align-items: center; min-width: 0; }
    .initiative-controls { display: inline-flex; gap: 3px; min-width: 0; }
    .initiative-meta { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
    .initiative-custom .accordion-button { background: #242424; color: #ddd; padding: 7px 10px; font-size: 12px; }
    .initiative-custom .accordion-button:not(.collapsed) { background: #2b2b2b; color: #fff; box-shadow: none; }
    .initiative-custom .accordion-body { background: #1e1e1e; border: 1px solid #333; border-top: 0; padding: 8px; }
    .turn-effect-notices { position: fixed; z-index: 1100; left: 50%; top: 88px; transform: translateX(-50%); display: grid; gap: 7px; width: min(360px, calc(100vw - 24px)); pointer-events: none; }
    .turn-effect-notice { border: 1px solid rgba(224,93,93,.75); border-left: 4px solid #e05d5d; border-radius: 8px; background: rgba(36,36,36,.9); color: #fff; padding: 9px 11px; box-shadow: 0 8px 24px rgba(0,0,0,.45); text-align: center; }
    .timeline-list { max-height: 260px; overflow: auto; padding-right: 2px; }
    #mapTimelinePane.active { display: grid; grid-template-rows: auto auto minmax(0, 1fr); min-height: 100%; }
    #mapTimelinePane.active .timeline-list { max-height: none; min-height: 0; }
    .timeline-emphasis { color: #f0d58c; font-weight: 800; }
    .timeline-positive { color: #8fd19e; font-weight: 800; }
    .timeline-negative { color: #e05d5d; font-weight: 800; }
    .roll-result-list { display: grid; gap: 10px; }
    .roll-result-card { border: 1px solid #444; border-radius: 8px; background: #202020; padding: 12px; text-align: center; }
    .roll-result-label { color: #bbb; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
    .roll-die-value { font-size: 46px; line-height: 1; font-weight: 800; color: #f0d58c; font-variant-numeric: tabular-nums; }
    .roll-breakdown { display: grid; gap: 4px; margin-top: 10px; }
    .roll-breakdown-row { display: flex; justify-content: center; gap: 8px; align-items: baseline; color: #ddd; }
    .roll-breakdown-row strong { color: #fff; font-size: 18px; }
    .roll-total-divider { width: min(220px, 80%); margin: 8px auto 4px; border-color: #555; opacity: 1; }
    .roll-total-row { gap: 10px; color: #f0d58c; font-size: 16px; font-weight: 700; text-transform: uppercase; }
    .roll-total-row strong { color: #fff; font-size: 30px; line-height: 1.1; }
    .roll-result-note { color: #f0d58c; font-weight: 700; margin-top: 8px; }
    .roll-note-positive, .roll-die-value.roll-note-positive { color: #8fd19e; }
    .roll-note-negative, .roll-die-value.roll-note-negative { color: #e05d5d; }
    .map-context-menu { position: fixed; z-index: 1080; min-width: 190px; padding: 6px; background: #1e1e1e; border: 1px solid #555; border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,.45); }
    .map-context-menu.d-none { display: none !important; }
    .map-context-menu-title { padding: 4px 8px 7px; color: #aaa; font-size: 12px; border-bottom: 1px solid #333; margin-bottom: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .map-context-menu .btn { width: 100%; justify-content: flex-start; text-align: left; }
    .map-context-submenu { border: 1px solid #333; border-radius: 6px; padding: 5px; margin: 4px 0; background: #181818; }
    .search-modal-dialog { width: min(1140px, calc(100vw - 2rem)); max-width: min(1140px, calc(100vw - 2rem)); }
    .search-modal-dialog.modal-lg { width: min(800px, calc(100vw - 2rem)); max-width: min(800px, calc(100vw - 2rem)); }
    .search-modal-results { min-height: min(48vh, 460px); max-height: min(62vh, 680px); overflow: auto; }
    .quick-effect-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 8px; }
    .quick-effect-card { position: relative; min-height: 118px; border: 1px solid #444; border-radius: 8px; background: #242424; color: #fff; padding: 10px; text-align: left; }
    .quick-effect-card:hover { border-color: #777; }
    .quick-effect-card .effect-type-icon { position: absolute; top: 8px; right: 8px; color: #f0d58c; }
    .quick-effect-chip { display: inline-block; border: 1px solid #555; border-radius: 999px; padding: 2px 7px; margin: 0 4px 4px 0; color: #ddd; font-size: 11px; }
    .quick-effect-controls { display: flex; flex-wrap: wrap; align-items: end; gap: 8px; margin-top: 8px; }
    .quick-effect-controls input[type="number"] { width: 72px; }
    .quick-target-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 8px; max-height: 55vh; overflow: auto; padding-right: 2px; }
    .quick-target-card { border: 1px solid #444; border-radius: 8px; background: #242424; padding: 8px 10px; }
    .selected-collapse .accordion-button { background: #242424; color: #ddd; padding: 7px 10px; font-size: 12px; }
    .selected-collapse .accordion-button:not(.collapsed) { background: #2b2b2b; color: #fff; box-shadow: none; }
    .selected-collapse .accordion-body { background: #1e1e1e; border: 1px solid #333; border-top: 0; padding: 8px; }
    .selected-collapse label { color: #fff; }
    .selected-collapse input { color: #fff !important; }
    .size-link-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: end; }
    .size-link-toggle { width: 32px; height: 31px; display: inline-flex; align-items: center; justify-content: center; padding: 0; }
    .enemy-picker-list { display: grid; gap: 8px; min-height: 0; max-height: 55vh; overflow: auto; align-content: start; }
    .enemy-picker-list.search-modal-results { min-height: 0; }
    .enemy-picker-row { background: #242424; border: 1px solid #444; border-radius: 8px; padding: 8px 10px; text-align: left; color: #fff; min-height: 62px; max-height: 92px; overflow: hidden; }
    .enemy-picker-row:hover { border-color: #777; }
    .mini-sheet { display: grid; gap: 8px; margin-bottom: 8px; }
    .mini-sheet-title { color: #aaa; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
    .mini-sheet-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(70px, 1fr)); gap: 5px; }
    .mini-sheet-card { background: #242424; border: 1px solid #444; border-radius: 6px; padding: 5px 7px; min-width: 0; }
    .mini-sheet-label { color: #aaa; font-size: 10px; text-transform: uppercase; }
    .mini-sheet-value { color: #fff; font-weight: 700; overflow-wrap: anywhere; }
    .mini-sheet-list { display: grid; gap: 4px; }
    .mini-sheet-row { display: flex; justify-content: space-between; gap: 8px; background: #242424; border: 1px solid #444; border-radius: 6px; padding: 5px 7px; min-width: 0; }
    .mini-sheet-row span { min-width: 0; overflow-wrap: anywhere; }
    .mini-sheet-row span:last-child { color: #fff; font-weight: 700; text-align: right; }
    .mini-sheet-conditional { border-left: 3px solid #f0d58c; background: rgba(240, 213, 140, .08); }
    .mini-sheet-conditional .mini-sheet-value, .mini-sheet-conditional .mini-sheet-row span:last-child { color: #f0d58c; }
    .mini-sheet-inline-conditional { margin-top: 3px; padding-top: 3px; border-top: 1px solid rgba(240, 213, 140, .22); color: #f0d58c; font-size: 11px; line-height: 1.2; }
    .mini-sheet-inline-conditional span { font-weight: 700; }
    .mini-sheet-inline-conditional small { color: #d8cfae; }
    .hp-number-input { appearance: textfield; -moz-appearance: textfield; }
    .hp-number-input::-webkit-inner-spin-button, .hp-number-input::-webkit-outer-spin-button { appearance: none; -webkit-appearance: none; margin: 0; }
    .map-weapon-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(92px, 1fr)); gap: 5px; margin: 4px 0 8px; padding: 6px; border: 1px solid #383838; border-radius: 6px; background: #1f1f1f; }
    .map-weapon-options-title { grid-column: 1 / -1; display: flex; align-items: center; gap: 6px; color: #aaa; font-size: 10px; text-transform: uppercase; letter-spacing: .04em; }
    .map-weapon-options-title .bi { color: #f0d58c; cursor: help; }
    .map-weapon-option { display: flex; align-items: center; justify-content: space-between; gap: 5px; color: #bbb; font-size: 10px; line-height: 1.15; }
    .map-weapon-option .form-check-input { width: 2.1em; height: 1.05em; margin: 0; flex: 0 0 auto; }
    .map-weapon-row { cursor: pointer; }
    .map-weapon-row .bi { color: #aaa; font-size: 12px; }
    input, textarea, select { background-color: #2b2b2b !important; color: white !important; border-color: #555 !important; }
    textarea { min-height: 72px; }
    .btn-icon { width: 28px; min-width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center; padding: 0; }
    @media (max-width: 980px) {
      .map-shell { grid-template-columns: 1fr; height: auto; }
      .map-main { min-height: 70vh; }
      .map-side { min-height: 420px; }
    }
    @media (max-width: 620px) {
      .map-settings-button { margin-left: 0; }
      .map-settings-grid { grid-template-columns: 1fr; }
      .map-docs-layout { display: block; height: min(72vh, 600px); min-height: 0; }
      .map-docs-list { height: 100%; border-right: 0; overflow-y: auto; }
      .map-docs-detail { display: none; height: 100%; padding: 14px; }
      .map-docs-layout.detail-open .map-docs-list { display: none; }
      .map-docs-layout.detail-open .map-docs-detail { display: block; }
      .map-docs-back { display: inline-flex; margin-bottom: 14px; }
    }
    @media (max-width: 380px) {
      .initiative-row-grid { grid-template-columns: minmax(0, 1fr) minmax(56px, 64px); }
      .initiative-controls { grid-column: 1 / -1; justify-content: flex-end; }
    }
  </style>
</head>
<body>
<div id="appNavbar"></div>

<main class="map-shell">
  <section class="map-main">
    <div class="map-toolbar">
      <button id="addCharacterToken" class="btn btn-primary btn-sm" type="button"><i class="bi bi-person-plus"></i> Character</button>
      <button id="addEnemyToken" class="btn btn-danger btn-sm" type="button"><i class="bi bi-bug"></i> Enemy</button>
      <button id="addGenericToken" class="btn btn-outline-info btn-sm" type="button"><i class="bi bi-circle-fill"></i> Token</button>
      <button id="addRectShape" class="btn btn-outline-light btn-sm" type="button"><i class="bi bi-square"></i> Rect</button>
      <button id="addCircleShape" class="btn btn-outline-light btn-sm" type="button"><i class="bi bi-circle"></i> Circle</button>
      <button id="openBackgroundOptions" class="btn btn-outline-light btn-sm btn-icon map-settings-button" type="button" title="Map settings" aria-label="Map settings">
        <i class="bi bi-gear"></i>
      </button>
    </div>

    <div class="map-stage-wrap">
      <div id="auraEffectToasts" class="aura-effect-toasts" aria-live="polite"></div>
      <div id="turnEffectNotices" class="turn-effect-notices" aria-live="polite"></div>
      <div id="mapStage" class="map-stage" aria-label="Battle map"></div>
    </div>
  </section>

  <aside class="map-side">
    <div class="side-tabs">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <h5 class="mb-0">Map</h5>
          <div id="gmHint" class="small text-secondary"></div>
        </div>
        <button id="nextTurn" class="btn btn-success btn-sm" type="button">Next</button>
      </div>
      <nav class="nav nav-pills map-side-nav" role="tablist" aria-label="Map sidebar">
        <button id="mapCharacterTab" class="nav-link active" data-bs-toggle="tab" data-bs-target="#mapCharacterPane" type="button" role="tab" aria-controls="mapCharacterPane" aria-selected="true">Character</button>
        <button id="mapInitiativeTab" class="nav-link" data-bs-toggle="tab" data-bs-target="#mapInitiativePane" type="button" role="tab" aria-controls="mapInitiativePane" aria-selected="false">Initiative</button>
        <button id="mapTimelineTab" class="nav-link" data-bs-toggle="tab" data-bs-target="#mapTimelinePane" type="button" role="tab" aria-controls="mapTimelinePane" aria-selected="false">Timeline</button>
      </nav>
    </div>
    <div class="side-scroll tab-content">
      <section id="mapCharacterPane" class="tab-pane fade show active side-section" role="tabpanel" aria-labelledby="mapCharacterTab" tabindex="0">
        <div class="side-title">Character</div>
        <div id="selectedPanel" class="small text-secondary">Select a token or shape.</div>
      </section>

      <section id="mapInitiativePane" class="tab-pane fade side-section" role="tabpanel" aria-labelledby="mapInitiativeTab" tabindex="0">
        <div class="side-title">Initiative</div>

const MAP_TWF_MODE_FIELDS = ["twfNoFeatPrimary", "twfNoFeatOff", "twfFeatPrimary", "twfFeatOff"];

function applyWeaponOptionChangeToSheet(sheet, weaponIndex, field, checked) {
  const next = structuredClone(sheet || {});
  next.weapons = Array.isArray(next.weapons) ? next.weapons : [];
  if (!next.weapons[weaponIndex]) return next;
  const weapon = next.weapons[weaponIndex];

  if (MAP_TWF_MODE_FIELDS.includes(field) && checked) {
    weapon.twoHanded = "no";
    MAP_TWF_MODE_FIELDS.forEach(otherField => {
      if (otherField !== field) weapon[otherField] = "no";
    });
    if (MAP_TWF_PRIMARY_FIELDS.includes(field)) {
      next.weapons.forEach((otherWeapon, index) => {
        if (index === weaponIndex) return;
        MAP_TWF_PRIMARY_FIELDS.forEach(primaryField => { otherWeapon[primaryField] = "no"; });
      });
    }
  }
  if (field === "twoHanded" && checked) {
    MAP_TWF_MODE_FIELDS.forEach(twfField => { weapon[twfField] = "no"; });
    weapon.improvedTwf = "no";
    weapon.greaterTwf = "no";
  }
  if (field === "rapidShot" && checked) {
    next.weapons.forEach((otherWeapon, index) => {
      if (index !== weaponIndex) otherWeapon.rapidShot = "no";
    });
  }

  weapon[field] = checked ? "yes" : "no";
  if (field === "greaterTwf" && checked) weapon.improvedTwf = "yes";
  if (!mapWeaponTwfFeatOffhand(weapon)) {
    weapon.improvedTwf = "no";
    weapon.greaterTwf = "no";
  }
  return next;
}

  if (!Array.isArray(currentSheet.weapons) || !currentSheet.weapons[weaponIndex]) return;
  const nextSheet = applyWeaponOptionChangeToSheet(currentSheet, weaponIndex, field, checked);

  if (token.kind === "character") {
    const character = tokenCharacter(token);
    if (!character?.id) return;
    character.sheet = nextSheet;
    syncTokenFromSheet(token, character);
    renderAll(false);
    const saved = await PFApp.updateCharacterSheetRaw?.(character.id, nextSheet, mapContextKey)
      || await PFApp.saveCharacterSheet(character.name || token.name || "Character", nextSheet, mapContextKey, character.id);
    if (!saved) {
      await refreshMapTokenSheets({ save: false });
      return;
    }
    await recalculateCharacterSheetFromMap(character.id);
    const refreshed = await PFApp.loadCharacterSheet("", mapContextKey, character.id);
    if (refreshed?.sheet) character.sheet = refreshed.sheet;
    syncTokenFromSheet(token, character);
    localStorage.setItem(`pf_character_sheet_updated_${mapContextKey}_${character.id}`, String(Date.now()));
    renderAll(false);
    return;
  }

  if (token.kind === "enemy" && isGm) {
    token.sheet = nextSheet;
    renderAll(false);
    const saved = await PFApp.saveEnemy({ id: token.enemyId, name: token.name || "Enemy", visible: token.visible !== false, sheet: nextSheet }, mapContextKey);
    if (!saved) {
      await refreshMapTokenSheets({ save: false });
      return;
    }
    await recalculateEnemySheetFromMap(token.enemyId);
    const refreshed = await PFApp.loadEnemy(token.enemyId, mapContextKey);
    const nextEnemy = refreshed || saved;
    token.sheet = structuredClone(nextEnemy.sheet || nextSheet);
    syncTokenFromSheet(token, nextEnemy);
    mapEnemies = mapEnemies.map(enemy => enemy.id === nextEnemy.id ? nextEnemy : enemy);
    localStorage.setItem(`pf_enemy_sheet_updated_${mapContextKey}_${token.enemyId}`, String(Date.now()));
    renderAll(false);
  }
}

function sheetArmorBonus(sheet, typeName) {
  return (sheet?.armor || []).reduce((total, item) => {
    const type = String(item.type || "").toLowerCase();
    if (!type.includes(typeName)) return total;
    return total + sheetNum(item.bonus) + sheetNum(item.enhancement);
  }, 0);
}

function compactStat(label, value) {
  return `<div class="mini-sheet-card"><div class="mini-sheet-label">${escapeHtml(label)}</div><div class="mini-sheet-value">${escapeHtml(value)}</div></div>`;
}

function compactInlineConditionals(rows = []) {
  return (rows || []).map(conditional => {
    const note = conditional.detail || conditional.appliesWhen || conditional.label || "Conditional";
    return `<div class="mini-sheet-inline-conditional"><span>${escapeHtml(conditional.total || "")}</span>${note ? ` <small>(${escapeHtml(note)})</small>` : ""}</div>`;
  }).join("");
}

function compactStatWithConditionals(label, value, conditionals = []) {
  return `
    <div class="mini-sheet-card">
      <div class="mini-sheet-label">${escapeHtml(label)}</div>
      <div class="mini-sheet-value">${escapeHtml(value)}</div>
      ${compactInlineConditionals(conditionals)}
    </div>
  `;
}

function compactSaveStat(row) {
  return compactStatWithConditionals(row.label || row.key || "Save", row.total || "", row.conditionals || []);
}

function compactConditionalStat(row) {
  return `<div class="mini-sheet-card mini-sheet-conditional"><div class="mini-sheet-label">${escapeHtml(row.label || "Conditional")}</div><div class="mini-sheet-value">${escapeHtml(row.total || "")}</div>${row.source ? `<div class="small text-secondary">${escapeHtml(row.source)}</div>` : ""}</div>`;
}

function compactConditionalStats(rows = []) {
  return (rows || []).map(compactConditionalStat).join("");
}

function compactConditionalRows(rows = []) {
  return (rows || []).map(row => `
    <div class="mini-sheet-row mini-sheet-conditional">
      <span>${escapeHtml(row.detail || row.source || "Conditional")}</span>
      <span>${escapeHtml(row.main || row.total || "")}</span>
    </div>
  `).join("");
}

function compactHpStat(token, calculated = null) {
  const current = calculated?.hp?.current || tokenCurrentHp(token) || "?";
  const total = calculated?.hp?.total || tokenTotalHp(token) || "?";
  const value = canEditTokenHp(token)
    ? `<div class="mini-sheet-value d-flex align-items-center gap-1">
        <input data-token-current-hp="${escapeHtml(token.id)}" class="form-control form-control-sm hp-number-input" type="number" value="${escapeHtml(current)}" style="width:70px;">
        <span>/ ${escapeHtml(total)}</span>
      </div>`
    : `<div class="mini-sheet-value">${escapeHtml(`${current}/${total}`)}</div>`;
  return `<div class="mini-sheet-card"><div class="mini-sheet-label">HP</div>${value}</div>`;
}

function compactSection(title, html) {
  return `<div><div class="mini-sheet-title">${escapeHtml(title)}</div>${html}</div>`;
}

function compactAbilityValue(row) {
  const total = String(row.total || "");
  const mod = String(row.mod || "");
  if (!mod || /\([+-]?\d+\)/.test(total)) return total;
  return `${total} (${mod})`;
}

function renderCalculatedSheetSummary(token, calculated) {
  const abilities = calculated.abilities || [];
  const saves = calculated.saves || [];
  const weapons = calculated.weapons || [];
  const rawWeapons = rollTokenSheet(token).weapons || [];
  return `
    <div class="mini-sheet">
      ${compactSection("Character", `<div class="mini-sheet-grid">
        ${compactHpStat(token, calculated)}
        ${compactStat("Init", calculated.initiative || "")}
        ${compactConditionalStats(calculated.hpConditionals || [])}
        ${compactConditionalStats(calculated.initiativeConditionals || [])}
      </div>`)}
      ${compactSection("Abilities", `<div class="mini-sheet-grid">
        ${abilities.map(row => compactStatWithConditionals(row.label || row.key?.toUpperCase() || "Ability", compactAbilityValue(row), row.conditionals || [])).join("")}
      </div>`)}
      ${compactSection("Armor Class", `<div class="mini-sheet-grid">
        ${compactStatWithConditionals("AC", calculated.armorClass?.ac || "", calculated.armorClass?.conditionals?.ac || [])}
        ${compactStatWithConditionals("Touch", calculated.armorClass?.touch || "", calculated.armorClass?.conditionals?.touch || [])}
        ${compactStatWithConditionals("Flat", calculated.armorClass?.flat || "", calculated.armorClass?.conditionals?.flat || [])}
      </div>`)}
      ${compactSection("Combat", `<div class="mini-sheet-grid">
        ${compactStatWithConditionals("CMB", calculated.combat?.cmb || "", calculated.combat?.conditionals?.cmb || [])}
        ${compactStatWithConditionals("CMD", calculated.combat?.cmd || "", calculated.combat?.conditionals?.cmd || [])}
      </div>`)}
      ${compactSection("Saves", `<div class="mini-sheet-grid">
        ${saves.map(compactSaveStat).join("")}
      </div>`)}
      ${compactSection("Weapons", `<div class="mini-sheet-list">${
        weapons.length
          ? weapons.map((weapon, index) => {
              const expanded = expandedMapWeaponKey === `${token.id}:${index}`;
              return `<div class="mini-sheet-row map-weapon-row" data-map-weapon-expand="${index}"><span><i class="bi ${expanded ? "bi-chevron-down" : "bi-chevron-right"} me-1"></i>${escapeHtml(weapon.name || "Weapon")}</span><span>${escapeHtml([weapon.attack, weapon.damage, weapon.critical].filter(Boolean).join(" | "))}</span></div>${expanded ? renderMapWeaponOptions(token, rawWeapons[index] || {}, index) : ""}${compactConditionalRows([...(weapon.attackConditionals || []), ...(weapon.damageConditionals || [])])}`;
            }).join("")
          : `<div class="small text-secondary">No weapons.</div>`
      }</div>`)}
    </div>
  `;
}

function renderCompactCharacterSheet(token) {
  if (token.kind === "enemy") {
    return isGm && token.sheet?.calculated
      ? renderCalculatedSheetSummary(token, token.sheet.calculated)
      : isGm
      ? `<div class="mini-sheet">${compactSection("Enemy Sheet", `<div class="small text-secondary">No calculated sheet summary found.</div>`)}</div>`
      : "";
  }
  if (token.kind !== "character") return "";
  if (!canManageAura(token)) return `<div class="small text-secondary mb-2">You can only view your own character sheet.</div>`;

  const character = tokenCharacter(token);
  const sheet = character?.sheet || {};
  const fields = sheet.fields || {};
  if (!Object.keys(sheet).length) return `<div class="small text-secondary mb-2">No saved sheet data found.</div>`;
  if (sheet.calculated) return renderCalculatedSheetSummary(token, sheet.calculated);

  const str = sheetAbilityMod(sheet, "str");
  const dex = sheetAbilityMod(sheet, "dex");
  const con = sheetAbilityMod(sheet, "con");
  const wis = sheetAbilityMod(sheet, "wis");
  const bab = sheetNum(fields.bab);
  const miscAc = sheetNum(fields.acMisc);
  const natural = sheetNum(fields.acNatural);
  const deflection = sheetNum(fields.acDeflection);
  const armor = sheetArmorBonus(sheet, "armor");
  const shield = sheetArmorBonus(sheet, "shield");
  const ac = 10 + armor + shield + dex + natural + deflection + miscAc;
  const touch = 10 + dex + deflection + miscAc;
  const flat = ac - Math.max(0, dex);
  const hpCurrent = fields.currentHitPoints ?? "?";
  const hpTotal = fields.hitPointsTotal || fields.hitPoints || "?";
  const initiative = dex + sheetNum(fields.initMisc);
  const cmbMisc = sheetNum(fields.cmbMisc);
  const cmdMisc = sheetNum(fields.cmdMisc);
  const saves = [
    ["Fort", sheetNum(sheet.saves?.fort?.base) + con],
    ["Ref", sheetNum(sheet.saves?.reflex?.base) + dex],
    ["Will", sheetNum(sheet.saves?.will?.base) + wis]
  ];
  const weapons = (sheet.weapons || []).slice(0, 4).map((weapon, index) => {
    const attackKey = firstScalingKey(weapon.attackScale, "str");
    const damageKey = firstScalingKey(weapon.damageScale, attackKey);
    const enhancement = sheetNum(weapon.enhancement);
    const attackMisc = sheetNum(weapon.attackMisc);
    const damageMisc = sheetNum(weapon.damageMisc);
    const attack = bab + sheetAbilityMod(sheet, attackKey) + enhancement + attackMisc;
    const attacks = iterativeBabBonuses(bab).map(base => fmtSigned(base + sheetAbilityMod(sheet, attackKey) + enhancement + attackMisc)).join("/");
    const damageMod = Math.floor(sheetAbilityMod(sheet, damageKey) * (weapon.twoHanded === "yes" ? 1.5 : 1)) + enhancement + damageMisc;
    const damage = `${weapon.damage || ""}${damageMod ? fmtSigned(damageMod) : ""}` || fmtSigned(damageMod);
    const expanded = expandedMapWeaponKey === `${token.id}:${index}`;
    return `<div class="mini-sheet-row map-weapon-row" data-map-weapon-expand="${index}"><span><i class="bi ${expanded ? "bi-chevron-down" : "bi-chevron-right"} me-1"></i>${escapeHtml(weapon.name || "Weapon")}</span><span>${escapeHtml(attacks || fmtSigned(attack))} | ${escapeHtml(damage)} | ${escapeHtml(weapon.critical || "-")}</span></div>${expanded ? renderMapWeaponOptions(token, weapon, index) : ""}`;
  }).join("") || `<div class="small text-secondary">No weapons.</div>`;

  return `
    <div class="mini-sheet">
      ${compactSection("Character", `<div class="mini-sheet-grid">
        ${compactHpStat(token)}
        ${compactStat("Init", fmtSigned(initiative))}
      </div>`)}
      ${compactSection("Abilities", `<div class="mini-sheet-grid">
        ${["str","dex","con","int","wis","cha"].map(key => compactStat(key.toUpperCase(), `${sheetAbilityScore(sheet, key)} (${fmtSigned(sheetAbilityMod(sheet, key))})`)).join("")}
      </div>`)}
      ${compactSection("Armor Class", `<div class="mini-sheet-grid">
        ${compactStat("AC", ac)}
        ${compactStat("Touch", touch)}
        ${compactStat("Flat", flat)}
      </div>`)}
      ${compactSection("Combat", `<div class="mini-sheet-grid">
        ${compactStat("CMB", fmtSigned(bab + str + cmbMisc))}
        ${compactStat("CMD", 10 + bab + str + dex + cmdMisc)}
      </div>`)}
      ${compactSection("Saves", `<div class="mini-sheet-grid">${saves.map(([label, value]) => compactStat(label, fmtSigned(value))).join("")}</div>`)}
      ${compactSection("Weapons", `<div class="mini-sheet-list">${weapons}</div>`)}
    </div>
  `;
}

function shapeTexture(textureId) {
  return SHAPE_TEXTURES.find(texture => texture.id === textureId);
}

function tilePosition(tileIndex) {
  const index = Math.max(0, Math.min(23, Number(tileIndex || 0)));
  const col = index % 6;
  const row = Math.floor(index / 6);
  return { x: `${col * 20}%`, y: `${row * (100 / 3)}%` };
}

async function hydrateMapCharacterSheets() {
  if (!mapCharacters.length) return;
  await Promise.all(mapCharacters.map(async character => {
    const saved = await PFApp.loadCharacterSheet("", mapContextKey, character.id);
    if (saved?.sheet) character.sheet = saved.sheet;
  }));
}

function sheetClassFeatureCalculationSignature(sheet = {}) {
  const progression = Array.isArray(sheet.classProgression) ? sheet.classProgression : [];
  const choices = sheet.classFeatureChoices && typeof sheet.classFeatureChoices === "object" ? sheet.classFeatureChoices : {};
  if (!progression.length && !Object.keys(choices).length) return "";
  return JSON.stringify({
    level: sheet.fields?.characterLevel || "",
    classProgression: progression,
    classFeatureChoices: choices,
    saves: sheet.saves || {},
    fields: {
      babMisc: sheet.fields?.babMisc || "",
      fortMisc: sheet.fields?.fortMisc || "",
      reflexMisc: sheet.fields?.reflexMisc || "",
      willMisc: sheet.fields?.willMisc || ""
    }
  });
}

function canRecalculateMapCharacter(character) {
  return Boolean(character?.id && (isGm || character.userId === currentUserId));
}

async function ensureMapCharacterCalculatedSummary(character) {
  if (!character?.id || !character.sheet || !canRecalculateMapCharacter(character)) return false;
  const signature = sheetClassFeatureCalculationSignature(character.sheet);
  if (!signature) return false;
  const key = `character:${character.id}`;
  if (mapSheetCalculationSignatures.get(key) === signature) return false;
  mapSheetCalculationSignatures.set(key, signature);
  const calculated = await recalculateCharacterSheetFromMap(character.id);
  if (!calculated) {
    mapSheetCalculationSignatures.delete(key);
    return false;
  }
  const saved = await PFApp.loadCharacterSheet("", mapContextKey, character.id);
  if (saved?.sheet) character.sheet = saved.sheet;
  return true;
}

async function ensureMapEnemyCalculatedSummary(enemy) {
  if (!enemy?.id || !enemy.sheet) return false;
  const signature = sheetClassFeatureCalculationSignature(enemy.sheet);
  if (!signature) return false;
  const key = `enemy:${enemy.id}`;
  if (mapSheetCalculationSignatures.get(key) === signature) return false;
  mapSheetCalculationSignatures.set(key, signature);
  const calculated = await recalculateEnemySheetFromMap(enemy.id);
  if (!calculated) {
    mapSheetCalculationSignatures.delete(key);
    return false;
  }
  const saved = await PFApp.loadEnemy(enemy.id, mapContextKey);
  if (saved?.sheet) enemy.sheet = saved.sheet;
  return true;
}

function syncTokenFromSheet(token, source) {
  if (!token || !source?.sheet) return false;
  let changed = false;
  const sheet = source.sheet || {};
  const name = source.name || source.character_name || token.name;
  const currentHp = sheet.calculated?.hp?.current || sheet.fields?.currentHitPoints || "";
  const totalHp = sheet.calculated?.hp?.total || sheet.fields?.hitPointsTotal || sheet.fields?.hitPoints || "";
  const nextHp = currentHp || totalHp ? `${currentHp || "?"}/${totalHp || "?"}` : token.hp || "";
  const nextAc = sheet.calculated?.armorClass?.ac || sheet.fields?.acTotal || token.ac || "";
  const sheetImageUrl = String(sheet.fields?.imageUrl || sheet.imageUrl || "").trim();

  if (name && token.name !== name) {
    token.name = name;
    changed = true;
  }
  if (!token.imageUrl && sheetImageUrl) {
    token.imageUrl = sheetImageUrl;
    changed = true;
  }
  if (token.kind === "enemy" && token.sheet !== sheet) {
    token.sheet = structuredClone(sheet);
    changed = true;
  }
  if (!pendingTokenHp.has(token.id) && nextHp && token.hp !== nextHp) {
    token.hp = nextHp;
    changed = true;
  }
  if (nextAc && token.ac !== nextAc) {
    token.ac = nextAc;
    changed = true;
  }
  return changed;
}

async function refreshMapTokenSheets({ save = false } = {}) {
  let changed = false;
  await hydrateMapCharacterSheets();

  for (const token of state.tokens) {
    if (token.kind !== "character") continue;
    const character = tokenCharacter(token);
    if (character) changed = await ensureMapCharacterCalculatedSummary(character) || changed;
  }

  state.tokens.forEach(token => {
    if (token.kind !== "character") return;
    const character = tokenCharacter(token);
    if (character) changed = syncTokenFromSheet(token, character) || changed;
  });

  if (isGm) {
    mapEnemies = await PFApp.loadEnemies(mapContextKey);
    for (const token of state.tokens) {
      if (token.kind !== "enemy" || !token.enemyId) continue;
      const enemy = mapEnemies.find(item => item.id === token.enemyId);
      if (enemy) changed = await ensureMapEnemyCalculatedSummary(enemy) || changed;
    }
    state.tokens.forEach(token => {
      if (token.kind !== "enemy" || !token.enemyId) return;
      const enemy = mapEnemies.find(item => item.id === token.enemyId);
      if (enemy) changed = syncTokenFromSheet(token, enemy) || changed;
    });
  }

  if (changed) renderAll(save);
}

async function determineGm(contextKey) {
  return PFApp.isGameManager(contextKey);
}

function normalizeState(raw) {
  const tokens = Array.isArray(raw?.tokens) ? raw.tokens : [];
  const normalizedInitiative = syncInitiativeWithTokens(tokens, raw?.initiative);
  const nextState = {
    settings: { ...defaultState.settings, ...(raw?.settings || {}) },
    tokens,
    shapes: Array.isArray(raw?.shapes) ? raw.shapes : [],
    initiative: normalizedInitiative,
    activeTurn: clamp(Number(raw?.activeTurn || 0), 0, Math.max(0, normalizedInitiative.length - 1)),
    roundsPassed: Math.max(0, Number(raw?.roundsPassed || 0)),
    turnSequence: Math.max(0, Number(raw?.turnSequence || 0)),
    effectNotices: Array.isArray(raw?.effectNotices) ? raw.effectNotices.slice(-10) : [],
    timeline: Array.isArray(raw?.timeline) ? raw.timeline.slice(-20) : []
  };
  state = nextState;
  normalizeZIndexes();
  return nextState;
}

function applySettingsToInputs() {
  el("gridSize").value = localGridSize;
  el("mapCols").value = state.settings.cols;
  el("mapRows").value = state.settings.rows;
  el("backgroundUrl").value = state.settings.backgroundUrl || "";
  el("backgroundFit").value = state.settings.backgroundFit || "cover";
}

function hideContextMenu() {
  contextMenuTokenId = "";
  el("mapContextMenu").classList.add("d-none");
}

function showMapContextMenu(event, item) {
  if (!canManageMapItem(item) || (!item.kind && !item.shape)) return;
  event.preventDefault();
  event.stopPropagation();
  contextMenuTokenId = item.id;
  selectedId = item.id;
  renderAll(false);
  const menu = el("mapContextMenu");
  el("mapContextMenuTitle").textContent = item.kind === "character"
    ? displayTokenName(item)
    : item.kind ? displayTokenName(item) : item.name || "Shape";
  el("openAuraOptions").classList.toggle("d-none", !canManageAura(item));
  el("openApplyEffect").classList.toggle("d-none", !canManageEffects(item));
  el("openRollMenu").classList.toggle("d-none", !canRollToken(item));
  const tokenVisibilityButton = el("toggleTokenVisibility");
  const canToggleTokenVisibility = Boolean(item.kind && canManageMapItem(item));
  tokenVisibilityButton.classList.toggle("d-none", !canToggleTokenVisibility);
  if (canToggleTokenVisibility) {
    tokenVisibilityButton.innerHTML = item.hidden === true
      ? `<i class="bi bi-eye me-1"></i> Unhide`
      : `<i class="bi bi-eye-slash me-1"></i> Hide`;
  }
  const visibilityButton = el("toggleEnemyVisibility");
  const canToggleEnemy = item.kind === "enemy" && isGm;
  visibilityButton.classList.toggle("d-none", !canToggleEnemy);
  if (canToggleEnemy) {
    visibilityButton.innerHTML = item.visible === false
      ? `<i class="bi bi-eye me-1"></i> Show enemy`
      : `<i class="bi bi-eye-slash me-1"></i> Hide enemy`;
  }
  const nameVisibilityButton = el("toggleTokenNameVisibility");
  const canToggleName = isGm && (item.kind === "enemy" || item.kind === "token");
  nameVisibilityButton.classList.toggle("d-none", !canToggleName);
  if (canToggleName) {
    nameVisibilityButton.innerHTML = item.hideName
      ? `<i class="bi bi-eye me-1"></i> Unhide name`
      : `<i class="bi bi-incognito me-1"></i> Hide name`;
  }
  el("zIndexMenu").classList.add("d-none");
  el("toggleZIndexMenu").setAttribute("aria-expanded", "false");
  menu.classList.remove("d-none");
  const rect = menu.getBoundingClientRect();
  menu.style.left = `${clamp(event.clientX, 8, window.innerWidth - rect.width - 8)}px`;
  menu.style.top = `${clamp(event.clientY, 8, window.innerHeight - rect.height - 8)}px`;
}

function moveContextItemZ(action) {
  const item = selectedObject();
  if (!item || !canManageMapItem(item)) return;
  normalizeZIndexes();
  const items = mapLayerItems().sort((a, b) => Number(a.zIndex || 0) - Number(b.zIndex || 0));
  const index = items.findIndex(entry => entry.id === item.id);
  if (index < 0) return;
  if (action === "top") {
    items.splice(index, 1);
    items.push(item);
  } else if (action === "bottom") {
    items.splice(index, 1);
    items.unshift(item);
  } else if (action === "up" && index < items.length - 1) {
    [items[index], items[index + 1]] = [items[index + 1], items[index]];
  } else if (action === "down" && index > 0) {
    [items[index], items[index - 1]] = [items[index - 1], items[index]];
  }
  items.forEach((entry, nextIndex) => { entry.zIndex = nextIndex + 2; });
  hideContextMenu();
  renderAll();
}

function stageCellFromEvent(event) {
  const stage = el("mapStage");
  const rect = stage.getBoundingClientRect();
  const cell = Number(localGridSize || 48);
  const x = clamp(Math.floor((event.clientX - rect.left) / cell), 0, state.settings.cols - 1);
  const y = clamp(Math.floor((event.clientY - rect.top) / cell), 0, state.settings.rows - 1);
  return { x, y, px: (x + 0.5) * cell, py: (y + 0.5) * cell };
}

function pathfinderDistance(start, end) {
  const dx = Math.abs(end.x - start.x);
  const dy = Math.abs(end.y - start.y);
  const diagonals = Math.min(dx, dy);
  const straight = Math.max(dx, dy) - diagonals;
  return (straight * 5) + (Math.floor(diagonals / 2) * 15) + ((diagonals % 2) * 5);
}

function renderMovementMeasure() {
  document.querySelector(".movement-ruler")?.remove();
  if (!movementMeasure) return;
  const stage = el("mapStage");
  const { start, current } = movementMeasure;
  const distance = pathfinderDistance(start, current);
  const layer = document.createElement("div");
  layer.className = "movement-ruler";
  layer.innerHTML = `
    <svg width="100%" height="100%" class="position-absolute top-0 start-0">
      <line class="movement-ruler-line" x1="${start.px}" y1="${start.py}" x2="${current.px}" y2="${current.py}"></line>
      <circle class="movement-ruler-dot" cx="${start.px}" cy="${start.py}" r="4"></circle>
      <circle class="movement-ruler-dot" cx="${current.px}" cy="${current.py}" r="4"></circle>
    </svg>
    <div class="movement-ruler-label" style="left:${current.px}px;top:${current.py}px;">${distance} ft</div>
  `;
  stage.appendChild(layer);
}

function clearMovementMeasure(delay = 0) {
  const clear = () => {
    movementMeasure = null;
    document.querySelector(".movement-ruler")?.remove();
  };
  if (delay) {
    setTimeout(clear, delay);
  } else {
    clear();
  }
}

function startMovementMeasure(event) {
  if (event.button !== 2) return;
  hideContextMenu();
  const point = stageCellFromEvent(event);
  movementMeasure = { start: point, current: point, dragged: false };
  renderMovementMeasure();
  window.addEventListener("pointermove", moveMovementMeasure);
  window.addEventListener("pointerup", endMovementMeasure, { once: true });
}

function moveMovementMeasure(event) {
  if (!movementMeasure) return;
  const next = stageCellFromEvent(event);
  movementMeasure.dragged = movementMeasure.dragged || next.x !== movementMeasure.start.x || next.y !== movementMeasure.start.y;
  movementMeasure.current = next;
  renderMovementMeasure();
}

function endMovementMeasure() {
  const wasDragged = Boolean(movementMeasure?.dragged);
  suppressNextContextMenu = wasDragged;
  window.removeEventListener("pointermove", moveMovementMeasure);
  clearMovementMeasure(wasDragged ? 700 : 0);
}

function renderMap() {
  const stage = el("mapStage");
  const { cols, rows, backgroundUrl, backgroundFit } = state.settings;
  stage.style.setProperty("--cell", `${localGridSize}px`);
  stage.style.setProperty("--cols", cols);
  stage.style.setProperty("--rows", rows);
  stage.style.setProperty("--map-bg", backgroundUrl ? `url("${backgroundUrl.replaceAll('"', "%22")}")` : "none");
  stage.style.setProperty("--bg-size", backgroundFit || "cover");

  stage.innerHTML = [
    ...state.tokens.filter(canSeeToken).map(renderAura),
    ...state.shapes.map(renderShape),
    ...state.tokens.filter(canSeeToken).map(renderToken),
    `<div id="tokenHoverLayer" class="token-hover-layer"></div>`
  ].join("");

  stage.onpointerdown = startMovementMeasure;
  stage.querySelectorAll("[data-map-id]").forEach(node => {
    node.addEventListener("pointerdown", startDrag);
    node.addEventListener("mouseenter", () => showTokenHover(node.dataset.mapId));
    node.addEventListener("mouseleave", hideTokenHover);
    node.addEventListener("click", event => {
      event.stopPropagation();
      suppressStageClick = true;
      hideContextMenu();
      selectedId = node.dataset.mapId;
      renderAll(false);
      showSelectedPanel();
    });
    node.addEventListener("contextmenu", event => {
      if (suppressNextContextMenu) {
        event.preventDefault();
        suppressNextContextMenu = false;
        return;
      }
      event.preventDefault();
      hideContextMenu();
      const item = [...state.tokens, ...state.shapes].find(entry => entry.id === node.dataset.mapId);
      if (item) showMapContextMenu(event, item);
    });
  });
  stage.oncontextmenu = event => {
    if (suppressNextContextMenu) {
      event.preventDefault();
      suppressNextContextMenu = false;
      return;
    }
    if (event.target === stage) event.preventDefault();
  };
  stage.onclick = event => {
    if (suppressStageClick) {
      suppressStageClick = false;
      return;
    }
    if (event.target !== stage) return;
    hideContextMenu();
    selectedId = "";
    renderAll(false);
  };
}

function renderAura(token) {
  const aura = token.aura || {};
  if (!aura.visible) return "";
  const radius = Math.max(1, Number(aura.radius || 1));
  const size = radius * 2;
  const centerX = Number(token.x || 0) + (Number(token.w || 1) / 2);
  const centerY = Number(token.y || 0) + (Number(token.h || 1) / 2);
  return `<div class="map-aura" style="--aura-x:${centerX - radius};--aura-y:${centerY - radius};--aura-size:${size};--aura-color:${escapeHtml(aura.color || "#8fd19e")};"></div>`;
}

function tokenCenter(token) {
  return {
    x: Number(token.x || 0) + (Number(token.w || 1) / 2),
    y: Number(token.y || 0) + (Number(token.h || 1) / 2)
  };
}

function tokenInAura(token, auraToken) {
  const aura = auraToken?.aura || {};
  if (!aura.visible || !aura.effect || token.id === auraToken.id) return false;
  if (!canSeeToken(token) || !canSeeToken(auraToken)) return false;
  const radius = Math.max(1, Number(aura.radius || 1));
  const a = tokenCenter(auraToken);
  const b = tokenCenter(token);
  return Math.hypot(a.x - b.x, a.y - b.y) <= radius;
}

function auraPromptKey(tokenId, auraId) {
  return `${mapContextKey}|${tokenId}|${auraId}`;
}

function currentAuraEffectEntries() {
  const auraTokens = state.tokens.filter(token => token.aura?.visible && token.aura?.effect && canSeeToken(token));
  return state.tokens
    .filter(token => (token.kind === "character" || token.kind === "enemy") && canManageEffects(token))
    .flatMap(token => auraTokens
      .filter(auraToken => tokenInAura(token, auraToken))
      .map(auraToken => ({ token, auraToken, key: auraPromptKey(token.id, auraToken.id) }))
    );
}

function auraEffectPrompts() {
  const entries = currentAuraEffectEntries();
  const currentKeys = new Set(entries.map(entry => entry.key));
  for (const key of [...auraEffectInside]) {
    if (!currentKeys.has(key)) {
      auraEffectInside.delete(key);
      auraEffectDismissed.delete(key);
    }
  }
  entries.forEach(entry => auraEffectInside.add(entry.key));
  return entries.filter(entry => !auraEffectDismissed.has(entry.key));
}

function updateAuraToastPosition() {
  const container = el("auraEffectToasts");
  const wrap = document.querySelector(".map-stage-wrap");
  if (!container || !wrap) return;
  const rect = wrap.getBoundingClientRect();
  const top = clamp(rect.top + 8, 8, window.innerHeight - 80);
  const right = clamp(window.innerWidth - rect.right + 8, 8, window.innerWidth - 80);
  const width = Math.max(180, Math.min(300, rect.width - 16));
  const maxHeight = Math.max(80, Math.min(rect.height - 16, window.innerHeight - top - 8));
  container.style.setProperty("--aura-toast-top", `${top}px`);
  container.style.setProperty("--aura-toast-right", `${right}px`);
  container.style.setProperty("--aura-toast-width", `${width}px`);
  container.style.setProperty("--aura-toast-max-height", `${maxHeight}px`);
}

function renderAuraEffectToasts() {
  const container = el("auraEffectToasts");
  if (!container) return;
  updateAuraToastPosition();
  const prompts = auraEffectPrompts();
  container.innerHTML = prompts.map(({ token, auraToken, key }) => `
    <div class="aura-effect-toast">
      <div class="fw-semibold">${escapeHtml(auraToken.aura.effect?.name || "Effect")} aura</div>
      <div class="small text-secondary mb-2">${escapeHtml(displayTokenName(token))}</div>
      <div class="d-flex justify-content-end gap-2">
        <button class="btn btn-outline-light btn-sm" type="button" data-dismiss-aura="${escapeHtml(key)}">Dismiss</button>
        <button class="btn btn-success btn-sm" type="button" data-apply-aura="${escapeHtml(token.id)}" data-aura-source="${escapeHtml(auraToken.id)}">Apply</button>
      </div>
    </div>
  `).join("");
  container.querySelectorAll("[data-dismiss-aura]").forEach(button => {
    button.addEventListener("click", () => {
      auraEffectDismissed.add(button.dataset.dismissAura);
      renderAuraEffectToasts();
    });
  });
  container.querySelectorAll("[data-apply-aura]").forEach(button => {
    button.addEventListener("click", () => applyAuraEffectToToken(button.dataset.applyAura, button.dataset.auraSource));
  });
}

function renderToken(token) {
  const enemyClass = token.kind === "enemy" ? " enemy" : "";

  const hiddenClass = token.kind === "enemy" && token.visible === false && isGm ? " enemy-hidden" : "";
  const tokenHiddenClass = token.hidden === true && canManageMapItem(token) ? " token-hidden" : "";
  const selectedClass = token.id === selectedId ? " selected" : "";
  const activeEntry = state.initiative[state.activeTurn];
  const activeClass = activeEntry?.tokenId === token.id && !activeEntry.disabled ? " turn-active" : "";
  return `
    <div class="map-token${enemyClass}${genericClass}${imageClass}${hiddenClass}${tokenHiddenClass}${selectedClass}${activeClass}" data-map-id="${escapeHtml(token.id)}" style="--x:${token.x};--y:${token.y};--w:${token.w || 1};--h:${token.h || 1};--z:${Number(token.zIndex || 2)};--color:${escapeHtml(token.color || "#8fd19e")};--token-image:${tokenImage};">

function hideTokenHover() {

function showTokenHover(tokenId) {

  const layer = el("tokenHoverLayer");

function cssUrl(value) {
  return String(value || "")
    .replaceAll("\\", "/")
    .replaceAll(" ", "%20")
    .replaceAll('"', "%22")
    .replaceAll("'", "%27")
    .replaceAll("(", "%28")
    .replaceAll(")", "%29");
}

function shapeMask(shape) {
  const cols = Math.max(1, Number(shape.w || 2));
  const rows = Math.max(1, Number(shape.h || 2));
  const occupied = new Set();
  if (shape.shape !== "circle") {
    for (let y = 0; y < rows; y += 1) {
      for (let x = 0; x < cols; x += 1) occupied.add(`${x},${y}`);
    }
    return { cols, rows, occupied };
  }

  const centerX = cols / 2;
  const centerY = rows / 2;
  const radiusX = Math.max(0.5, cols / 2 - 0.15);
  const radiusY = Math.max(0.5, rows / 2 - 0.15);
  for (let y = 0; y < rows; y += 1) {
    for (let x = 0; x < cols; x += 1) {
      const dx = (x + 0.5 - centerX) / radiusX;
      const dy = (y + 0.5 - centerY) / radiusY;
      if (dx * dx + dy * dy <= 1) occupied.add(`${x},${y}`);
    }
  }
  return { cols, rows, occupied };
}

function spriteCellIndex(cellNumber) {
  return Math.max(1, Math.min(24, Number(cellNumber || 1))) - 1;
}

function shapeTileIndex(shape, mask, x, y) {
  if (mask.cols === 1 && mask.rows === 1) return spriteCellIndex(1);

  if (mask.rows === 1) {
    if (x === 0) return spriteCellIndex(2);
    if (x === mask.cols - 1) return spriteCellIndex(4);
    return spriteCellIndex(3);
  }

  if (mask.cols === 1) {
    if (y === 0) return spriteCellIndex(7);
    if (y === mask.rows - 1) return spriteCellIndex(19);
    return spriteCellIndex(13);
  }

  if (shape.shape === "circle") {
    const has = (cx, cy) => mask.occupied.has(`${cx},${cy}`);
    const hasLeft = has(x - 1, y);
    const hasRight = has(x + 1, y);
    const hasTop = has(x, y - 1);
    const hasBottom = has(x, y + 1);
    if (mask.cols === 3 && mask.rows === 3 && mask.occupied.size === 5) {
      if (x === 1 && y === 0) return spriteCellIndex(7);
      if (x === 0 && y === 1) return spriteCellIndex(2);
      if (x === 2 && y === 1) return spriteCellIndex(4);
      if (x === 1 && y === 2) return spriteCellIndex(19);
      return spriteCellIndex(15);
    }
    if (!hasTop && !hasBottom && !hasLeft) return spriteCellIndex(2);
    if (!hasTop && !hasBottom && !hasRight) return spriteCellIndex(4);
    if (!hasLeft && !hasRight && !hasTop) return spriteCellIndex(7);
    if (!hasLeft && !hasRight && !hasBottom) return spriteCellIndex(19);
    if (!hasLeft && !hasTop) return spriteCellIndex(8);
    if (!hasRight && !hasTop) return spriteCellIndex(10);
    if (!hasLeft && !hasBottom) return spriteCellIndex(20);
    if (!hasRight && !hasBottom) return spriteCellIndex(22);
    if (!hasTop) return spriteCellIndex(9);
    if (!hasBottom) return spriteCellIndex(21);
    if (!hasLeft) return spriteCellIndex(14);
    if (!hasRight) return spriteCellIndex(16);
    return spriteCellIndex(15);
  }

  if (y === 0) {
    if (x === 0) return spriteCellIndex(8);
    if (x === mask.cols - 1) return spriteCellIndex(10);
    return spriteCellIndex(9);
  }

  if (y === mask.rows - 1) {
    if (x === 0) return spriteCellIndex(20);
    if (x === mask.cols - 1) return spriteCellIndex(22);
    return spriteCellIndex(21);
  }

  if (x === 0) return spriteCellIndex(14);
  if (x === mask.cols - 1) return spriteCellIndex(16);
  return spriteCellIndex(15);
}

function renderShape(shape) {
  const selectedClass = shape.id === selectedId ? " selected" : "";
  const texture = shapeTexture(shape.texture);
  if (texture || shape.shape === "circle") {
    const mask = shapeMask(shape);
    const cells = [];
    for (let y = 0; y < mask.rows; y += 1) {
      for (let x = 0; x < mask.cols; x += 1) {
        if (!mask.occupied.has(`${x},${y}`)) {
          cells.push("<span></span>");
          continue;
        }
        if (texture) {
          const tile = tilePosition(shapeTileIndex(shape, mask, x, y));
          cells.push(`<span class="shape-cell texture-cell" style="--texture-url:url('${texture.url}');--tile-x:${tile.x};--tile-y:${tile.y};"></span>`);
        } else {
          cells.push(`<span class="shape-cell"></span>`);
        }
      }
    }
    return `
      <div class="map-shape shape-grid${selectedClass}" data-map-id="${escapeHtml(shape.id)}" style="--x:${shape.x};--y:${shape.y};--w:${mask.cols};--h:${mask.rows};--z:${Number(shape.zIndex || 2)};--shape-cols:${mask.cols};--shape-rows:${mask.rows};--color:${escapeHtml(shape.color || "#f0d58c")};">
        ${cells.join("")}
      </div>
    `;
  }
  return `<div class="map-shape ${shape.shape || "rect"}${selectedClass}" data-map-id="${escapeHtml(shape.id)}" style="--x:${shape.x};--y:${shape.y};--w:${shape.w || 2};--h:${shape.h || 2};--z:${Number(shape.zIndex || 2)};--color:${escapeHtml(shape.color || "#f0d58c")};"></div>`;
}

              <div class="col-12">

    const disabled = entry.disabled ? " disabled" : "";
    const name = initiativeNameFromEntry(entry);
    return `
      <div class="initiative-row${active}${disabled}">
        <div class="initiative-row-grid">
          <div class="initiative-name" title="${escapeHtml(name)}">${escapeHtml(name)}</div>

          <span class="initiative-controls">
            <button class="btn btn-outline-light btn-sm btn-icon" type="button" data-init-up="${escapeHtml(entry.id)}" title="Move up" aria-label="Move up"><i class="bi bi-arrow-up"></i></button>

  });

function maskHiddenTokenNames(value) {
  let text = String(value ?? "");
  state.tokens
    .filter(tokenNameIsHidden)
    .sort((a, b) => tokenActualName(b).length - tokenActualName(a).length)
    .forEach(token => {
    const actual = tokenActualName(token);
    if (!actual || actual === "?") return;
    const replacement = isGm ? `[?] ${actual}` : "?";
    if (isGm) {
      text = text.split(`[?] ${actual}`).join(`\u0000${actual}\u0000`);
      text = text.split(actual).join(replacement);
      text = text.split(`\u0000${actual}\u0000`).join(replacement);
    } else {
      text = text.split(actual).join(replacement);
    }
    });
  return text;
}

function renderTimeline() {
  const rows = state.timeline.slice(-20);
  el("timelineList").innerHTML = state.timeline.length
    ? rows.slice().reverse().map(row => `<div class="timeline-row"><div>${timelineRowContent(row)}</div><div class="small text-secondary">${escapeHtml(row.time || "")}</div></div>`).join("")
    : `<div class="small text-secondary">No events yet.</div>`;
}

function renderAll(save = true) {
  renderMap();
  renderSelectedPanel();
  renderInitiative();
  renderTimeline();
  renderAuraEffectToasts();
  renderTurnEffectNotices();
  if (save) queueSave();
}

function applyRemoteMapState(remoteState) {
  if (dragState) {
    pendingRemoteState = remoteState;
    return;
  }
  clearTimeout(saveTimer);
  state = normalizeState(remoteState);
  if (selectedId && !selectedObject()) selectedId = "";
  if (contextMenuTokenId && !state.tokens.some(token => token.id === contextMenuTokenId)) hideContextMenu();
  applySettingsToInputs();
  renderAll(false);
  refreshMapTokenSheets({ save: false });
}

function flushPendingRemoteState() {
  if (!pendingRemoteState) return;
  const localDraggedId = dragState?.id;
  const localDraggedItem = [...state.tokens, ...state.shapes].find(entry => entry.id === localDraggedId);
  const remoteState = normalizeState(pendingRemoteState);
  pendingRemoteState = null;

  if (!localDraggedId || !localDraggedItem) {
    state = remoteState;
    if (selectedId && !selectedObject()) selectedId = "";
    applySettingsToInputs();
    renderAll(false);
    return;
  }

  state = remoteState;
  const collection = localDraggedItem.kind ? state.tokens : state.shapes;
  const existingIndex = collection.findIndex(entry => entry.id === localDraggedId);
  if (existingIndex >= 0) {
    collection[existingIndex] = localDraggedItem;
  } else {
    collection.push(localDraggedItem);
  }
  if (selectedId && !selectedObject()) selectedId = "";
  applySettingsToInputs();
  renderAll(false);
}

function queueSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    await PFApp.saveMapState(state, mapContextKey);
  }, 500);
}

function startDrag(event) {
  if (event.button !== 0) return;
  event.preventDefault();
  event.stopPropagation();
  hideContextMenu();
  suppressStageClick = true;
  const id = event.currentTarget.dataset.mapId;
  const item = [...state.tokens, ...state.shapes].find(entry => entry.id === id);
  if (!item) return;
  selectedId = id;
  dragState = { id, startX: event.clientX, startY: event.clientY, x: item.x || 0, y: item.y || 0 };
  event.currentTarget.setPointerCapture(event.pointerId);
  window.addEventListener("pointermove", moveDrag);
  window.addEventListener("pointerup", endDrag, { once: true });
  renderAll(false);
  showSelectedPanel();
}

function moveDrag(event) {
  if (!dragState) return;
  const item = [...state.tokens, ...state.shapes].find(entry => entry.id === dragState.id);
  if (!item) return;
  const cell = Number(localGridSize || 48);
  const dx = Math.round((event.clientX - dragState.startX) / cell);
  const dy = Math.round((event.clientY - dragState.startY) / cell);
  item.x = clamp(dragState.x + dx, 0, state.settings.cols - (item.w || 1));
  item.y = clamp(dragState.y + dy, 0, state.settings.rows - (item.h || 1));
  renderAll(false);
}

function endDrag() {
  flushPendingRemoteState();
  dragState = null;
  window.removeEventListener("pointermove", moveDrag);
  renderAll();
  removeOutOfRangeAuraEffects();
}

function updateTokenHpPreview(token, value) {

}

function nextHpSaveSeq(tokenId) {
  const seq = (hpSaveSeq.get(tokenId) || 0) + 1;
  hpSaveSeq.set(tokenId, seq);
  return seq;
}

function queueTokenCurrentHp(tokenId, value) {
  const token = tokenById(tokenId);
  if (!token || !canEditTokenHp(token)) return;
  pendingTokenHp.set(tokenId, value);
  updateTokenHpPreview(token, value);
  clearTimeout(hpSaveTimers.get(tokenId));
  hpSaveTimers.set(tokenId, setTimeout(() => {
    hpSaveTimers.delete(tokenId);
    updateTokenCurrentHp(tokenId, value, nextHpSaveSeq(tokenId));
  }, 900));
}

function flushTokenCurrentHp(tokenId, value) {
  if (!hpSaveTimers.has(tokenId)) return;
  clearTimeout(hpSaveTimers.get(tokenId));
  hpSaveTimers.delete(tokenId);
  updateTokenCurrentHp(tokenId, value, nextHpSaveSeq(tokenId));
}

async function updateTokenCurrentHp(tokenId, value, seq = nextHpSaveSeq(tokenId)) {
  const token = tokenById(tokenId);
  if (!token || !canEditTokenHp(token)) return;

  if (token.kind === "enemy") {
    const saved = await PFApp.updateEnemyCurrentHp(token.enemyId, value, mapContextKey);
    if (hpSaveSeq.get(tokenId) !== seq) return;
    if (!saved) {
      pendingTokenHp.delete(tokenId);
      console.warn("Could not update HP");
      renderAll(false);
      return;
    }
    if (saved) {
      pendingTokenHp.delete(tokenId);
      syncTokenFromSheet(token, saved);
    }
  } else {
    const saved = await PFApp.updateCharacterCurrentHp(token.characterId, value, mapContextKey);
    if (hpSaveSeq.get(tokenId) !== seq) return;
    if (!saved) {
      pendingTokenHp.delete(tokenId);
      console.warn("Could not update HP");
      renderAll(false);
      return;
    }
    const character = mapCharacters.find(item => item.id === token.characterId);
    if (saved?.id && character) {
      pendingTokenHp.delete(tokenId);
      character.sheet = { ...(character.sheet || {}), ...(await PFApp.loadCharacterSheet("", mapContextKey, token.characterId))?.sheet };
      syncTokenFromSheet(token, character);
    }
  }

  renderAll();
  localStorage.setItem(`pf_map_sheet_hp_updated_${mapContextKey}_${token.kind}_${token.kind === "enemy" ? token.enemyId : token.characterId}`, String(Date.now()));
}

async function openMapEffects(tokenId) {
  const token = tokenById(tokenId);
  const mount = el("mapEffectTracker");
  if (!token || !mount || !canManageEffects(token)) return;

  const effectTargetId = token.kind === "enemy" ? token.enemyId : token.characterId;
  if (!effectTargetId) {
    mount.innerHTML = `<div class="small text-secondary">Save this token source before adding effects.</div>`;
    mapEffectsModal.show();
    return;
  }

  el("mapEffectsModalLabel").textContent = `${displayTokenName(token)} Effects`;
  const options = {
    contextKey: mapContextKey,
    characterId: effectTargetId,
    loadActiveEffects: token.kind === "enemy"
      ? async () => {
          const enemy = await PFApp.loadEnemy(token.enemyId, mapContextKey);
          if (enemy?.sheet) token.sheet = structuredClone(enemy.sheet);
          return token.sheet?.activeBuffs || [];
        }
      : undefined,
    saveActiveEffects: async effects => {
      const activeEffects = Array.isArray(effects) ? effects : [];
      if (token.kind === "character") {
        const savedBuffs = await PFApp.saveBuffState(activeEffects, mapContextKey, token.characterId);
        if (savedBuffs?.ok === false) {
          console.error(savedBuffs.error);
          console.warn("Could not save effects");
          return;
        }
        const stamp = String(Date.now());
        localStorage.setItem(`pf_buffs_updated_${mapContextKey}`, stamp);
        localStorage.setItem(`pf_buffs_updated_${mapContextKey}_${token.characterId}`, stamp);
        await recalculateCharacterSheetFromMap(token.characterId);
        const character = tokenCharacter(token);
        if (character) {
          const saved = await PFApp.loadCharacterSheet("", mapContextKey, token.characterId);
          if (saved?.sheet) character.sheet = saved.sheet;
          syncTokenFromSheet(token, character);
          renderAll();
        }
        await refetchMapSheetState();
        return;
      }

      if (token.kind === "enemy") {
          const enemy = await PFApp.loadEnemy(token.enemyId, mapContextKey);
          const sheet = structuredClone(enemy?.sheet || token.sheet || {});
          sheet.activeBuffs = activeEffects;
          const saved = await PFApp.saveEnemy({
            id: token.enemyId,
            name: enemy?.name || token.name || "Enemy",
            visible: enemy?.visible !== false,
            sheet
          }, mapContextKey);
          if (saved) {
            await recalculateEnemySheetFromMap(saved.id);
            const refreshed = await PFApp.loadEnemy(saved.id, mapContextKey);
            const nextEnemy = refreshed || saved;
            syncTokenFromSheet(token, nextEnemy);
            token.sheet = structuredClone(nextEnemy.sheet || sheet);
            mapEnemies = mapEnemies.map(item => item.id === nextEnemy.id ? nextEnemy : item);
            if (!mapEnemies.some(item => item.id === nextEnemy.id)) mapEnemies.push(nextEnemy);
            localStorage.setItem(`pf_enemy_sheet_updated_${mapContextKey}_${nextEnemy.id}`, String(Date.now()));
            renderAll();
            await refetchMapSheetState();
          }
        }
    },
    onChange: async effects => {
      if (token.kind === "character") {
        const character = tokenCharacter(token);
        if (character) {
          syncTokenFromSheet(token, character);
          renderAll(false);
        }
      } else if (token.kind === "enemy") {
        renderAll(false);
      }
    }
  };

  if (!mapEffectTrackerInstance) {
    mapEffectTrackerInstance = PFEffectTracker.mount(mount, options);
    await mapEffectTrackerInstance.ready;
  } else {
    await mapEffectTrackerInstance.refresh(options);
  }
  mapEffectsModal.show();
}

function quickEffectUsageKey() {
  return `pf_map_quick_effect_usage_${mapContextKey || "general"}`;
}

function quickEffectUsageCounts() {
  try {
    return JSON.parse(localStorage.getItem(quickEffectUsageKey()) || "{}") || {};
  } catch {
    return {};
  }
}

function incrementQuickEffectUsage(effect) {
  const key = effect?.id || effect?.name;
  if (!key) return;
  const counts = quickEffectUsageCounts();
  counts[key] = Number(counts[key] || 0) + 1;
  localStorage.setItem(quickEffectUsageKey(), JSON.stringify(counts));
}

function tokenLevel(token) {
  const sheet = token?.kind === "enemy" ? token.sheet || {} : tokenCharacter(token)?.sheet || {};
  const fields = sheet.fields || {};
  return Math.max(1, Number(fields.characterLevel || fields.classLevel || fields.level || 1) || 1);
}

function effectCardHtml(effect, index, prefix, defaultCl) {
  const bonuses = (effect.bonuses || []).slice(0, 8);
  const bonusHtml = bonuses.length
    ? bonuses.map(bonus => `<span class="quick-effect-chip">${escapeHtml(effectBonusText(bonus))}</span>`).join("")
    : `<span class="small text-secondary">No numerical changes</span>`;
  const more = (effect.bonuses || []).length > bonuses.length
    ? `<span class="small text-secondary">+${(effect.bonuses || []).length - bonuses.length} more</span>`
    : "";
  const needsCl = durationUsesCasterLevel(effect);
  const condition = isConditionEffect(effect);
  return `
    <article class="quick-effect-card" role="button" tabindex="0" data-quick-effect-index="${index}">
      <span class="effect-type-icon" title="${escapeHtml(effect.category || "Effect")}"><i class="bi ${effectCategoryIcon(effect.category)}"></i></span>
      <div class="fw-semibold pe-4">${escapeHtml(effect.name || "Effect")}</div>
      <div class="small text-secondary mb-2">${escapeHtml(effect.category || "Effect")} | ${escapeHtml(durationLabel(effect))}</div>
      <div>${bonusHtml}${more}</div>
      <div class="quick-effect-controls">
        ${needsCl ? `
          <label class="small">CL
            <input id="${prefix}Cl${index}" class="form-control form-control-sm" data-quick-cl type="number" min="1" value="${defaultCl}">
          </label>
        ` : ""}
        ${condition ? `
          <label class="small">Turns
            <input id="${prefix}Turns${index}" class="form-control form-control-sm" data-quick-turns type="number" min="1" value="1">
          </label>
        ` : ""}
        <label class="form-check small mb-1">
          <input id="${prefix}Permanent${index}" class="form-check-input" data-quick-permanent type="checkbox">
          <span class="form-check-label">Permanent</span>
        </label>
      </div>
    </article>
  `;
}

function bindQuickEffectCards(container, effects) {
  container.querySelectorAll("[data-quick-effect-index]").forEach(card => {
    const choose = () => {
      const effect = effects[Number(card.dataset.quickEffectIndex)];
      if (!effect) return;
      const casterLevel = Math.max(1, Number.parseInt(card.querySelector("[data-quick-cl]")?.value, 10) || tokenLevel(tokenById(quickEffectSourceTokenId)));
      const turns = Math.max(1, Number.parseInt(card.querySelector("[data-quick-turns]")?.value, 10) || 1);
      const permanent = Boolean(card.querySelector("[data-quick-permanent]")?.checked);
      if (quickEffectMode === "aura") {
        auraEffectDraft = appliedEffectFromQuickSelection(effect, { casterLevel, turns, permanent });
        updateAuraEffectSummary();
        quickEffectModal.hide();
        auraModal.show();
        return;
      }
      openQuickEffectTargets(effect, { casterLevel, turns, permanent });
    };
    card.addEventListener("click", event => {
      if (event.target.closest(".quick-effect-controls")) return;
      choose();
    });
    card.addEventListener("keydown", event => {
      if (event.target.closest(".quick-effect-controls")) return;
      if (event.key !== "Enter" && event.key !== " ") return;
      event.preventDefault();
      choose();
    });
  });
}

function renderQuickEffects() {
  const sourceToken = tokenById(quickEffectSourceTokenId);
  const defaultCl = tokenLevel(sourceToken);
  const term = el("quickEffectSearch").value.trim().toLowerCase();
  const matches = quickEffectDefinitions.filter(effect => !term || effectSearchText(effect).includes(term));
  const counts = quickEffectUsageCounts();
  const mostUsed = quickEffectDefinitions
    .filter(effect => Number(counts[effect.id] || counts[effect.name] || 0) > 0)
    .sort((a, b) => Number(counts[b.id] || counts[b.name] || 0) - Number(counts[a.id] || counts[a.name] || 0))
    .slice(0, 7);

  el("quickEffectMostUsedWrap").classList.toggle("d-none", !mostUsed.length);
  el("quickEffectMostUsed").innerHTML = mostUsed
    .map((effect, index) => effectCardHtml(effect, index, "quickMost", defaultCl))
    .join("");
  el("quickEffectResults").innerHTML = matches.length
    ? matches.map((effect, index) => effectCardHtml(effect, index, "quickAll", defaultCl)).join("")
    : `<div class="small text-secondary">No matching effects found.</div>`;

  bindQuickEffectCards(el("quickEffectMostUsed"), mostUsed);
  bindQuickEffectCards(el("quickEffectResults"), matches);
}
